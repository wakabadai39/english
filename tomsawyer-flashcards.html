りと見てみた。", "note": "take a sneak peek の形。カジュアルな表現。"}, {"word": "peer", "hint": "じっと見る、目を凝らす", "general": "よく見ようと、注意深く見つめること", "example": "He peered into the darkness, trying to see what was making the sound.", "example_ja": "彼は、その音を出しているものを見ようと、暗闇に目を凝らした。", "note": "peer into/through ~ の形。"}, {"word": "crouch", "hint": "うずくまる、しゃがむ", "general": "体を低くして縮める姿勢をとること", "example": "They crouched behind the bushes, holding their breath.", "example_ja": "彼らは息を殺しながら、やぶの後ろにうずくまった。", "note": "crouch down / crouch behind ~ のように使う。"}, {"word": "tiptoe", "hint": "つま先で歩く、こっそり歩く", "general": "音を立てないように、つま先立ちで歩くこと", "example": "They tiptoed past the sleeping watchman.", "example_ja": "彼らは眠っている見張り番のそばを、つま先立ちで通り過ぎた。", "note": "on tiptoe / tiptoe past ~ のように使う。"}, {"word": "clutch", "hint": "ぎゅっとつかむ", "general": "何かを強く握ること", "example": "He clutched the candle so tightly his hand shook.", "example_ja": "彼はろうそくをとても強く握りすぎて、手が震えた。", "note": "clutch at ~(必死につかもうとする)の形でも使う。"}, {"word": "vanish", "hint": "消える、姿を消す", "general": "突然、見えなくなること", "example": "The man seemed to vanish into the night.", "example_ja": "その男は、夜の中に消えてしまったようだった。", "note": "vanish into thin air(完全に姿を消す)のような表現もある。"}, {"word": "appear", "hint": "現れる、出現する", "general": "突然、見えるようになること", "example": "A figure appeared at the end of the dark hallway.", "example_ja": "暗い廊下の先に、人影が現れた。", "note": "反対語はdisappear/vanish。appear out of nowhere のように使う。"}, {"word": "figure", "hint": "人影、姿", "general": "はっきりと識別できない人の形", "example": "A shadowy figure moved between the trees.", "example_ja": "影のような人影が、木々の間を動いた。", "note": "a dark/shadowy figure のように使う。"}, {"word": "shadow", "hint": "影", "general": "光が遮られてできる暗い部分", "example": "His own shadow startled him in the dim light.", "example_ja": "薄暗い光の中で、彼自身の影が彼を驚かせた。", "note": "in the shadow of ~ / cast a shadow のように使う。"}, {"word": "flame", "hint": "炎", "general": "火の燃えている部分", "example": "The flame of the candle wavered in the draft.", "example_ja": "ろうそくの炎は、すき間風の中で揺らめいた。", "note": "a candle flame / burst into flame のように使う。"}, {"word": "smoke", "hint": "煙", "general": "燃焼によって生じる気体", "example": "Thin smoke rose from the dying campfire.", "example_ja": "消えかけたたき火から、薄い煙が上がっていた。", "note": "smoke rises / a cloud of smoke のように使う。"}, {"word": "hollow", "hint": "中がうつろな、空洞の", "general": "中が空いている状態の", "example": "They hid the box inside a hollow tree.", "example_ja": "彼らはその箱を、空洞になった木の中に隠した。", "note": "a hollow tree / sound hollow のように使う。"}, {"word": "loft", "hint": "屋根裏、ロフト", "general": "屋根の下にある、物置や寝床として使われる空間", "example": "He slept in the loft above the barn.", "example_ja": "彼は納屋の上のロフトで寝た。", "note": "sleep in a loft / a hay loft のように使う。"}, {"word": "barn", "hint": "納屋、馬小屋", "general": "農作物や動物を保管・収容するための建物", "example": "They kept their secret stash hidden in the old barn.", "example_ja": "彼らは秘密の隠し場所を、古い納屋に隠していた。", "note": "a barn door / sleep in a barn のように使う。"}, {"word": "ain't", "hint": "~ではない、~ない(am not/is not/are not/have not/has notの口語的・方言的な短縮形)", "general": "標準英語のbe動詞やhave動詞の否定形の代わりに使われる、非標準的な短縮形", "example": "\"That ain't fair,\" Huck said, frowning.", "example_ja": "「そんなの公平じゃないよ」とハックは顔をしかめて言った。", "note": "非標準英語だが、口語表現として現代でも広く使われる。文脈によりam not/is not/are not/has not/have notのいずれにもなる。"}, {"word": "reckon", "hint": "~だと思う、~だろう(thinkやsupposeの意味の方言的表現)", "general": "考える、推測する、という意味の口語・方言的表現", "example": "\"I reckon we'll find that treasure yet,\" Tom said confidently.", "example_ja": "「俺たちはまだあの宝物を見つけられると思うよ」とトムは自信を持って言った。", "note": "I reckon (that) ~ の形でほぼ常に使われる。アメリカ南部方言として特徴的。"}, {"word": "conscience", "hint": "良心", "general": "自分の行いが正しいかどうかを判断する、内面の感覚", "example": "His conscience troubled him long after the others had forgotten the matter.", "example_ja": "他の者たちがそのことを忘れた後も、彼の良心は彼を苦しめ続けた。", "note": "a guilty conscience のように使う。"}, {"word": "remorse", "hint": "深い後悔、自責の念", "general": "自分の行いについて、強く悔やむ気持ち", "example": "A pang of remorse shot through him as he watched her cry.", "example_ja": "彼女が泣くのを見て、彼の中に自責の念が突き刺さった。", "note": "a pang of remorse のように使う。"}, {"word": "defiant", "hint": "反抗的な、挑戦的な", "general": "権威や規則に対して、従わない態度を示す性質", "example": "He stood there, defiant, refusing to apologize.", "example_ja": "彼は反抗的に立ち、謝ろうとしなかった。", "note": "a defiant look/attitude のように使う。"}, {"word": "petulant", "hint": "短気な、すぐ怒る", "general": "小さなことで、不機嫌になりやすい性質", "example": "He answered in a petulant tone, clearly annoyed by the question.", "example_ja": "彼はその質問に明らかにいらだち、短気な口調で答えた。", "note": "a petulant tone/child のように使う。"}, {"word": "vexed", "hint": "いらいらした、困った", "general": "小さな問題で、いらだちや困惑を感じている状態", "example": "He was vexed by the constant interruptions.", "example_ja": "彼は、絶え間ない中断にいらいらしていた。", "note": "vexed by/with ~ のように使う、やや古風な語。"}, {"word": "forlorn", "hint": "見捨てられた、孤独な", "general": "寂しく、希望を失っているような様子", "example": "He looked small and forlorn standing alone by the gate.", "example_ja": "門のそばに一人で立つ彼は、小さく寂しげに見えた。", "note": "a forlorn figure/look のように使う。"}, {"word": "yonder", "hint": "あそこ、向こうの(over thereの古風・方言的表現)", "general": "少し離れた場所を指す、古風で口語的な表現", "example": "\"The old house is just over yonder,\" Huck said, pointing.", "example_ja": "「あの古い家はちょうどあそこにあるよ」とハックは指さして言った。", "note": "over yonder の形で「あちらの方」を指す。アメリカ南部方言・古英語の名残。"}, {"word": "melancholy", "hint": "憂鬱な、もの悲しい", "general": "理由のはっきりしない、深い悲しみや寂しさの感情", "example": "A melancholy feeling settled over him as the sun went down.", "example_ja": "日が沈むと、憂鬱な気分が彼を包んだ。", "note": "a melancholy mood/feeling のように使う。"}, {"word": "despondent", "hint": "意気消沈した", "general": "希望を失い、深く落ち込んでいる状態", "example": "He grew despondent after days of searching turned up nothing.", "example_ja": "何日も探しても何も見つからず、彼は意気消沈していった。", "note": "despondent about ~ のように使う、やや硬い語。"}, {"word": "ardent", "hint": "熱烈な、熱心な", "general": "非常に強い熱意や感情を持つ性質", "example": "He was an ardent believer in second chances.", "example_ja": "彼は、再挑戦のチャンスを熱心に信じる者だった。", "note": "an ardent believer/admirer のように使う。"}, {"word": "plumb", "hint": "完全に、まったく(completelyの口語的表現)", "general": "completely / totallyの意味で使われる口語表現", "example": "\"You're plumb crazy if you think I'm going in there,\" Huck said.", "example_ja": "「あそこに入るなんて、お前は完全に頭がおかしいよ」とハックは言った。", "note": "plumb crazy / plumb tired のように形容詞を強調する。"}, {"word": "smitten", "hint": "心を奪われた、惚れ込んだ", "general": "恋愛感情などで、強く心を奪われている状態", "example": "He was completely smitten and made no effort to hide it.", "example_ja": "彼は完全に心を奪われ、それを隠そうともしなかった。", "note": "smitten with someone のように使う、やや口語的。"}, {"word": "mighty", "hint": "非常に、ものすごく(veryの意味で使う口語的な強調表現)", "general": "「強大な」という通常の意味の他に、口語でveryの代わりに使われる", "example": "\"This is mighty fine pie,\" he said with his mouth full.", "example_ja": "「これはものすごくおいしいパイだな」と彼は口をいっぱいにしながら言った。", "note": "mighty + 形容詞 の形でveryの代用として使われる。"}, {"word": "bashful", "hint": "はにかんだ、恥ずかしがりの", "general": "恥ずかしさで、人前で控えめになる性質", "example": "He gave a bashful smile and looked at his shoes.", "example_ja": "彼ははにかんだ笑みを浮かべ、自分の靴を見た。", "note": "a bashful smile/grin のように使う。"}, {"word": "audacity", "hint": "大胆さ、ずぶとさ", "general": "危険や非難を顧みず、思い切ったことをする性質", "example": "He had the audacity to ask for a reward after causing all that trouble.", "example_ja": "あれだけの騒ぎを起こした後で、彼は報酬を求めるという大胆さを見せた。", "note": "have the audacity to do something のように使う。"}, {"word": "impudent", "hint": "無礼な、ずうずうしい", "general": "目上の人に対して、失礼で生意気な態度をとる性質", "example": "His impudent grin only made the schoolmaster angrier.", "example_ja": "彼の無礼なにやにや笑いは、校長をさらに怒らせるだけだった。", "note": "an impudent grin/remark のように使う。"}, {"word": "chastise", "hint": "懲らしめる、厳しく叱る", "general": "罰や厳しい言葉で、誤りを正そうとすること", "example": "The aunt chastised him sharply for staying out so late.", "example_ja": "その伯母は、こんなに遅くまで外にいたことで彼を厳しく叱った。", "note": "chastise someone for ~ の形、やや硬い語。"}, {"word": "git", "hint": "得る、行く(getの口語的・方言的発音表記)", "general": "getの発音をそのまま表したつづり", "example": "\"Git outta here before someone sees us,\" Tom hissed.", "example_ja": "「誰かに見られる前にここから出ろ」とトムは小声で言った。", "note": "get away / get out などの口語的発音をそのまま表記。"}, {"word": "jest", "hint": "ただ、~だけ(justの口語的発音表記)", "general": "justの発音をそのまま表したつづり", "example": "\"It was jest a joke,\" he said, trying not to laugh.", "example_ja": "「ただの冗談だったんだよ」と彼は笑いをこらえながら言った。", "note": "justの方言的発音表記。"}, {"word": "ketch", "hint": "つかまえる、捕らえる(catchの口語的発音表記)", "general": "catchの発音をそのまま表したつづり", "example": "\"You can't ketch me!\" the boy yelled, running off.", "example_ja": "「俺をつかまえられるもんか!」とその少年は叫びながら走り去った。", "note": "catchの方言的発音表記。"}, {"word": "feller", "hint": "男、やつ(fellowの口語的発音表記)", "general": "fellow(男、人)の発音をそのまま表したつづり", "example": "\"He's a good feller, even if he talks too much,\" said the old man.", "example_ja": "「あいつはいい奴だよ、ちょっとしゃべりすぎだけどな」と老人は言った。", "note": "a good feller のように使う、fellowの方言的発音。"}, {"word": "reprimand", "hint": "叱責、戒める", "general": "誤りについて、正式に、または厳しく非難すること", "example": "He received a stern reprimand from the schoolmaster.", "example_ja": "彼は校長から厳しい叱責を受けた。", "note": "a stern reprimand のように使う。"}, {"word": "penance", "hint": "償い、罰", "general": "自分の罪や誤りに対して行う、自発的な償い", "example": "He decided that whitewashing the fence would be his penance.", "example_ja": "彼は、その塀にペンキを塗ることが自分の償いになると決めた。", "note": "do penance for ~ のように使う。"}, {"word": "loiter", "hint": "うろつく、ぶらぶらする", "general": "特に目的なく、ある場所にとどまっていること", "example": "The boys loitered near the schoolyard gate, in no hurry to go inside.", "example_ja": "少年たちは、中に入る気もないまま、校庭の門の近くをうろついていた。", "note": "loiter near/around ~ のように使う。"}, {"word": "saunter", "hint": "のんびり歩く、ぶらつく", "general": "急がず、気楽な様子で歩くこと", "example": "He sauntered up to the fence as though he had all the time in the world.", "example_ja": "彼は、まるで時間が無限にあるかのように、その塀へのんびりと歩いていった。", "note": "saunter up/along のように使う。"}, {"word": "nuther", "hint": "別の、もう一つの(anotherの口語的発音表記)", "general": "anotherの発音をそのまま表したつづり", "example": "\"That's a whole nuther story,\" Huck said, shaking his head.", "example_ja": "「それはまったく別の話だな」とハックは首を振りながら言った。", "note": "a whole nuther ~ という決まった口語表現でよく使われる。"}, {"word": "gape", "hint": "口を開けて見つめる", "general": "驚きで、口を開けたままじっと見ること", "example": "The other boys gaped at him in astonishment.", "example_ja": "他の少年たちは、驚いて彼を口を開けて見つめた。", "note": "gape at ~ のように使う。"}, {"word": "swagger", "hint": "威張って歩く、得意げに振る舞う", "general": "自信過剰な様子で、堂々と歩いたり振る舞ったりすること", "example": "He swaggered into the schoolyard as though he owned the place.", "example_ja": "彼は、まるでその場所を自分のものであるかのように、得意げに校庭に入っていった。", "note": "swagger into/around ~ のように使う。"}, {"word": "hapless", "hint": "不運な、ついていない", "general": "運が悪く、不幸な出来事に遭いやすい性質", "example": "The hapless boy seemed to attract trouble wherever he went.", "example_ja": "その不運な少年は、どこへ行っても面倒を引き起こすようだった。", "note": "a hapless victim/boy のように使う、やや文学的。"}, {"word": "woebegone", "hint": "悲しげな、悲嘆にくれた", "general": "非常に悲しく、惨めな様子", "example": "He wore a woebegone expression for the rest of the afternoon.", "example_ja": "彼はその日の午後の残り、悲しげな表情をしていた。", "note": "a woebegone expression/look のように使う、古風な語。"}, {"word": "languish", "hint": "衰える、もの寂しく過ごす", "general": "望みが叶わず、つらい状態で時間を過ごすこと", "example": "He languished at his desk, dreaming of the river outside.", "example_ja": "彼は机の前で、外の川を夢見ながら、もの寂しく過ごした。", "note": "languish in/at ~ のように使う、やや文学的。"}, {"word": "fret", "hint": "いらいらする、思い悩む", "general": "小さなことについて、繰り返し心配すること", "example": "His aunt fretted over him long after he had fallen asleep.", "example_ja": "彼の伯母は、彼が寝入った後も長い間思い悩んでいた。", "note": "fret over/about ~ のように使う。"}, {"word": "scamper", "hint": "ちょこちょこ走る、急いで逃げる", "general": "小さく、すばやい足取りで走ること", "example": "The boys scampered off before anyone could catch them.", "example_ja": "少年たちは、誰にも捕まらないうちに走り去った。", "note": "scamper off/away のように使う。"}, {"word": "clamber", "hint": "よじ登る", "general": "手足を使って、苦労しながら登ること", "example": "They clambered over the fence and dropped down on the other side.", "example_ja": "彼らはその塀をよじ登り、向こう側に飛び降りた。", "note": "clamber over/up ~ のように使う。"}, {"word": "tussle", "hint": "取っ組み合い、もめごと", "general": "小さな、力を使った争いやけんか", "example": "A short tussle broke out near the back of the schoolyard.", "example_ja": "校庭の後ろの方で、短い取っ組み合いが起こった。", "note": "a tussle over ~ のように使う。"}, {"word": "jeer", "hint": "あざける、ひやかす", "general": "相手を嘲笑するように、声を出すこと", "example": "The other boys jeered at him from across the yard.", "example_ja": "他の少年たちは、庭の向こうから彼をあざけった。", "note": "jeer at someone のように使う。"}, {"word": "taunt", "hint": "からかう、なじる", "general": "相手を怒らせるために、何度も嫌なことを言うこと", "example": "He taunted his friend until the boy finally lost his temper.", "example_ja": "彼は友人をからかい続け、ついにその少年は怒りを爆発させた。", "note": "taunt someone about ~ のように使う。"}, {"word": "sneer", "hint": "あざ笑う、見下した笑い", "general": "相手を見下すような、軽蔑的な笑みや言葉", "example": "\"Scared, are you?\" he sneered.", "example_ja": "「怖いのか?」と彼はあざ笑った。", "note": "sneer at ~ のように使う。"}, {"word": "bewilder", "hint": "困惑させる、当惑させる", "general": "理解できず、混乱させること", "example": "The sudden change of plans bewildered everyone.", "example_ja": "その突然の計画変更は、全員を困惑させた。", "note": "be bewildered by ~ のように使う。"}, {"word": "forlornly", "hint": "寂しげに、見捨てられたように", "general": "希望を失い、寂しい様子で", "example": "He stood there forlornly, watching the others walk away.", "example_ja": "彼は寂しげにそこに立ち、他の者たちが歩いていくのを見ていた。", "note": "stand/look forlornly のように使う。"}, {"word": "vow silently", "hint": "心の中で誓う", "general": "声に出さず、自分自身に強く約束すること", "example": "He vowed silently that he would make things right somehow.", "example_ja": "彼は、何とかして物事を正そうと心の中で誓った。", "note": "vow silently のように使う。"}, {"word": "poke", "hint": "袋、小袋(bagの方言的表現)", "general": "小さな袋を表すアメリカ南部方言の語", "example": "He kept his marbles in an old leather poke.", "example_ja": "彼はビー玉を古い革の小袋に入れていた。", "note": "a pig in a poke(袋の中の豚=実物を見ずに買う物)という慣用句にも残る。"}, {"word": "vittles", "hint": "食べ物、食料(victualsの口語的発音表記)", "general": "food(食べ物)を表す古風・方言的な語", "example": "\"We'd best save some vittles for the journey back,\" Huck said.", "example_ja": "「帰りの旅のために、食べ物を少し残しておいた方がいいな」とハックは言った。", "note": "victualsという古語の発音をそのまま表記した形。"}, {"word": "forsaken", "hint": "見捨てられた", "general": "助けや関心を受けられず、放置されている状態", "example": "The old house looked forsaken, with weeds growing in every corner.", "example_ja": "その古い家は見捨てられたように見え、あらゆる隅に雑草が生えていた。", "note": "a forsaken house/place のように使う、文学的な語。"}, {"word": "yearning", "hint": "強い憧れ、切望", "general": "何かを強く欲しい、または望む気持ち", "example": "A yearning for adventure had taken hold of him.", "example_ja": "冒険への強い憧れが、彼を捕らえていた。", "note": "a yearning for ~ のように使う。"}, {"word": "exult", "hint": "大喜びする、勝ち誇る", "general": "成功や勝利を、大きな喜びとともに感じること", "example": "He exulted privately over his small victory.", "example_ja": "彼は、その小さな勝利を密かに大喜びした。", "note": "exult over/in ~ のように使う、やや硬い語。"}, {"word": "reverie", "hint": "夢想、空想", "general": "現実から離れた、楽しい考えにふけっている状態", "example": "He was lost in a reverie when the bell rang.", "example_ja": "鐘が鳴ったとき、彼は夢想にとらわれていた。", "note": "lost in a reverie のように使う、文学的な語。"}, {"word": "howdy", "hint": "こんにちは(how do you doの口語的短縮形のあいさつ)", "general": "カジュアルなあいさつの言葉", "example": "\"Howdy, Tom! Where you been?\" Huck called from across the road.", "example_ja": "「やあトム!どこ行ってたんだ?」とハックは道の向こうから呼びかけた。", "note": "アメリカ南部・西部で特徴的なあいさつ表現。"}, {"word": "languid", "hint": "だるい、ものぐさな", "general": "動きが遅く、活力が感じられない様子", "example": "It was a languid afternoon, too hot to do much of anything.", "example_ja": "それはだるい午後で、何かをするには暑すぎた。", "note": "a languid afternoon/mood のように使う。"}, {"word": "flagrant", "hint": "露骨な、明白な(悪い意味で)", "general": "恥ずかしげもなく、明らかに悪いことをする様子", "example": "It was a flagrant violation of every rule the schoolmaster had ever made.", "example_ja": "それは、校長が作ったあらゆる規則に対する露骨な違反だった。", "note": "a flagrant violation/disregard のように使う、硬い語。"}, {"word": "contemptuous", "hint": "軽蔑的な", "general": "何かを価値がないと見下す態度", "example": "He gave the rules a contemptuous glance and ignored them entirely.", "example_ja": "彼はその規則に軽蔑的な視線を向け、完全に無視した。", "note": "a contemptuous look/tone のように使う。"}, {"word": "meddlesome", "hint": "おせっかいな、干渉好きな", "general": "頼まれていないのに、他人のことに関わろうとする性質", "example": "The meddlesome old woman next door always seemed to know everyone's business.", "example_ja": "隣のおせっかいな老婦人は、いつも誰もの事情を知っているようだった。", "note": "a meddlesome neighbor のように使う。"}, {"word": "obstinate", "hint": "頑固な、言い張る", "general": "自分の考えや態度を変えようとしない性質", "example": "He remained obstinate, refusing to admit he had been wrong.", "example_ja": "彼は頑固なままで、自分が間違っていたことを認めようとしなかった。", "note": "an obstinate person/refusal のように使う。"}, {"word": "snicker", "hint": "こそこそ笑う", "general": "小さく、隠れたように笑うこと", "example": "He could hear the other boys snickering behind him.", "example_ja": "彼は、他の少年たちが後ろでこそこそ笑っているのが聞こえた。", "note": "snicker at ~ の形でも使う。"}, {"word": "yelp", "hint": "(犬や人が)キャンと鳴く、悲鳴を上げる", "general": "短く鋭い、痛みや驚きの声", "example": "The dog let out a yelp when it stepped on the broken glass.", "example_ja": "その犬は割れたガラスを踏んで、キャンと鳴いた。", "note": "a dog yelps / let out a yelp のように使う。"}, {"word": "holler", "hint": "大声で叫ぶ(shoutの口語形)", "general": "shoutの口語的な形", "example": "He could hear his aunt hollering his name from the porch.", "example_ja": "彼は、伯母がポーチから自分の名前を大声で呼んでいるのが聞こえた。", "note": "holler at someone のように使う。アメリカ口語で広く使われる。"}, {"word": "furtively", "hint": "こそこそと、ひそかに", "general": "見つからないように、隠れて行う様子で", "example": "He glanced furtively over his shoulder before slipping through the gap in the fence.", "example_ja": "彼はこそこそと肩越しに見回した後、その塀の隙間を通り抜けた。", "note": "glance furtively のように使う。"}, {"word": "y'all", "hint": "あなたたち(you allの口語的短縮形)", "general": "複数の「あなた」を表すアメリカ南部方言の表現", "example": "\"Y'all better hurry up before it gets dark,\" he warned.", "example_ja": "「暗くなる前に、お前ら急いだほうがいいぞ」と彼は警告した。", "note": "アメリカ南部英語の最も有名な特徴の一つ。"}, {"word": "tote", "hint": "運ぶ(carryの口語的な形)", "general": "carryの口語的・方言的な形", "example": "He toted the heavy bucket all the way from the well.", "example_ja": "彼は井戸からずっと、その重いバケツを運んだ。", "note": "tote a bucket/bag のように使う、アメリカ口語の動詞。"}, {"word": "ramshackle", "hint": "おんぼろの、ぐらぐらの", "general": "古くなって、崩れそうな状態の建物など", "example": "The ramshackle old house had been empty for years.", "example_ja": "そのおんぼろの古い家は、何年も空き家になっていた。", "note": "a ramshackle house/building のように使う。"}, {"word": "derelict", "hint": "見捨てられた、放置された", "general": "使われなくなり、荒れ果てた状態の建物など", "example": "They had found a derelict cabin deep in the woods.", "example_ja": "彼らは、森の奥に放置された小屋を見つけた。", "note": "a derelict building/cabin のように使う。"}, {"word": "dunno", "hint": "分からない(don't knowの口語的短縮形)", "general": "I don't knowの口語的・カジュアルな短縮形", "example": "\"Dunno where he went,\" the boy shrugged.", "example_ja": "「あいつがどこに行ったかなんて知らないよ」とその少年は肩をすくめた。", "note": "I dunno. のように単独で使われることが多い、現代でも使われる短縮形。"}, {"word": "gonna", "hint": "~するつもりだ(going toの口語的短縮形)", "general": "going toの口語的・カジュアルな短縮形", "example": "\"I'm gonna tell Aunt Polly everything,\" he threatened.", "example_ja": "「アント・ポリーに全部言いつけてやるからな」と彼は脅した。", "note": "現代英語でも非常によく使われる口語的短縮形。"}, {"word": "wanna", "hint": "~したい(want toの口語的短縮形)", "general": "want toの口語的・カジュアルな短縮形", "example": "\"Don't you wanna come with us?\" Tom asked.", "example_ja": "「お前も一緒に来たくないのか?」とトムは聞いた。", "note": "want toの発音をそのまま表したつづり。"}, {"word": "clandestine", "hint": "秘密の、ひそかな", "general": "隠れて、こっそりと行われる性質", "example": "They had arranged a clandestine meeting after dark.", "example_ja": "彼らは、暗くなってからの秘密の会合を取りつけていた。", "note": "a clandestine meeting/plan のように使う、硬い語。"}, {"word": "yep", "hint": "うん、そうだ(yesの口語的な形)", "general": "yes のくだけた言い方", "example": "\"You scared?\" \"Yep,\" he admitted.", "example_ja": "「怖いのか?」「うん」と彼は認めた。", "note": "カジュアルな会話で使われる。反対はnope。"}, {"word": "nope", "hint": "いや、違う(noの口語的な形)", "general": "no のくだけた言い方", "example": "\"Found anything?\" \"Nope, nothing yet.\"", "example_ja": "「何か見つかったか?」「いや、まだ何も」", "note": "yepの反対語として対になって使われることが多い。"}, {"word": "trepidation", "hint": "恐れ、不安", "general": "これから起こることへの、強い不安の気持ち", "example": "He approached the old house with a growing sense of trepidation.", "example_ja": "彼は、募る不安の感覚を抱きながら、その古い家に近づいた。", "note": "a sense of trepidation のように使う、やや硬い語。"}, {"word": "foreboding", "hint": "嫌な予感、不吉な予兆", "general": "悪いことが起こるという、強い予感", "example": "A vague sense of foreboding kept him from going any further.", "example_ja": "漠然とした不吉な予感が、彼をそれ以上先に進めなくさせた。", "note": "a sense of foreboding のように使う、文学的な語。"}, {"word": "warn't", "hint": "〜ではなかった(wasn't/weren'tの方言形)", "general": "was not / were not の南部方言的な発音表記", "example": "\"I warn't doing nothing,\" Tom muttered under his breath.", "example_ja": "「何もしてなかったんだよ」とトムは小声でつぶやいた。", "note": "wasn't/weren'tの方言表記。"}, {"word": "gwyne", "hint": "〜するつもりだ(going toの方言形)", "general": "going to の南部方言的な発音表記", "example": "\"I'm gwyne to tell on you,\" the boy threatened.", "example_ja": "「お前のことをチクってやるぞ」とその少年は脅した。", "note": "going toの方言表記。"}, {"word": "sich", "hint": "そのような(suchの方言形)", "general": "such の南部方言的な発音表記", "example": "\"I never seen sich a mess in my life,\" she said, shaking her head.", "example_ja": "「こんな汚れ、生まれて初めて見たよ」と彼女は頭を振りながら言った。", "note": "suchの方言表記。"}, {"word": "yourn", "hint": "あなたのもの(yoursの方言形)", "general": "yours の南部方言的な発音表記", "example": "\"That dog ain't yourn,\" the boy said flatly.", "example_ja": "「その犬はお前のもんじゃないだろ」とその少年は平然と言った。", "note": "yoursの方言表記。"}, {"word": "hisn", "hint": "彼のもの(hisの方言形)", "general": "his(所有代名詞) の南部方言的な発音表記", "example": "\"That hat there, that's hisn,\" someone pointed out.", "example_ja": "「あそこの帽子、それは彼のだよ」と誰かが指摘した。", "note": "his(彼のもの)の方言表記。"}, {"word": "hisself", "hint": "彼自身(himselfの方言形)", "general": "himself の南部方言的な発音表記", "example": "\"He done it all hisself,\" the boy bragged.", "example_ja": "「あいつ、全部自分一人でやったんだぜ」とその少年は自慢した。", "note": "himselfの方言表記。"}, {"word": "twixt", "hint": "〜の間に(betwixt/betweenの古い形)", "general": "between の古風な、または方言的な表記", "example": "The cave lay twixt the river and the hill.", "example_ja": "その洞窟は、川と丘の間にあった。", "note": "betweenのやや古風・方言的な表記。"}, {"word": "afeard", "hint": "怖がっている(afraidの方言形)", "general": "afraid の南部方言的な発音表記", "example": "\"I ain't afeard of no ghost,\" Tom said, though his voice shook.", "example_ja": "「幽霊なんか怖くないよ」とトムは言ったが、声は震えていた。", "note": "afraidの方言表記。"}, {"word": "druther", "hint": "〜の方がいい(would ratherの方言形)", "general": "would rather の南部方言的な発音表記", "example": "\"I'd druther go fishing than do chores,\" he grumbled.", "example_ja": "「家の手伝いより釣りに行く方がましだよ」と彼はぶつぶつ言った。", "note": "would ratherの方言表記。"}, {"word": "powerful", "hint": "とても、非常に(口語的な強調表現)", "general": "veryの代わりに使われる、口語的な強調表現", "example": "\"That sun's powerful hot today,\" the old man said, wiping his brow.", "example_ja": "「今日の日差しはものすごく暑いな」とその老人は額を拭いながら言った。", "note": "powerful + 形容詞 でveryの代わりとして使う口語表現。"}, {"word": "calculate", "hint": "〜だと思う(believe/supposeの口語的代用)", "general": "believe や suppose の意味で使われる、口語的な動詞", "example": "\"I calculate he'll be along directly,\" the man said.", "example_ja": "「彼はすぐに来るだろうと思うよ」とその男は言った。", "note": "I calculate (that) ~ で「〜だと思う」の意味になる口語表現。"}, {"word": "allow", "hint": "〜だと思う、言う(believe/sayの口語的代用)", "general": "believe や say の意味で使われる、口語的な動詞", "example": "\"I allow we'd best be getting home,\" she said.", "example_ja": "「もう家に帰った方がいいと思うよ」と彼女は言った。", "note": "I allow (that) ~ で「〜だと思う」の意味になる口語表現。"}, {"word": "spect", "hint": "〜だと思う(expectの省略形)", "general": "expect の口語的な短縮表記", "example": "\"I spect he's right,\" the boy admitted.", "example_ja": "「あいつの言う通りだと思うよ」とその少年は認めた。", "note": "expectの口語的短縮表記。"}, {"word": "younguns", "hint": "子供たち(young onesの方言形)", "general": "young ones(子供たち) の南部方言的な発音表記", "example": "\"Get on home, you younguns,\" the woman called out.", "example_ja": "「家に帰りなさい、子供たち」とその女性は呼びかけた。", "note": "young onesの方言表記。"}, {"word": "critter", "hint": "生き物、動物(creatureの方言形)", "general": "creature の口語的・方言的な発音表記", "example": "\"What kind of critter makes a noise like that?\" Huck whispered.", "example_ja": "「あんな音を出す生き物って何だろう」とハックはささやいた。", "note": "creatureの方言表記。"}, {"word": "varmint", "hint": "害獣、厄介者(varmint=vermin)", "general": "害をなす動物や、嫌われ者の人を指す口語的な語", "example": "\"That old cat's a real varmint,\" the farmer complained.", "example_ja": "「あの老いた猫は本当に厄介者だ」とその農夫はこぼした。", "note": "vermin(害獣)の口語的な発音表記。"}, {"word": "skeer", "hint": "怖がらせる(scareの方言形)", "general": "scare の南部方言的な発音表記", "example": "\"Don't skeer me like that!\" she shouted.", "example_ja": "「そんな風に驚かさないでよ!」と彼女は叫んだ。", "note": "scareの方言表記。"}, {"word": "'em", "hint": "彼ら、それらを(themの省略形)", "general": "them の口語的な短縮表記", "example": "\"Just leave 'em be,\" Tom said, waving his hand.", "example_ja": " const STORAGE_KEY = 'tomsawyer-flashcards-mastered-v1';
const LANG_KEY = 'tomsawyer-flashcards-lang-v1';

let mastered = new Set();
try{
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  mastered = new Set(saved);
}catch(e){ mastered = new Set(); }

let lang = 'ja'; // 'ja' or 'en'
try{
  const savedLang = localStorage.getItem(LANG_KEY);
  if(savedLang === 'en' || savedLang === 'ja') lang = savedLang;
}catch(e){ lang = 'ja'; }

let deck = [];          // active (unmastered) cards, in working order
let originalOrder = []; // initial order of active cards (for restart)
let shownHistory = [];  // words shown in live order (for browsing back)
let browseIndex = null; // null = live; else index into shownHistory
let flipped = false;
let panelOpen = false;
let loopingWord = null;
let loopingSelector = null;

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(mastered)));
  }catch(e){}
}

function saveLang(){
  try{
    localStorage.setItem(LANG_KEY, lang);
  }catch(e){}
}

function buildDeck(){
  deck = WORDS.filter(w => !mastered.has(w.word));
  originalOrder = deck.slice();
  shownHistory = [];
  browseIndex = null;
}

function getCurrentWord(){
  if(browseIndex !== null){
    return WORDS.find(w => w.word === shownHistory[browseIndex]);
  }
  return deck[0];
}

function speakOnce(word, onEnd){
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.onend = onEnd;
  utter.onerror = onEnd;
  window.speechSynthesis.speak(utter);
}

function startLoop(text, selector){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  loopingWord = text;
  loopingSelector = selector;
  const el = document.querySelector(selector);
  if(el) el.classList.add('looping');

  const playNext = () => {
    if(loopingWord !== text) return;
    speakOnce(text, () => {
      if(loopingWord !== text) return;
      setTimeout(() => {
        if(loopingWord === text) playNext();
      }, 250);
    });
  };
  playNext();
}

function stopLoop(){
  loopingWord = null;
  window.speechSynthesis.cancel();
  if(loopingSelector){
    const el = document.querySelector(loopingSelector);
    if(el) el.classList.remove('looping');
  }
  loopingSelector = null;
}

function updateProgress(){
  const total = WORDS.length;
  const done = mastered.size;
  document.getElementById('progressLabel').textContent = `${done} / ${total} 習得`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;

  const posLabel = document.getElementById('posLabel');
  if(posLabel){
    if(browseIndex !== null){
      const histLabel = lang === 'ja' ? '履歴' : 'History';
      posLabel.textContent = `${histLabel} ${browseIndex + 1} / ${shownHistory.length}`;
    } else if(deck.length > 0 && originalOrder.length > 0){
      const idx = originalOrder.findIndex(w => w.word === deck[0].word);
      const displayIdx = idx >= 0 ? idx + 1 : '?';
      posLabel.textContent = `${displayIdx} / ${originalOrder.length}`;
    } else {
      posLabel.textContent = '';
    }
  }

  renderMasteredList();
}

function speakerIcon(){
  return `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
}

function frontHTML(current){
  const tapHint = lang === 'ja' ? '単語をタップ / クリック' : 'Tap or click the word';
  const eyebrow = lang === 'ja' ? 'タップして意味を見る' : 'Tap to see the meaning';
  return `
    <div class="eyebrow">${eyebrow}</div>
    <div class="word-row">
      <div class="word">${current.word}</div>
      <button class="speak-btn" id="speakBtn" title="発音を聞く">${speakerIcon()}</button>
    </div>
    <div class="tap-hint">${tapHint}</div>
  `;
}

function backHTML(current){
  const generalBlock = current.general ? `
      <div class="general-block">
        <div class="general-label">${lang === 'ja' ? '本来の意味' : 'Definition'}</div>
        <div class="general-text">${current.general}</div>
      </div>` : '';

  const noteBlock = current.note ? `
      <div class="note-block">
        <div class="note-label">${lang === 'ja' ? 'ヒント' : 'Note'}</div>
        <div class="note-text">${current.note}</div>
      </div>` : '';

  const exampleJaBlock = lang === 'ja' ? `<div class="example-ja-text">${current.example_ja}</div>` : '';

  const backTapHint = lang === 'ja' ? 'タップで単語に戻る' : 'Tap to go back';
  const exampleHint = lang === 'ja' ? '(タップで読み上げ)' : '(Tap to listen)';

  return `
    <div class="back-scroll">
      <div class="hint-block">
        <div class="hint-label">${lang === 'ja' ? '意味のヒント' : 'Hint'}</div>
        <div class="hint-text">${current.hint}</div>
        ${generalBlock}
        <div class="example-label">Example <span class="example-hint">${exampleHint}</span></div>
        <div class="example-text clickable" id="exampleText">${current.example}</div>
        ${exampleJaBlock}
        ${noteBlock}
      </div>
      <div class="back-tap-hint tap-hint">${backTapHint}</div>
    </div>
  `;
}

function attachExampleHandler(current){
  const exampleEl = document.getElementById('exampleText');
  if(exampleEl){
    exampleEl.addEventListener('click', (e) => {
      e.stopPropagation();
      if(loopingWord === current.example && loopingSelector === '#exampleText'){
        stopLoop();
      } else {
        startLoop(current.example, '#exampleText');
      }
    });
  }
}

function attachSpeakHandler(current){
  const speakBtn = document.getElementById('speakBtn');
  if(speakBtn){
    speakBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(loopingWord === current.word && loopingSelector === '.speak-btn'){
        stopLoop();
      } else {
        startLoop(current.word, '.speak-btn');
      }
    });
  }
}

function render(){
  stopLoop();
  const stage = document.getElementById('stage');
  const controls = document.getElementById('controls');

  if(deck.length === 0 && browseIndex === null){
    const doneTitle = lang === 'ja' ? 'よくできました' : 'All done!';
    const doneMsg = lang === 'ja'
      ? 'すべての単語が習得済みになりました。<br>「習得済み一覧」から単語を復活させるか、「すべてリセット」を押すと、もう一度練習できます。'
      : 'All words are marked as mastered.<br>Restore words from the mastered list, or reset everything to practice again.';
    stage.innerHTML = `
      <div class="empty-state">
        <div class="word">${doneTitle}</div>
        <p>${doneMsg}</p>
      </div>
    `;
    if(shownHistory.length > 0){
      controls.style.display = 'flex';
      document.getElementById('skipBtn').style.display = 'none';
      document.getElementById('masterBtn').style.display = 'none';
    } else {
      controls.style.display = 'none';
    }
    updateProgress();
    return;
  }

  controls.style.display = 'flex';
  document.getElementById('skipBtn').style.display = 'flex';
  document.getElementById('masterBtn').style.display = 'flex';
  flipped = false;

  let current, next;
  if(browseIndex !== null){
    current = WORDS.find(w => w.word === shownHistory[browseIndex]);
    next = null;
  } else {
    current = deck[0];
    next = deck[1];
  }

  stage.innerHTML = `
    ${next ? `<div class="card behind"></div>` : ''}
    <div class="card front" id="currentCard">
      ${frontHTML(current)}
    </div>
  `;

  document.getElementById('currentCard').addEventListener('click', (e) => {
    if(e.target.closest('.speak-btn')) return;
    if(e.target.closest('#exampleText')) return;
    flipCard();
  });

  attachSpeakHandler(current);

  const masterBtn = document.getElementById('masterBtn');
  if(masterBtn){
    masterBtn.textContent = lang === 'ja' ? '習得済み ✓' : 'Mastered ✓';
    masterBtn.classList.remove('is-mastered');
  }

  const prevBtn = document.getElementById('prevBtn');
  const skipBtn = document.getElementById('skipBtn');
  const restartBtn = document.getElementById('restartBtn');

  if(browseIndex !== null){
    if(prevBtn) prevBtn.disabled = (browseIndex === 0);
    if(skipBtn) skipBtn.textContent = lang === 'ja' ? '進む →' : 'Forward →';
    if(skipBtn) skipBtn.disabled = false;
    if(masterBtn) masterBtn.disabled = true;
  } else {
    if(prevBtn) prevBtn.disabled = (shownHistory.length === 0);
    if(skipBtn) skipBtn.textContent = lang === 'ja' ? '次へ →' : 'Next →';
    if(skipBtn) skipBtn.disabled = (deck.length === 0);
    if(masterBtn) masterBtn.disabled = (deck.length === 0);
  }
  if(restartBtn) restartBtn.disabled = originalOrder.length === 0;

  updateProgress();
}

function flipCard(){
  if(flipped) {
    showFront();
    return;
  }
  stopLoop();
  const card = document.getElementById('currentCard');
  const current = getCurrentWord();
  flipped = true;

  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.add('flipped-card');
    card.innerHTML = backHTML(current);
    attachExampleHandler(current);
    card.classList.remove('flipping');
  }, 220);
}

function showFront(){
  stopLoop();
  const card = document.getElementById('currentCard');
  const current = getCurrentWord();
  flipped = false;
  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.remove('flipped-card');
    card.innerHTML = frontHTML(current);
    attachSpeakHandler(current);
    card.classList.remove('flipping');
  }, 220);
}

function nextCard(){
  const card = document.getElementById('currentCard');
  if(!card){ return; }

  if(browseIndex !== null){
    // browsing history: step forward, or return to live
    card.classList.add('exit-left');
    setTimeout(() => {
      if(browseIndex < shownHistory.length - 1){
        browseIndex++;
      } else {
        browseIndex = null;
      }
      render();
    }, 260);
    return;
  }

  if(deck.length === 0) return;
  const current = deck[0];

  shownHistory.push(current.word);
  if(shownHistory.length > 200) shownHistory.shift();

  card.classList.add('exit-left');
  setTimeout(() => {
    // move current word to the end of the deck (not mastered yet)
    deck.push(deck.shift());
    render();
  }, 260);
}

function prevCard(){
  if(browseIndex !== null){
    if(browseIndex > 0) browseIndex--;
    render();
    return;
  }
  if(shownHistory.length === 0) return;
  browseIndex = shownHistory.length - 1;
  render();
}

function restartDeck(){
  const remainingWords = new Set(deck.map(w => w.word));
  deck = originalOrder.filter(w => remainingWords.has(w.word));
  shownHistory = [];
  browseIndex = null;
  render();
}

function toggleMastered(){
  if(browseIndex !== null || deck.length === 0) return;
  const card = document.getElementById('currentCard');
  const current = deck[0];

  shownHistory.push(current.word);
  if(shownHistory.length > 200) shownHistory.shift();

  mastered.add(current.word);
  saveProgress();

  if(card){
    card.classList.add('exit-left');
    setTimeout(() => {
      deck.shift();
      render();
    }, 260);
  } else {
    deck.shift();
    render();
  }
}

function renderMasteredList(){
  const list = document.getElementById('masteredList');
  const masteredWords = WORDS.filter(w => mastered.has(w.word));

  if(masteredWords.length === 0){
    const emptyMsg = lang === 'ja' ? '習得済みの単語はまだありません。' : 'No mastered words yet.';
    list.innerHTML = `<li class="mastered-empty" style="background:none;">${emptyMsg}</li>`;
    return;
  }

  const restoreLabel = lang === 'ja' ? '解除' : 'Undo';

  list.innerHTML = masteredWords.map(w => `
    <li>
      <span class="m-word">${w.word}</span>
      <button class="restore-btn" data-word="${w.word}">${restoreLabel}</button>
    </li>
  `).join('');

  list.querySelectorAll('.restore-btn').forEach(btn => {
    btn.addEventListener('click', () => restoreWord(btn.dataset.word));
  });
}

function restoreWord(word){
  mastered.delete(word);
  saveProgress();
  const w = WORDS.find(item => item.word === word);
  if(w && !deck.some(d => d.word === word)){
    deck.push(w);
  }
  if(w && !originalOrder.some(d => d.word === word)){
    originalOrder.push(w);
  }
  render();
}

function updateStaticLabels(){
  const title = document.getElementById('appTitle');
  if(title){
    title.innerHTML = lang === 'ja'
      ? 'Tom Sawyer <span class="accent">語彙カード</span>'
      : 'Tom Sawyer <span class="accent">Vocabulary Cards</span>';
  }

  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) resetBtn.textContent = lang === 'ja' ? 'すべてリセット' : 'Reset all';

  const toggleBtn = document.getElementById('masteredToggleBtn');
  if(toggleBtn){
    const label = lang === 'ja' ? '習得済み一覧' : 'Mastered list';
    toggleBtn.textContent = panelOpen ? `${label} ▴` : `${label} ▾`;
  }

  const panelHeading = document.getElementById('masteredHeading');
  if(panelHeading) panelHeading.textContent = lang === 'ja' ? '習得済みの単語' : 'Mastered words';

  const prevBtn = document.getElementById('prevBtn');
  if(prevBtn) prevBtn.textContent = lang === 'ja' ? '← 前へ' : '← Prev';

  const nextBtn = document.getElementById('skipBtn');
  if(nextBtn) nextBtn.textContent = lang === 'ja' ? '次へ →' : 'Next →';

  const restartBtn = document.getElementById('restartBtn');
  if(restartBtn) restartBtn.textContent = lang === 'ja' ? '⟲ 最初' : '⟲ Start';

  const langBtn = document.getElementById('langToggleBtn');
  if(langBtn) langBtn.textContent = lang === 'ja' ? 'EN' : '日本語';
}

document.getElementById('skipBtn').addEventListener('click', () => nextCard());
document.getElementById('prevBtn').addEventListener('click', () => prevCard());
document.getElementById('masterBtn').addEventListener('click', () => toggleMastered());
document.getElementById('restartBtn').addEventListener('click', () => restartDeck());

document.getElementById('resetBtn').addEventListener('click', () => {
  const msg = lang === 'ja' ? '習得済みの記録をすべてリセットしますか？' : 'Reset all mastered-word progress?';
  if(confirm(msg)){
    mastered = new Set();
    saveProgress();
    buildDeck();
    render();
  }
});

document.getElementById('masteredToggleBtn').addEventListener('click', () => {
  panelOpen = !panelOpen;
  const panel = document.getElementById('masteredPanel');
  panel.classList.toggle('open', panelOpen);
  updateStaticLabels();
  if(panelOpen) renderMasteredList();
});

document.getElementById('langToggleBtn').addEventListener('click', () => {
  lang = (lang === 'ja') ? 'en' : 'ja';
  saveLang();
  updateStaticLabels();
  render();
});

document.addEventListener('keydown', (e) => {
  if(e.code === 'Space'){
    e.preventDefault();
    flipCard();
  } else if(e.code === 'ArrowRight'){
    nextCard();
  } else if(e.code === 'ArrowLeft'){
    prevCard();
  } else if(e.code === 'Enter'){
    toggleMastered();
  }
});

buildDeck();
updateStaticLabels();
render();
</script></body></html>
