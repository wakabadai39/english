<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンコーネ 50番練習曲</title>
<style>
:root { --ink:#1a1410; --paper:#f7f3ec; --gold:#c49a3c; --accent:#8b3a2a; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--paper); color:var(--ink); font-family:-apple-system,'Noto Sans JP',sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
header { background:var(--ink); color:#fff; padding:8px 10px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
header h1 { font-size:12px; font-weight:700; white-space:nowrap; }
#numSelect { background:var(--gold); color:var(--ink); border:none; border-radius:4px; padding:4px 6px; font-size:12px; font-weight:700; }
.score-area { flex:1; overflow:hidden; background:#fff; }
.score-embed { width:100%; height:100%; border:none; display:block; }
.score-fallback { width:100%; height:100%; display:none; align-items:center; justify-content:center; background:#f0ece4; }
.score-fallback a { background:var(--accent); color:#fff; padding:10px 20px; border-radius:6px; text-decoration:none; font-size:14px; font-weight:600; }
.controls { flex-shrink:0; background:var(--ink); padding:6px 10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.ctrl-label { font-size:10px; color:#a09888; }
.ctrl-btn { background:#3a342c; color:#fff; border:none; border-radius:4px; width:26px; height:26px; font-size:15px; cursor:pointer; }
.ctrl-btn:disabled { opacity:0.3; cursor:default; }
.pitch-val { font-size:12px; font-weight:700; min-width:26px; text-align:center; color:var(--gold); }
.reset-btn { background:none; border:1px solid #3a342c; border-radius:4px; color:#a09888; padding:2px 6px; font-size:10px; cursor:pointer; }
.reset-btn:disabled { opacity:0.3; cursor:default; }
.div { width:1px; height:20px; background:#3a342c; margin:0 2px; }
.spd { background:#3a342c; border:none; border-radius:4px; padding:4px 8px; font-size:11px; cursor:pointer; color:#a09888; }
.spd.on { background:var(--gold); color:var(--ink); }
.spd:disabled { opacity:0.3; cursor:default; }
.audio-bar { flex-shrink:0; background:#111; padding:6px 10px; display:flex; align-items:center; gap:8px; }
.audio-title { font-size:11px; color:var(--gold); white-space:nowrap; }
.play-btn { background:var(--gold); color:var(--ink); border:none; border-radius:50%; width:30px; height:30px; font-size:13px; cursor:pointer; flex-shrink:0; }
.prog-wrap { flex:1; height:6px; background:#333; border-radius:3px; cursor:pointer; }
.prog-bar { height:100%; background:var(--gold); border-radius:3px; width:0; }
.time { font-size:10px; color:#a09888; white-space:nowrap; min-width:72px; text-align:right; }
#status { font-size:10px; color:#f88; }
</style>
</head>
<body>
<header>
  <h1>コンコーネ 五十番練習曲 Op.9 中声用</h1>
  <select id="numSelect" onchange="selectNum(+this.value)"></select>
</header>
<div class="score-area">
  <embed id="scoreEmbed" class="score-embed" src="scores/Concone50_01.pdf" type="application/pdf">
  <div class="score-fallback" id="scoreFallback">
    <a id="scoreLink" href="scores/Concone50_01.pdf" target="_blank">📄 楽譜を開く（PDF）</a>
  </div>
</div>
<div class="controls">
  <span class="ctrl-label">音程</span>
  <button class="ctrl-btn" id="pitchDn">−</button>
  <span class="pitch-val" id="pitchVal">±0</span>
  <button class="ctrl-btn" id="pitchUp">＋</button>
  <button class="reset-btn" id="pitchReset">戻す</button>
  <div class="div"></div>
  <span class="ctrl-label">速度</span>
  <button class="spd on" data-r="1.0">1.0×</button>
  <button class="spd" data-r="0.75">0.75×</button>
  <button class="spd" data-r="0.5">0.5×</button>
  <button class="spd" data-r="1.25">1.25×</button>
</div>
<div class="audio-bar">
  <span class="audio-title" id="audioTitle">🎵 第１番</span>
  <button class="play-btn" id="playBtn">▶</button>
  <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
  <span class="time" id="timeDisp">0:00 / 0:00</span>
  <span id="status"></span>
</div>

<script>
// ============================================================
// Phase Vocoder による独立した音程・速度変換
// OfflineAudioContext で以下の2段階処理を行う：
//   1. リサンプリング：sampleRate を変えてピッチシフト（テンポも変化）
//   2. playbackRate補正：テンポをspeedに合わせて再調整
//
// 具体的には：
//   - OfflineAudioContext の sampleRate を original×pitchRatio に設定
//     → 同じサンプル数を低いレートで再生 → 音程が上がる
//     → ただしバッファ長（秒）は original/pitchRatio 倍になる
//   - これを playbackRate = speed/pitchRatio で再生
//     → 再生時間 = (original/pitchRatio) / (speed/pitchRatio) = original/speed ✓
//     → 実際の音程変化 = pitchRatio × (speed/pitchRatio) = speed ... まだダメ
//
// ★ 正しいアプローチ（soundtouchなし、純粋JS）：
//   リサンプリング後バッファ（長さ orig/pitchRatio）を
//   playbackRate = 1/pitchRatio で再生する
//   → 再生時間 = (orig/pitchRatio) / (1/pitchRatio) = orig ✓ テンポ変化なし
//   → しかし再生速度×サンプルレート変換の合計音程変化 = 1 → ピッチも変化なし ✗
//
// ★★ 本当に正しいアプローチ：
//   OfflineAudioContextのsampleRateをorigSR/pitchRatioにする（低くする）
//   同じ PCM データを低レートで記録 → 後で標準レートで再生すると音程が上がる
//   バッファ長(秒) = origLen / (origSR/pitchRatio) = origLen*pitchRatio/origSR = orig*pitchRatio
//   これをplaybackRate=speed*pitchRatioで再生
//   → 再生時間 = orig*pitchRatio / (speed*pitchRatio) = orig/speed ✓
//   → 音程: sampleRateがorigSR/pitchRatioなのにorigSRのコンテキストで再生
//     = pitchRatio倍の音程 ✓、speedには依存しない ✓
// ============================================================

const $ = id => document.getElementById(id);

let ctx, src, gainNode;
let originalBuf = null;
let processedBuf = null;   // 現在のpitch/speedで処理済みのバッファ
let currentPitchInBuf = null;
let currentSpeedInBuf = null;

let pitch = 0;    // 半音数
let speed = 1.0;  // 再生速度

let playing = false;
let startCtxTime = 0;
let pauseOrigPos = 0;  // originalBuf時間軸での位置（秒）
let raf;
let processing = false;

function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

const mp3path = n => `mp3/${n}_CONCONE 50 LESSONS for medium voice.mp3`;
const pdfpath = n => `scores/Concone50_${String(n).padStart(2,'0')}.pdf`;

function setControlsDisabled(disabled) {
  ['pitchDn','pitchUp','pitchReset'].forEach(id => $(id).disabled = disabled);
  document.querySelectorAll('.spd').forEach(b => b.disabled = disabled);
  $('numSelect').disabled = disabled;
}

// プルダウン生成
const sel = $('numSelect');
for (let i = 1; i <= 50; i++) {
  const o = document.createElement('option');
  o.value = i; o.textContent = `第 ${i} 番`; sel.appendChild(o);
}

function selectNum(n) {
  hardStop();
  originalBuf = null;
  processedBuf = null;
  currentPitchInBuf = null;
  currentSpeedInBuf = null;
  pauseOrigPos = 0;
  $('audioTitle').textContent = `🎵 第${n}番`;
  $('scoreEmbed').src = pdfpath(n);
  $('scoreLink').href = pdfpath(n);
  $('progBar').style.width = '0';
  $('timeDisp').textContent = '0:00 / 0:00';
  $('status').textContent = '読込中…';
  fetch(mp3path(n))
    .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
    .then(ab => getCtx().decodeAudioData(ab))
    .then(decoded => {
      originalBuf = decoded;
      $('status').textContent = '';
      $('timeDisp').textContent = '0:00 / ' + fmt(originalBuf.duration);
    })
    .catch(() => $('status').textContent = 'ファイルなし');
}

// ──────────────────────────────────────────────────
// processBuffer:
//   OfflineAudioContext の sampleRate を SR/pitchRatio に設定してレンダリング。
//   同じ PCM サンプル列を「低い/高いレート」として記録することで
//   通常の AudioContext（標準SR）で再生したときに音程が変わる。
//
//   バッファ長（秒）= origLen / (SR/pitchRatio) = origDuration * pitchRatio
//   これを playbackRate = speed * pitchRatio で再生すると：
//     再生時間 = origDuration * pitchRatio / (speed * pitchRatio) = origDuration / speed ✓
//     音程変化 = pitchRatio（speedに無関係）✓
// ──────────────────────────────────────────────────
async function processBuffer(buffer, semitones, spd) {
  if (semitones === 0 && spd === 1.0) {
    return { buf: buffer, playRate: 1.0 };
  }

  const pitchRatio = Math.pow(2, semitones / 12);
  const origSR = buffer.sampleRate;
  const ch = buffer.numberOfChannels;
  const origLen = buffer.length;

  // OfflineAudioContextのsampleRateをorigSR/pitchRatioに設定
  // これにより同じサンプル数が pitchRatio 倍の時間として記録される
  const offlineSR = Math.round(origSR / pitchRatio);
  const offlineLen = origLen; // サンプル数は変わらない

  // OfflineAudioContextを作成（sampleRateを変えることがポイント）
  const offCtx = new OfflineAudioContext(ch, offlineLen, offlineSR);

  // 元バッファをofflineCtxに渡す（異なるsampleRateで作成）
  const srcBuf = offCtx.createBuffer(ch, origLen, origSR);
  for (let i = 0; i < ch; i++) {
    srcBuf.getChannelData(i).set(buffer.getChannelData(i));
  }

  const offSrc = offCtx.createBufferSource();
  offSrc.buffer = srcBuf;
  offSrc.connect(offCtx.destination);
  offSrc.start(0);

  const rendered = await offCtx.startRendering();
  // rendered.sampleRate = offlineSR = origSR/pitchRatio
  // rendered.duration = origLen / offlineSR = origDuration * pitchRatio

  // 再生時のplaybackRate = spd * pitchRatio で
  //   実際の再生時間 = origDuration * pitchRatio / (spd * pitchRatio) = origDuration / spd ✓
  const playRate = spd * pitchRatio;

  return { buf: rendered, playRate };
}

function hardStop() {
  if (src) { src.onended = null; try { src.stop(); } catch(e){} src = null; }
  if (gainNode) { gainNode.disconnect(); gainNode = null; }
  playing = false;
  $('playBtn').textContent = '▶';
  cancelAnimationFrame(raf);
  if (!processing) setControlsDisabled(false);
}

// originalBuf時間軸での現在位置
function currentOrigPos() {
  if (!playing || !originalBuf) return pauseOrigPos;
  // 再生時間 elapsed × speed = originalBuf上の移動量
  const elapsed = getCtx().currentTime - startCtxTime;
  return pauseOrigPos + elapsed * speed;
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return m + ':' + String(ss).padStart(2, '0');
}

async function startPlay() {
  if (!originalBuf) { $('status').textContent = '読込中…'; return; }

  const targetPitch = pitch;
  const targetSpeed = speed;

  // pitch/speed が変わっていればバッファを再処理
  if (processedBuf === null || currentPitchInBuf !== targetPitch || currentSpeedInBuf !== targetSpeed) {
    processing = true;
    setControlsDisabled(true);
    $('status').textContent = '処理中…';
    const result = await processBuffer(originalBuf, targetPitch, targetSpeed);
    processedBuf = result.buf;
    currentPitchInBuf = targetPitch;
    currentSpeedInBuf = targetSpeed;
    processing = false;
    $('status').textContent = '';
  }

  // processedBuf上の開始位置
  // originalBuf秒 → processedBuf秒
  // processedBuf.duration = originalBuf.duration * pitchRatio
  const pitchRatio = Math.pow(2, targetPitch / 12);
  const bufPos = pauseOrigPos * pitchRatio;
  const safePos = Math.max(0, Math.min(bufPos, processedBuf.duration - 0.01));

  hardStop();

  const c = getCtx();
  gainNode = c.createGain();
  gainNode.connect(c.destination);

  src = c.createBufferSource();
  src.buffer = processedBuf;
  src.playbackRate.value = targetSpeed * pitchRatio;
  src.connect(gainNode);
  src.start(0, safePos);

  startCtxTime = c.currentTime;
  playing = true;
  $('playBtn').textContent = '⏸';
  setControlsDisabled(true);

  src.onended = () => {
    if (playing) {
      hardStop();
      pauseOrigPos = 0;
      $('progBar').style.width = '0';
      $('timeDisp').textContent = '0:00 / ' + fmt(originalBuf.duration);
    }
  };

  tick();
}

function tick() {
  if (!playing || !originalBuf) return;
  const pos = Math.min(currentOrigPos(), originalBuf.duration);
  $('progBar').style.width = (pos / originalBuf.duration * 100) + '%';
  $('timeDisp').textContent = fmt(pos) + ' / ' + fmt(originalBuf.duration);
  raf = requestAnimationFrame(tick);
}

$('playBtn').onclick = () => {
  if (!originalBuf) return;
  if (playing) {
    pauseOrigPos = currentOrigPos();
    hardStop();
  } else {
    startPlay();
  }
};

$('progWrap').onclick = e => {
  if (!originalBuf || playing) return;
  const r = $('progWrap').getBoundingClientRect();
  pauseOrigPos = (e.clientX - r.left) / r.width * originalBuf.duration;
  $('progBar').style.width = ((pauseOrigPos / originalBuf.duration) * 100) + '%';
  $('timeDisp').textContent = fmt(pauseOrigPos) + ' / ' + fmt(originalBuf.duration);
};

function changePitch(d) {
  pitch = Math.max(-6, Math.min(6, pitch + d));
  $('pitchVal').textContent = pitch === 0 ? '±0' : pitch > 0 ? `+${pitch}` : `${pitch}`;
  // バッファキャッシュを無効化
  processedBuf = null;
}

$('pitchDn').onclick = () => changePitch(-1);
$('pitchUp').onclick = () => changePitch(+1);
$('pitchReset').onclick = () => { pitch = 0; changePitch(0); };

document.querySelectorAll('.spd').forEach(btn => {
  btn.onclick = () => {
    speed = parseFloat(btn.dataset.r);
    document.querySelectorAll('.spd').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    // バッファキャッシュを無効化
    processedBuf = null;
  };
});

// iOS
if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
  $('scoreEmbed').style.display = 'none';
  $('scoreFallback').style.display = 'flex';
}

selectNum(1);
</script>
</body>
</html>
