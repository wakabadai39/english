<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンコーネ 50番練習曲</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
:root { --ink:#1a1410; --paper:#f7f3ec; --gold:#c49a3c; --accent:#8b3a2a; }
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; }
body { background:var(--paper); color:var(--ink); font-family:-apple-system,'Noto Sans JP',sans-serif;
       display:flex; flex-direction:column; height:100%; }
header { background:var(--ink); color:#fff; padding:8px 10px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
header h1 { font-size:12px; font-weight:700; white-space:nowrap; }
#numSelect { background:var(--gold); color:var(--ink); border:none; border-radius:4px; padding:4px 6px; font-size:12px; font-weight:700; }
.score-area { flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; background:#fff; -webkit-overflow-scrolling:touch; }
#scoreCanvas { display:block; }
.controls { flex-shrink:0; background:var(--ink); padding:6px 10px; display:flex; align-items:center; gap:6px; }
.ctrl-label { font-size:10px; color:#a09888; }
.ctrl-btn { background:#3a342c; color:#fff; border:none; border-radius:4px; width:26px; height:26px; font-size:15px; cursor:pointer; }
.ctrl-btn:disabled { opacity:0.3; }
.pitch-val { font-size:12px; font-weight:700; min-width:30px; text-align:center; color:var(--gold); }
.reset-btn { background:none; border:1px solid #3a342c; border-radius:4px; color:#a09888; padding:2px 6px; font-size:10px; cursor:pointer; }
.audio-bar { flex-shrink:0; background:#111; padding:6px 10px; display:flex; align-items:center; gap:8px; }
.audio-title { font-size:11px; color:var(--gold); white-space:nowrap; }
.play-btn { background:var(--gold); color:var(--ink); border:none; border-radius:50%; width:30px; height:30px; font-size:13px; cursor:pointer; flex-shrink:0; }
.prog-wrap { flex:1; height:6px; background:#333; border-radius:3px; cursor:pointer; }
.prog-bar { height:100%; background:var(--gold); border-radius:3px; width:0; }
.time { font-size:10px; color:#a09888; white-space:nowrap; min-width:72px; text-align:right; }
#status { font-size:10px; color:#f88; }
.keyboard-area { flex-shrink:0; background:#1a1410; padding:4px 6px 6px; }
.kb-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.kb-label { font-size:10px; color:#a09888; }
.timbre-btn { background:#3a342c; border:none; border-radius:4px; padding:3px 8px; font-size:10px; color:#a09888; cursor:pointer; }
.timbre-btn.on { background:var(--gold); color:var(--ink); font-weight:700; }
.piano-wrap { position:relative; width:100%; overflow:hidden; }
.piano { position:relative; display:flex; user-select:none; -webkit-user-select:none; }
.wkey { position:relative; background:#f5f0e8; flex-shrink:0; border:1px solid #888; border-top:none;
        border-radius:0 0 4px 4px; cursor:pointer; z-index:1;
        display:flex; align-items:flex-end; justify-content:center;
        font-size:8px; color:#888; touch-action:none; }
.wkey:active,.wkey.pressed { background:#c8b06a; }
.bkey { position:absolute; background:#1a1410; border-radius:0 0 3px 3px; z-index:2; cursor:pointer; touch-action:none; top:0; }
.bkey:active,.bkey.pressed { background:#4a3a1a; }
</style>
</head>
<body>
<header>
  <h1>コンコーネ 五十番練習曲 Op.9 中声用</h1>
  <select id="numSelect" onchange="selectNum(+this.value)"></select>
</header>
<div class="score-area" id="scoreArea">
  <canvas id="scoreCanvas"></canvas>
</div>
<div class="controls">
  <span class="ctrl-label">音程</span>
  <button class="ctrl-btn" id="pitchDn">−</button>
  <span class="pitch-val" id="pitchVal">±0</span>
  <button class="ctrl-btn" id="pitchUp">＋</button>
  <button class="reset-btn" id="pitchReset">戻す</button>
  <span class="ctrl-label" style="margin-left:10px;">速度</span>
  <button class="ctrl-btn" id="speedDn">−</button>
  <span class="pitch-val" id="speedVal">x1.0</span>
  <button class="ctrl-btn" id="speedUp">＋</button>
  <button class="reset-btn" id="speedReset">戻す</button>
</div>
<div class="audio-bar">
  <span class="audio-title" id="audioTitle">🎵 第１番</span>
  <button class="play-btn" id="playBtn">▶</button>
  <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
  <span class="time" id="timeDisp">0:00 / 0:00</span>
  <span id="status"></span>
</div>
<div class="keyboard-area">
  <div class="kb-top">
    <span class="kb-label">音色：</span>
    <button class="timbre-btn on" data-t="flute">フルート</button>
    <button class="timbre-btn" data-t="violin">バイオリン</button>
    <button class="timbre-btn" data-t="oboe">オーボエ</button>
  </div>
  <div class="piano-wrap" id="pianoWrap">
    <div class="piano" id="piano"></div>
  </div>
</div>

class FifoSampleBuffer {
  constructor() {
    this._vector = new Float32Array();
    this._position = 0;
    this._frameCount = 0;
  }
  get vector() {
    return this._vector;
  }
  get position() {
    return this._position;
  }
  get startIndex() {
    return this._position * 2;
  }
  get frameCount() {
    return this._frameCount;
  }
  get endIndex() {
    return (this._position + this._frameCount) * 2;
  }
  clear() {
    this._vector.fill(0);
    this._position = 0;
    this._frameCount = 0;
  }
  put(numFrames) {
    this._frameCount += numFrames;
  }
  putSamples(samples, position, numFrames = 0) {
    position = position || 0;
    const sourceOffset = position * 2;
    if (!(numFrames >= 0)) {
      numFrames = (samples.length - sourceOffset) / 2;
    }
    const numSamples = numFrames * 2;
    this.ensureCapacity(numFrames + this._frameCount);
    const destOffset = this.endIndex;
    this.vector.set(samples.subarray(sourceOffset, sourceOffset + numSamples), destOffset);
    this._frameCount += numFrames;
  }
  putBuffer(buffer, position, numFrames = 0) {
    position = position || 0;
    if (!(numFrames >= 0)) {
      numFrames = buffer.frameCount - position;
    }
    this.putSamples(buffer.vector, buffer.position + position, numFrames);
  }
  receive(numFrames) {
    if (!(numFrames >= 0) || numFrames > this._frameCount) {
      numFrames = this.frameCount;
    }
    this._frameCount -= numFrames;
    this._position += numFrames;
  }
  receiveSamples(output, numFrames = 0) {
    const numSamples = numFrames * 2;
    const sourceOffset = this.startIndex;
    output.set(this._vector.subarray(sourceOffset, sourceOffset + numSamples));
    this.receive(numFrames);
  }
  extract(output, position = 0, numFrames = 0) {
    const sourceOffset = this.startIndex + position * 2;
    const numSamples = numFrames * 2;
    output.set(this._vector.subarray(sourceOffset, sourceOffset + numSamples));
  }
  ensureCapacity(numFrames = 0) {
    const minLength = parseInt(numFrames * 2);
    if (this._vector.length < minLength) {
      const newVector = new Float32Array(minLength);
      newVector.set(this._vector.subarray(this.startIndex, this.endIndex));
      this._vector = newVector;
      this._position = 0;
    } else {
      this.rewind();
    }
  }
  ensureAdditionalCapacity(numFrames = 0) {
    this.ensureCapacity(this._frameCount + numFrames);
  }
  rewind() {
    if (this._position > 0) {
      this._vector.set(this._vector.subarray(this.startIndex, this.endIndex));
      this._position = 0;
    }
  }
}

class AbstractFifoSamplePipe {
  constructor(createBuffers) {
    if (createBuffers) {
      this._inputBuffer = new FifoSampleBuffer();
      this._outputBuffer = new FifoSampleBuffer();
    } else {
      this._inputBuffer = this._outputBuffer = null;
    }
  }
  get inputBuffer() {
    return this._inputBuffer;
  }
  set inputBuffer(inputBuffer) {
    this._inputBuffer = inputBuffer;
  }
  get outputBuffer() {
    return this._outputBuffer;
  }
  set outputBuffer(outputBuffer) {
    this._outputBuffer = outputBuffer;
  }
  clear() {
    this._inputBuffer.clear();
    this._outputBuffer.clear();
  }
}

class RateTransposer extends AbstractFifoSamplePipe {
  constructor(createBuffers) {
    super(createBuffers);
    this.reset();
    this._rate = 1;
  }
  set rate(rate) {
    this._rate = rate;
  }
  reset() {
    this.slopeCount = 0;
    this.prevSampleL = 0;
    this.prevSampleR = 0;
  }
  clear() {
    super.clear();
    this.reset();
  }
  clone() {
    const result = new RateTransposer();
    result.rate = this._rate;
    return result;
  }
  process() {
    const numFrames = this._inputBuffer.frameCount;
    this._outputBuffer.ensureAdditionalCapacity(numFrames / this._rate + 1);
    const numFramesOutput = this.transpose(numFrames);
    this._inputBuffer.receive();
    this._outputBuffer.put(numFramesOutput);
  }
  transpose(numFrames = 0) {
    if (numFrames === 0) {
      return 0;
    }
    const src = this._inputBuffer.vector;
    const srcOffset = this._inputBuffer.startIndex;
    const dest = this._outputBuffer.vector;
    const destOffset = this._outputBuffer.endIndex;
    let used = 0;
    let i = 0;
    while (this.slopeCount < 1.0) {
      dest[destOffset + 2 * i] = (1.0 - this.slopeCount) * this.prevSampleL + this.slopeCount * src[srcOffset];
      dest[destOffset + 2 * i + 1] = (1.0 - this.slopeCount) * this.prevSampleR + this.slopeCount * src[srcOffset + 1];
      i = i + 1;
      this.slopeCount += this._rate;
    }
    this.slopeCount -= 1.0;
    if (numFrames !== 1) {
      out: while (true) {
        while (this.slopeCount > 1.0) {
          this.slopeCount -= 1.0;
          used = used + 1;
          if (used >= numFrames - 1) {
            break out;
          }
        }
        const srcIndex = srcOffset + 2 * used;
        dest[destOffset + 2 * i] = (1.0 - this.slopeCount) * src[srcIndex] + this.slopeCount * src[srcIndex + 2];
        dest[destOffset + 2 * i + 1] = (1.0 - this.slopeCount) * src[srcIndex + 1] + this.slopeCount * src[srcIndex + 3];
        i = i + 1;
        this.slopeCount += this._rate;
      }
    }
    this.prevSampleL = src[srcOffset + 2 * numFrames - 2];
    this.prevSampleR = src[srcOffset + 2 * numFrames - 1];
    return i;
  }
}

class FilterSupport {
  constructor(pipe) {
    this._pipe = pipe;
  }
  get pipe() {
    return this._pipe;
  }
  get inputBuffer() {
    return this._pipe.inputBuffer;
  }
  get outputBuffer() {
    return this._pipe.outputBuffer;
  }
  fillInputBuffer(
  ) {
    throw new Error('fillInputBuffer() not overridden');
  }
  fillOutputBuffer(numFrames = 0) {
    while (this.outputBuffer.frameCount < numFrames) {
      const numInputFrames = 8192 * 2 - this.inputBuffer.frameCount;
      this.fillInputBuffer(numInputFrames);
      if (this.inputBuffer.frameCount < 8192 * 2) {
        break;
      }
      this._pipe.process();
    }
  }
  clear() {
    this._pipe.clear();
  }
}

const noop = function () {
  return;
};

class SimpleFilter extends FilterSupport {
  constructor(sourceSound, pipe, callback = noop) {
    super(pipe);
    this.callback = callback;
    this.sourceSound = sourceSound;
    this.historyBufferSize = 22050;
    this._sourcePosition = 0;
    this.outputBufferPosition = 0;
    this._position = 0;
  }
  get position() {
    return this._position;
  }
  set position(position) {
    if (position > this._position) {
      throw new RangeError('New position may not be greater than current position');
    }
    const newOutputBufferPosition = this.outputBufferPosition - (this._position - position);
    if (newOutputBufferPosition < 0) {
      throw new RangeError('New position falls outside of history buffer');
    }
    this.outputBufferPosition = newOutputBufferPosition;
    this._position = position;
  }
  get sourcePosition() {
    return this._sourcePosition;
  }
  set sourcePosition(sourcePosition) {
    this.clear();
    this._sourcePosition = sourcePosition;
  }
  onEnd() {
    this.callback();
  }
  fillInputBuffer(numFrames = 0) {
    const samples = new Float32Array(numFrames * 2);
    const numFramesExtracted = this.sourceSound.extract(samples, numFrames, this._sourcePosition);
    this._sourcePosition += numFramesExtracted;
    this.inputBuffer.putSamples(samples, 0, numFramesExtracted);
  }
  extract(target, numFrames = 0) {
    this.fillOutputBuffer(this.outputBufferPosition + numFrames);
    const numFramesExtracted = Math.min(numFrames, this.outputBuffer.frameCount - this.outputBufferPosition);
    this.outputBuffer.extract(target, this.outputBufferPosition, numFramesExtracted);
    const currentFrames = this.outputBufferPosition + numFramesExtracted;
    this.outputBufferPosition = Math.min(this.historyBufferSize, currentFrames);
    this.outputBuffer.receive(Math.max(currentFrames - this.historyBufferSize, 0));
    this._position += numFramesExtracted;
    return numFramesExtracted;
  }
  handleSampleData(event) {
    this.extract(event.data, 4096);
  }
  clear() {
    super.clear();
    this.outputBufferPosition = 0;
  }
}

const USE_AUTO_SEQUENCE_LEN = 0;
const DEFAULT_SEQUENCE_MS = USE_AUTO_SEQUENCE_LEN;
const USE_AUTO_SEEKWINDOW_LEN = 0;
const DEFAULT_SEEKWINDOW_MS = USE_AUTO_SEEKWINDOW_LEN;
const DEFAULT_OVERLAP_MS = 8;

const AUTOSEQ_TEMPO_LOW = 0.25;
const AUTOSEQ_TEMPO_TOP = 4.0;
const AUTOSEQ_AT_MIN = 125.0;
const AUTOSEQ_AT_MAX = 50.0;
const AUTOSEQ_K = (AUTOSEQ_AT_MAX - AUTOSEQ_AT_MIN) / (AUTOSEQ_TEMPO_TOP - AUTOSEQ_TEMPO_LOW);
const AUTOSEQ_C = AUTOSEQ_AT_MIN - AUTOSEQ_K * AUTOSEQ_TEMPO_LOW;
const AUTOSEEK_AT_MIN = 25.0;
const AUTOSEEK_AT_MAX = 15.0;
const AUTOSEEK_K = (AUTOSEEK_AT_MAX - AUTOSEEK_AT_MIN) / (AUTOSEQ_TEMPO_TOP - AUTOSEQ_TEMPO_LOW);
const AUTOSEEK_C = AUTOSEEK_AT_MIN - AUTOSEEK_K * AUTOSEQ_TEMPO_LOW;
class Stretch extends AbstractFifoSamplePipe {
  constructor(createBuffers) {
    super(createBuffers);
    this._quickSeek = true;
    this.midBufferDirty = false;
    this.midBuffer = null;
    this.overlapLength = 0;
    this.autoSeqSetting = true;
    this.autoSeekSetting = true;
    this._tempo = 1;
    this.setParameters(44100, DEFAULT_SEQUENCE_MS, DEFAULT_SEEKWINDOW_MS, DEFAULT_OVERLAP_MS);
  }
  clear() {
    super.clear();
    this.clearMidBuffer();
  }
  clearMidBuffer() {
    this.midBufferDirty = false;
    this.midBuffer = null;
    if (this.refMidBuffer) {
      this.refMidBuffer.fill(0);
    }
    this.skipFract = 0;
  }
  setParameters(sampleRate, sequenceMs, seekWindowMs, overlapMs) {
    if (sampleRate > 0) {
      this.sampleRate = sampleRate;
    }
    if (overlapMs > 0) {
      this.overlapMs = overlapMs;
    }
    if (sequenceMs > 0) {
      this.sequenceMs = sequenceMs;
      this.autoSeqSetting = false;
    } else {
      this.autoSeqSetting = true;
    }
    if (seekWindowMs > 0) {
      this.seekWindowMs = seekWindowMs;
      this.autoSeekSetting = false;
    } else {
      this.autoSeekSetting = true;
    }
    this.calculateSequenceParameters();
    this.calculateOverlapLength(this.overlapMs);
    this.tempo = this._tempo;
  }
  set tempo(newTempo) {
    let intskip;
    this._tempo = newTempo;
    this.calculateSequenceParameters();
    this.nominalSkip = this._tempo * (this.seekWindowLength - this.overlapLength);
    this.skipFract = 0;
    intskip = Math.floor(this.nominalSkip + 0.5);
    this.sampleReq = Math.max(intskip + this.overlapLength, this.seekWindowLength) + this.seekLength;
  }
  get tempo() {
    return this._tempo;
  }
  get inputChunkSize() {
    return this.sampleReq;
  }
  get outputChunkSize() {
    return this.overlapLength + Math.max(0, this.seekWindowLength - 2 * this.overlapLength);
  }
  calculateOverlapLength(overlapInMsec = 0) {
    let newOvl;
    newOvl = this.sampleRate * overlapInMsec / 1000;
    newOvl = newOvl < 16 ? 16 : newOvl;
    newOvl -= newOvl % 8;
    this.overlapLength = newOvl;
    this.refMidBuffer = new Float32Array(this.overlapLength * 2);
    this.midBuffer = new Float32Array(this.overlapLength * 2);
  }
  checkLimits(x, mi, ma) {
    return x < mi ? mi : x > ma ? ma : x;
  }
  calculateSequenceParameters() {
    let seq;
    let seek;

      this.sequenceMs = Math.floor(seq + 0.5);

  seekBestOverlapPosition() {
    return this._quickSeek ? this.seekBestOverlapPositionStereoQuick() : this.seekBestOverlapPositionStereo();

  seekBestOverlapPositionStereo() {
    let bestOffset;

      correlation = this.calculateCrossCorrelationStereo(2 * i, this.refMidBuffer);

        bestCorrelation = correlation;
        bestOffset = i;
      }

    return bestOffset;

  seekBestOverlapPositionStereoQuick() {

    let bestCorrelation;
    let correlation;
    let scanCount = 0;
    let correlationOffset;
    let tempOffset;

    bestCorrelation = Number.MIN_VALUE;
    bestOffset = 0;
    correlationOffset = 0;
    tempOffset = 0;

      let j = 0;

          bestOffset = tempOffset;

  preCalculateCorrelationReferenceStereo() {

      this.refMidBuffer[context + 1] = this.midBuffer[context + 1] * temp;
    }

    let context;
    let tempFrame;
    const frameScale = 1 / this.overlapLength;
    let fi;
    let inputOffset;
    let outputOffset;
    for (; i < this.overlapLength; i = i + 1) {
      tempFrame = (this.overlapLength - i) * frameScale;
      fi = i * frameScale;
      context = 2 * i;
      inputOffset = context + inputPosition;
      outputOffset = context + outputPosition;
      output[outputOffset + 0] = input[inputOffset + 0] * fi + this.midBuffer[context + 0] * tempFrame;
      output[outputOffset + 1] = input[inputOffset + 1] * fi + this.midBuffer[context + 1] * tempFrame;
    }
  }
  process() {
    let offset;
    let temp;
    let overlapSkip;
    if (this.midBuffer === null) {
      if (this._inputBuffer.frameCount < this.overlapLength) {
        return;

      this.midBuffer = new Float32Array(this.overlapLength * 2);
      this._inputBuffer.receiveSamples(this.midBuffer, this.overlapLength);
    }
    while (this._inputBuffer.frameCount >= this.sampleReq) {
      offset = this.seekBestOverlapPosition();
      this._outputBuffer.ensureAdditionalCapacity(this.overlapLength);
      this.overlap(Math.floor(offset));
      this._outputBuffer.put(this.overlapLength);
      temp = this.seekWindowLength - 2 * this.overlapLength;
      if (temp > 0) {
        this._outputBuffer.putBuffer(this._inputBuffer, offset + this.overlapLength, temp);
      }
      const start = this._inputBuffer.startIndex + 2 * (offset + this.seekWindowLength - this.overlapLength);
      this.midBuffer.set(this._inputBuffer.vector.subarray(start, start + 2 * this.overlapLength));
      this.skipFract += this.nominalSkip;
      overlapSkip = Math.floor(this.skipFract);
      this.skipFract -= overlapSkip;
      this._inputBuffer.receive(overlapSkip);
    }
  }
}

const testFloatEqual = function (a, b) {
  return (a > b ? a - b : b - a) > 1e-10;
};

class SoundTouch {
  constructor() {
    this.transposer = new RateTransposer(false);
    this.stretch = new Stretch(false);
    this._inputBuffer = new FifoSampleBuffer();
    this._intermediateBuffer = new FifoSampleBuffer();
    this._outputBuffer = new FifoSampleBuffer();
    this._rate = 0;
    this._tempo = 0;
    this.virtualPitch = 1.0;
    this.virtualRate = 1.0;
    this.virtualTempo = 1.0;
    this.calculateEffectiveRateAndTempo();
  }
  clear() {
    this.transposer.clear();
    this.stretch.clear();
  }
  clone() {
    const result = new SoundTouch();
    result.rate = this.rate;
    result.tempo = this.tempo;
    return result;
  }
  get rate() {
    return this._rate;
  }
  set rate(rate) {
    this.virtualRate = rate;
    this.calculateEffectiveRateAndTempo();
  }
  set rateChange(rateChange) {
    this._rate = 1.0 + 0.01 * rateChange;
  }
  get tempo() {
    return this._tempo;
  }
  set tempo(tempo) {
    this.virtualTempo = tempo;
    this.calculateEffectiveRateAndTempo();
  }
  set tempoChange(tempoChange) {
    this.tempo = 1.0 + 0.01 * tempoChange;
  }
  set pitch(pitch) {
    this.virtualPitch = pitch;
    this.calculateEffectiveRateAndTempo();
  }
  set pitchOctaves(pitchOctaves) {
    this.pitch = Math.exp(0.69314718056 * pitchOctaves);
    this.calculateEffectiveRateAndTempo();
  }
  set pitchSemitones(pitchSemitones) {
    this.pitchOctaves = pitchSemitones / 12.0;
  }
  get inputBuffer() {
    return this._inputBuffer;
  }
  get outputBuffer() {
    return this._outputBuffer;
  }
  calculateEffectiveRateAndTempo() {
    const previousTempo = this._tempo;
    const previousRate = this._rate;
    this._tempo = this.virtualTempo / this.virtualPitch;
    this._rate = this.virtualRate * this.virtualPitch;
    if (testFloatEqual(this._tempo, previousTempo)) {
      this.stretch.tempo = this._tempo;
    }
    if (testFloatEqual(this._rate, previousRate)) {
      this.transposer.rate = this._rate;
    }
    if (this._rate > 1.0) {
      if (this._outputBuffer != this.transposer.outputBuffer) {
        this.stretch.inputBuffer = this._inputBuffer;
        this.stretch.outputBuffer = this._intermediateBuffer;
        this.transposer.inputBuffer = this._intermediateBuffer;
        this.transposer.outputBuffer = this._outputBuffer;
      }
    } else {
      if (this._outputBuffer != this.stretch.outputBuffer) {
        this.transposer.inputBuffer = this._inputBuffer;
        this.transposer.outputBuffer = this._intermediateBuffer;
        this.stretch.inputBuffer = this._intermediateBuffer;
        this.stretch.outputBuffer = this._outputBuffer;
      }
    }
  }
  process() {
    if (this._rate > 1.0) {
      this.stretch.process();
      this.transposer.process();
    } else {
      this.transposer.process();
      this.stretch.process();
    }
  }
}

class WebAudioBufferSource {
  constructor(buffer) {
    this.buffer = buffer;
    this._position = 0;
  }
  get dualChannel() {
    return this.buffer.numberOfChannels > 1;
  }
  get position() {
    return this._position;
  }
  set position(value) {
    this._position = value;
  }
  extract(target, numFrames = 0, position = 0) {
    this.position = position;
    let left = this.buffer.getChannelData(0);
    let right = this.dualChannel ? this.buffer.getChannelData(1) : this.buffer.getChannelData(0);
    let i = 0;
    for (; i < numFrames; i++) {
      target[i * 2] = left[i + position];
      target[i * 2 + 1] = right[i + position];
    }
    return Math.min(numFrames, left.length - position);
  }
}

const getWebAudioNode = function (context, filter, sourcePositionCallback = noop, bufferSize = 4096) {
  const node = context.createScriptProcessor(bufferSize, 2, 2);
  const samples = new Float32Array(bufferSize * 2);
  node.onaudioprocess = event => {
    let left = event.outputBuffer.getChannelData(0);
    let right = event.outputBuffer.getChannelData(1);
    let framesExtracted = filter.extract(samples, bufferSize);
    sourcePositionCallback(filter.sourcePosition);
    if (framesExtracted === 0) {
      filter.onEnd();
    }
    let i = 0;
    for (; i < framesExtracted; i++) {
      left[i] = samples[i * 2];
      right[i] = samples[i * 2 + 1];
    }
  };
  return node;
};

const pad = function (n, width, z) {
  z = z || '0';
  n = n + '';
  return n.length >= width ? n : new Array(width - n.length + 1).join(z) + n;
};
const minsSecs = function (secs) {
  const mins = Math.floor(secs / 60);
  const seconds = secs - mins * 60;
  return `${mins}:${pad(parseInt(seconds), 2)}`;
};

const onUpdate = function (sourcePosition) {
  const currentTimePlayed = this.timePlayed;
  const sampleRate = this.sampleRate;
  this.sourcePosition = sourcePosition;
  this.timePlayed = sourcePosition / sampleRate;
  if (currentTimePlayed !== this.timePlayed) {
    const timePlayed = new CustomEvent('play', {
      detail: {
        timePlayed: this.timePlayed,
        formattedTimePlayed: this.formattedTimePlayed,
        percentagePlayed: this.percentagePlayed
      }
    });
    this._node.dispatchEvent(timePlayed);
  }
};
class PitchShifter {
  constructor(context, buffer, bufferSize, onEnd = noop) {
    this._soundtouch = new SoundTouch();
    const source = new WebAudioBufferSource(buffer);
    this.timePlayed = 0;
    this.sourcePosition = 0;
    this._filter = new SimpleFilter(source, this._soundtouch, onEnd);
    this._node = getWebAudioNode(context, this._filter, sourcePostion => onUpdate.call(this, sourcePostion), bufferSize);
    this.tempo = 1;
    this.rate = 1;
    this.duration = buffer.duration;
    this.sampleRate = context.sampleRate;
    this.listeners = [];
  }
  get formattedDuration() {
    return minsSecs(this.duration);
  }
  get formattedTimePlayed() {
    return minsSecs(this.timePlayed);
  }
  get percentagePlayed() {
    return 100 * this._filter.sourcePosition / (this.duration * this.sampleRate);
  }
  set percentagePlayed(perc) {
    this._filter.sourcePosition = parseInt(perc * this.duration * this.sampleRate);
    this.sourcePosition = this._filter.sourcePosition;
    this.timePlayed = this.sourcePosition / this.sampleRate;
  }
  get node() {
    return this._node;
  }
  set pitch(pitch) {
    this._soundtouch.pitch = pitch;
  }
  set pitchSemitones(semitone) {
    this._soundtouch.pitchSemitones = semitone;
  }
  set rate(rate) {
    this._soundtouch.rate = rate;
  }
  set tempo(tempo) {
    this._soundtouch.tempo = tempo;
  }
  connect(toNode) {
    this._node.connect(toNode);
  }
  disconnect() {
    this._node.disconnect();
  }
  on(eventName, cb) {
    this.listeners.push({
      name: eventName,
      cb: cb
    });
    this._node.addEventListener(eventName, event => cb(event.detail));
  }
  off(eventName = null) {
    let listeners = this.listeners;
    if (eventName) {
      listeners = listeners.filter(e => e.name === eventName);
    }
    listeners.forEach(e => {
      this._node.removeEventListener(e.name, event => e.cb(event.detail));
    });
  }
}
</script>
<script>
const $ = id => document.getElementById(id);

// ─── MP3再生 ───────────────────────────────────────────────
let ctx, shifter, gainNode;
let originalBuf=null;
let pitch=0, speed=1.0, playing=false, raf;

function getCtx(){
  if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();
  return ctx;
}

const mp3path = n=>`mp3/${n}_CONCONE 50 LESSONS for medium voice.mp3`;
const pdfpath = n=>`scores/Concone50_${String(n).padStart(2,'0')}.pdf`;
const fmt = s=>!s||isNaN(s)?'0:00':Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');

function setControlsDisabled(d){
  ['numSelect'].forEach(id=>$(id).disabled=d);
}

for(let i=1;i<=50;i++){
  const o=document.createElement('option');
  o.value=i; o.textContent=`第 ${i} 番`; $('numSelect').appendChild(o);
}

function selectNum(n){
  hardStop();
  originalBuf=null; shifter=null;
  $('audioTitle').textContent=`🎵 第${n}番`;
  renderPDF(pdfpath(n));
  $('progBar').style.width='0'; $('timeDisp').textContent='0:00 / 0:00';
  $('status').textContent='読込中…';
  fetch(mp3path(n))
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.arrayBuffer();})
    .then(ab=>getCtx().decodeAudioData(ab))
    .then(dec=>{originalBuf=dec;$('status').textContent='';$('timeDisp').textContent='0:00/'+fmt(dec.duration);})
    .catch(()=>$('status').textContent='ファイルなし');
}

// SoundTouchJS の PitchShifter を作成（音程・速度は独立して設定可能、WSOLAで高品質に処理）
function ensureShifter(){
  if(shifter || !originalBuf) return;
  const c=getCtx();
  shifter=new PitchShifter(c,originalBuf,4096,()=>{
    hardStop(); $('progBar').style.width='0'; $('timeDisp').textContent='0:00/'+fmt(originalBuf.duration);
  });
  shifter.pitchSemitones=pitch;
  shifter.tempo=speed;
  gainNode=getCtx().createGain(); gainNode.connect(getCtx().destination);
}

function hardStop(){
  if(shifter){ try{ shifter.disconnect(); }catch(e){} }
  playing=false;
  $('playBtn').textContent='▶';
  cancelAnimationFrame(raf);
  setControlsDisabled(false);
}

function startPlay(){
  if(!originalBuf) return;
  ensureShifter();
  shifter.pitchSemitones=pitch;
  shifter.tempo=speed;
  shifter.connect(gainNode);
  playing=true; $('playBtn').textContent='⏸';
  tick();
}

function tick(){
  if(!playing||!shifter) return;
  const pos=Math.min(shifter.timePlayed,originalBuf.duration);
  $('progBar').style.width=(shifter.percentagePlayed)+'%';
  $('timeDisp').textContent=fmt(pos)+'/'+fmt(originalBuf.duration);
  raf=requestAnimationFrame(tick);
}

$('playBtn').onclick=()=>{
  if(!originalBuf) return;
  if(playing){hardStop();}else startPlay();
};
$('progWrap').onclick=e=>{
  if(!originalBuf||playing) return;
  ensureShifter();
  const r=$('progWrap').getBoundingClientRect();
  const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  shifter.percentagePlayed=frac;
  $('progBar').style.width=(frac*100)+'%';
  $('timeDisp').textContent=fmt(frac*originalBuf.duration)+'/'+fmt(originalBuf.duration);
};

function changePitch(d){
  pitch=Math.max(-6,Math.min(6,pitch+d));
  $('pitchVal').textContent=pitch===0?'±0':pitch>0?`+${pitch}`:`${pitch}`;
  if(shifter) shifter.pitchSemitones=pitch;
}
$('pitchDn').onclick=()=>changePitch(-1);
$('pitchUp').onclick=()=>changePitch(+1);
$('pitchReset').onclick=()=>{pitch=0;changePitch(0);};

function changeSpeed(d){
  speed=Math.round(Math.max(0.5,Math.min(1.5,speed+d))*100)/100;
  $('speedVal').textContent='x'+speed.toFixed(2).replace(/0$/,'').replace(/\.$/,'.0');
  if(shifter) shifter.tempo=speed;
}
$('speedDn').onclick=()=>changeSpeed(-0.1);
$('speedUp').onclick=()=>changeSpeed(+0.1);
$('speedReset').onclick=()=>{speed=1.0;changeSpeed(0);};

// ─── PDF.js 楽譜描画 ──────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

let currentPdfUrl = null;

async function renderPDF(url) {
  currentPdfUrl = url;
  const area = $('scoreArea');
  area.innerHTML = '';
  const w = area.clientWidth;
  try {
    const pdf = await pdfjsLib.getDocument(url).promise;
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const vp = page.getViewport({ scale: w / page.getViewport({scale:1}).width });
      const dpr = window.devicePixelRatio || 1;
      const canvas = document.createElement('canvas');
      canvas.width  = Math.floor(vp.width  * dpr);
      canvas.height = Math.floor(vp.height * dpr);
      canvas.style.width  = w + 'px';
      canvas.style.height = Math.floor(vp.height) + 'px';
      canvas.style.display = 'block';
      area.appendChild(canvas);
      const ctx2d = canvas.getContext('2d');
      ctx2d.scale(dpr, dpr);
      await page.render({ canvasContext: ctx2d, viewport: vp }).promise;
    }
  } catch(e) {
    area.innerHTML = '<p style="padding:10px;color:#c00">楽譜を読み込めませんでした</p>';
  }
}

// ─── 鍵盤 ─────────────────────────────────────────────────
let timbre='flute';
document.querySelectorAll('.timbre-btn').forEach(b=>{
  b.onclick=()=>{timbre=b.dataset.t;document.querySelectorAll('.timbre-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
});

const START_MIDI=53,END_MIDI=77,WKEY_H=80,WKEY_GAP=1;
function isWhite(m){return[0,2,4,5,7,9,11].includes(m%12);}
let wkeys=[];

function buildPiano(){
  const piano=$('piano'), wrap=$('pianoWrap');
  piano.innerHTML=''; wkeys=[];
  const whites=[...Array(END_MIDI-START_MIDI+1)].map((_,i)=>i+START_MIDI).filter(isWhite);
  const n=whites.length;
  const availW=wrap.getBoundingClientRect().width||window.innerWidth;
  const WKEY_W=Math.floor((availW-(n-1)*WKEY_GAP)/n);
  const BKEY_W=Math.round(WKEY_W*0.62), BKEY_H=Math.round(WKEY_H*0.62);
  piano.style.height=WKEY_H+'px'; wrap.style.height=WKEY_H+'px';

  let wi=0; const bkData=[];
  for(let midi=START_MIDI;midi<=END_MIDI;midi++){
    if(!isWhite(midi)) continue;
    const el=document.createElement('div'); el.className='wkey'; el.dataset.midi=midi;
    el.style.width=WKEY_W+'px'; el.style.height=WKEY_H+'px'; el.style.marginRight=WKEY_GAP+'px'; el.style.paddingBottom='3px';
    const pc=midi%12,oct=Math.floor(midi/12)-1;
    if(pc===0) el.textContent=`C${oct}`;
    else if(pc===5) el.textContent=`F${oct}`;
    piano.appendChild(el); wkeys.push({el,midi,idx:wi});
    if(midi+1<=END_MIDI&&!isWhite(midi+1)) bkData.push({midi:midi+1,wi});
    wi++;
  }
  bkData.forEach(({midi,wi:w})=>{
    const el=document.createElement('div'); el.className='bkey'; el.dataset.midi=midi;
    el.style.left=((w+1)*(WKEY_W+WKEY_GAP)-Math.round(BKEY_W/2)-1)+'px';
    el.style.width=BKEY_W+'px'; el.style.height=BKEY_H+'px';
    piano.appendChild(el);
  });
  document.querySelectorAll('.wkey,.bkey').forEach(setupKey);
}

// ─── 音合成 ──────────────────────────────────────────────
const activeKeys=new Map();
function midiToFreq(midi){return 440*Math.pow(2,(midi-69+pitch)/12);}

function playNote(midi){
  if(activeKeys.has(midi)) return;
  const c=getCtx(),freq=midiToFreq(midi);
  const mg=c.createGain(); mg.connect(c.destination); const oscs=[];
  if(timbre==='flute'){
    const g=c.createGain();g.connect(mg);
    const o=c.createOscillator();o.type='sine';o.frequency.value=freq;o.connect(g);o.start();oscs.push(o);
    const g2=c.createGain();g2.gain.value=0.08;g2.connect(mg);
    const o2=c.createOscillator();o2.type='sine';o2.frequency.value=freq*2;o2.connect(g2);o2.start();oscs.push(o2);
    const lfo=c.createOscillator();lfo.frequency.value=5.5;
    const lfoG=c.createGain();lfoG.gain.value=freq*0.012;lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start();oscs.push(lfo);
    const now=c.currentTime;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.38,now+0.08);mg.gain.setValueAtTime(1,now);
  }else if(timbre==='violin'){
    const now=c.currentTime;
    [[1,0.28],[2,0.18],[3,0.12],[4,0.08],[5,0.05],[6,0.03]].forEach(([n,amp])=>{
      const o=c.createOscillator();o.type='sawtooth';o.frequency.value=freq*n;
      const g=c.createGain();g.gain.value=amp;o.connect(g);g.connect(mg);o.start();oscs.push(o);
    });
    const lfo=c.createOscillator();lfo.frequency.value=6;
    const lfoG=c.createGain();lfoG.gain.value=freq*0.015;lfo.connect(lfoG);
    oscs.forEach(o=>{try{lfoG.connect(o.frequency);}catch(e){}});lfo.start();oscs.push(lfo);
    mg.gain.setValueAtTime(0,now);mg.gain.linearRampToValueAtTime(0.5,now+0.15);
  }else{
    const now=c.currentTime;
    [[1,0.25],[3,0.15],[5,0.08],[7,0.04]].forEach(([n,amp])=>{
      const o=c.createOscillator();o.type='square';o.frequency.value=freq*n;
      const g=c.createGain();g.gain.value=amp;o.connect(g);g.connect(mg);o.start();oscs.push(o);
    });
    const lfo=c.createOscillator();lfo.frequency.value=5;
    const lfoG=c.createGain();lfoG.gain.value=freq*0.008;lfo.connect(lfoG);
    oscs.forEach(o=>{try{lfoG.connect(o.frequency);}catch(e){}});lfo.start();oscs.push(lfo);
    mg.gain.setValueAtTime(0,now);mg.gain.linearRampToValueAtTime(0.45,now+0.04);
  }
  activeKeys.set(midi,{oscs,masterGain:mg});
}

function stopNote(midi){
  if(!activeKeys.has(midi)) return;
  const{oscs,masterGain:mg}=activeKeys.get(midi);
  const now=getCtx().currentTime;
  mg.gain.setValueAtTime(mg.gain.value,now);mg.gain.linearRampToValueAtTime(0,now+0.12);
  setTimeout(()=>{oscs.forEach(o=>{try{o.stop();}catch(e){}});mg.disconnect();},200);
  activeKeys.delete(midi);
}

// ─── ドラッグ ──────────────────────────────────────────────
let dragMidi=null;
function keyElemAt(x,y){
  const els=document.elementsFromPoint(x,y);
  for(const el of els)if(el.classList.contains('bkey'))return el;
  for(const el of els)if(el.classList.contains('wkey'))return el;
  return null;
}
function dragStart(midi,el){
  if(dragMidi!==null&&dragMidi!==midi)stopNote(dragMidi);
  dragMidi=midi;playNote(midi);el.classList.add('pressed');
}
function dragMove(x,y){
  if(dragMidi===null)return;
  const el=keyElemAt(x,y);if(!el)return;
  const midi=parseInt(el.dataset.midi);
  if(midi!==dragMidi){
    document.querySelectorAll('.wkey.pressed,.bkey.pressed').forEach(k=>k.classList.remove('pressed'));
    stopNote(dragMidi);dragMidi=midi;playNote(midi);el.classList.add('pressed');
  }
}
function dragEnd(){
  if(dragMidi!==null){stopNote(dragMidi);dragMidi=null;}
  document.querySelectorAll('.wkey.pressed,.bkey.pressed').forEach(k=>k.classList.remove('pressed'));
}
function setupKey(el){
  el.addEventListener('mousedown',e=>{e.preventDefault();dragStart(parseInt(el.dataset.midi),el);});
}
const pianoEl=$('piano');
pianoEl.addEventListener('mousedown',e=>{const el=keyElemAt(e.clientX,e.clientY);if(!el)return;e.preventDefault();dragStart(parseInt(el.dataset.midi),el);});
window.addEventListener('mousemove',e=>{if(dragMidi!==null)dragMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>dragEnd());
pianoEl.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0],el=keyElemAt(t.clientX,t.clientY);if(!el)return;dragStart(parseInt(el.dataset.midi),el);},{passive:false});
pianoEl.addEventListener('touchmove',e=>{e.preventDefault();const t=e.changedTouches[0];dragMove(t.clientX,t.clientY);},{passive:false});
pianoEl.addEventListener('touchend',e=>{e.preventDefault();dragEnd();},{passive:false});
pianoEl.addEventListener('touchcancel',()=>dragEnd());

let resizeTimer;
window.addEventListener('resize',()=>{
  buildPiano();
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{ if(currentPdfUrl) renderPDF(currentPdfUrl); }, 300);
});

// DOM確定後に初期化
window.addEventListener('load',()=>{
  buildPiano();
  selectNum(1);
});
</script>
</body>
