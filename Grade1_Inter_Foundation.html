<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小1インター 基礎知識 全科目</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff8f0;
            --surface: #ffffff;
            --primary: #f97316;
            --primary-light: #ffedd5;
            --accent: #0891b2;
            --green: #16a34a;
            --green-light: #dcfce7;
            --amber: #d97706;
            --amber-light: #fef3c7;
            --text: #1e293b;
            --muted: #64748b;
            --border: #fed7aa;
            --shadow: 0 4px 24px rgba(249,115,22,0.10);
            --radius: 18px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 16px 12px 40px;
            color: var(--text);
        }
        .container { max-width: 560px; margin: auto; }

        .header { text-align: center; margin-bottom: 14px; }
        .header h2 { font-size: 18px; font-weight: 900; color: var(--primary); }
        .header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

        .badges { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 700;
            background: var(--primary-light); color: var(--primary);
            border: 1px solid var(--border);
        }
        .badge.green { background: var(--green-light); color: var(--green); border-color: #86efac; }

        .progress-wrap { background: #fed7aa; border-radius: 99px; height: 6px; margin-bottom: 14px; overflow: hidden; }
        .progress-bar  { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s ease; }
        .progress-label { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 10px; }

        /* ─── カード ─── */
        .card {
            background: var(--surface); border-radius: var(--radius);
            padding: 30px 22px 22px; box-shadow: var(--shadow);
            margin-bottom: 14px; position: relative;
            border: 2px solid var(--border);
            min-height: 160px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; cursor: pointer; user-select: none;
        }
        .card.tappable:active { transform: scale(0.985); background: #fff8f0; }
        .card.no-tap { cursor: default; }

        .cat-label {
            font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
            color: var(--primary); margin-bottom: 10px;
        }
        .card-num {
            position: absolute; top: 12px; left: 14px;
            font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
        }
        .main-text   { font-size: clamp(16px, 4.2vw, 20px); font-weight: 700; line-height: 1.65; margin-bottom: 14px; width: 100%; }
        .answer-text { font-size: clamp(14px, 3.8vw, 17px); font-weight: 700; color: var(--accent); opacity: 0; transition: opacity 0.25s; line-height: 1.65; width: 100%; }
        .answer-text.show { opacity: 1; }

        .master-wrap {
            position: absolute; top: 12px; right: 14px;
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; color: var(--muted);
        }
        .master-wrap input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--green); cursor: pointer; }
        .master-wrap.disabled { opacity: 0.3; pointer-events: none; }
        .master-badge {
            background: var(--green-light); color: var(--green);
            padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; display: none;
        }
        .master-badge.show { display: inline-block; }

        .tap-hint { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-align: center; }

        /* ─── Auto panel ─── */
        .auto-panel {
            background: var(--surface); border-radius: var(--radius);
            padding: 16px 18px; box-shadow: var(--shadow); margin-bottom: 14px;
            display: none; border-left: 4px solid var(--primary);
        }
        .auto-panel.show { display: block; }
        .auto-step-title { font-size: 13px; font-weight: 900; color: var(--primary); margin-bottom: 4px; }
        .auto-instruction { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.5; }
        .auto-count { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); margin-top: 6px; }

        /* ─── Filter ─── */
        .filter-panel {
            background: var(--surface); border-radius: var(--radius);
            padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 12px;
        }
        .filter-header {
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none;
        }
        .filter-header-left { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .filter-toggle-icon { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
        .filter-toggle-icon.open { transform: rotate(180deg); }
        .filter-current {
            font-size: 12px; font-weight: 700; color: var(--primary);
            background: var(--primary-light); padding: 3px 10px;
            border-radius: 99px; border: 1px solid var(--border);
            white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
        }
        .filter-chips-wrap { display: none; margin-top: 10px; }
        .filter-chips-wrap.open { display: block; }
        .chip-all {
            display: block; width: 100%; padding: 8px 14px; margin-bottom: 8px;
            border-radius: 10px; font-size: 12px; font-weight: 700;
            cursor: pointer; border: 2px solid var(--border);
            background: #fff; color: var(--muted); text-align: left;
            font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
        }
        .chip-all.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .cat-row {
            display: flex; align-items: center; gap: 8px; padding: 8px 10px;
            border-radius: 10px; cursor: pointer; border: 2px solid transparent;
            background: #fff; margin-bottom: 5px; transition: all 0.15s; user-select: none;
        }
        .cat-row:active { background: #fff8f0; }
        .cat-row.active { background: var(--primary-light); border-color: var(--primary); }
        .cat-row-name  { flex: 1; font-size: 13px; font-weight: 700; color: var(--text); }
        .cat-row.active .cat-row-name { color: var(--primary); }
        .cat-row-count {
            font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
            background: #f1f5f9; padding: 2px 8px; border-radius: 99px; font-weight: 600;
        }
        .cat-row.active .cat-row-count { background: #fff; color: var(--primary); }
        .cat-master-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; flex-shrink: 0; }
        .cat-master-dot.done { background: var(--green); }

        /* ─── Panel / Buttons ─── */
        .panel { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .panel-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .panel label { font-size: 12px; color: var(--muted); }
        input[type="range"] { flex: 1; min-width: 100px; accent-color: var(--primary); }
        .speed-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--primary); min-width: 32px; }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
        .btn {
            border: none; border-radius: 99px; padding: 10px 20px;
            font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer; transition: opacity 0.15s, transform 0.1s;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn:active { transform: scale(0.95); opacity: 0.85; }
        .btn-primary   { background: var(--primary); color: #fff; }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-red       { background: #e11d48; color: #fff; }
        .btn-amber     { background: var(--amber); color: #fff; }
        .btn-toggle-on { background: var(--green); color: #fff; }

        .master-summary {
            background: var(--green-light); border-radius: 12px;
            padding: 10px 14px; font-size: 12px; color: var(--green); font-weight: 700;
            text-align: center; margin-bottom: 10px; display: none;
            cursor: pointer; user-select: none;
        }
        .master-summary.show { display: block; }

        .no-active {
            background: var(--amber-light); border-radius: 12px; padding: 16px;
            text-align: center; font-size: 14px; color: var(--amber); font-weight: 700; display: none;
        }
        .no-active.show { display: block; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h2>🌱 小1インター 基礎知識 全科目</h2>
        <p>Grade 1 International School — Foundation Phrases</p>
    </div>

    <div class="badges">
        <div class="badge" id="mode-label">英 → 日</div>
        <div class="badge" id="order-label">順番通り</div>
        <div class="badge green" id="master-count-badge">マスター: 0 / 100</div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:1%"></div>
    </div>
    <div class="progress-label">フレーズ: <span id="current-num">1</span> / <span id="total-num">100</span></div>

    <div class="no-active" id="no-active-msg">
        ✅ このカテゴリのフレーズをすべてマスターしました！<br>
        <span style="font-weight:400;font-size:12px;margin-top:4px;display:block;">チェックを外すか、別のカテゴリを選んでください。</span>
    </div>

    <div class="auto-panel" id="auto-panel">
        <div class="auto-step-title" id="auto-step-title">STEP 1</div>
        <div class="auto-instruction" id="auto-instruction">音声を2回聴いてください。</div>
        <div class="auto-count" id="auto-count"></div>
    </div>

    <div class="tap-hint" id="tap-hint">👆 カードをタップして答えを表示</div>

    <div class="card tappable" id="main-card" onclick="handleCardTap()">
        <div class="card-num" id="card-num">#1</div>
        <div class="master-wrap" id="master-wrap">
            <span>マスター</span>
            <input type="checkbox" id="master-checkbox" onchange="toggleMaster(event)" onclick="event.stopPropagation()">
        </div>
        <div class="cat-label" id="cat">Category</div>
        <div class="main-text" id="display-text">Loading...</div>
        <div class="answer-text" id="answer-text">Answer</div>
        <div class="master-badge" id="master-badge">✔ マスター済</div>
    </div>

    <div class="master-summary" id="master-summary" onclick="toggleMasterList()"></div>
    <div id="master-list-wrap" style="display:none; margin-bottom:12px;">
        <div style="background:#fff; border-radius:16px; padding:14px 16px; box-shadow:var(--shadow);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-size:13px; font-weight:900; color:var(--green);">✅ マスター済みリスト</span>
                <button class="btn btn-secondary" style="padding:4px 12px; font-size:11px;" onclick="clearAllMaster()">全解除</button>
            </div>
            <div id="master-list"></div>
        </div>
    </div>

    <!-- カテゴリフィルター -->
    <div class="filter-panel">
        <div class="filter-header" onclick="toggleFilterPanel()">
            <div class="filter-header-left">📂 科目を選ぶ</div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="filter-current" id="filter-current-label">すべて</div>
                <span class="filter-toggle-icon" id="filter-toggle-icon">▼</span>
            </div>
        </div>
        <div class="filter-chips-wrap" id="filter-chips-wrap">
            <button class="chip-all active" id="chip-all" onclick="selectCategory('すべて')">🎯 すべて表示</button>
            <div id="cat-rows"></div>
        </div>
    </div>

    <!-- Speed control -->
    <div class="panel">
        <div class="panel-row">
            <label>🔊 再生速度</label>
            <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="0.9" oninput="updateSpeed()">
            <span class="speed-val"><span id="speed-val">0.9</span>x</span>
        </div>
    </div>

    <div id="normal-controls">
        <div class="btn-row">
            <button class="btn btn-primary" onclick="speak()">🔊 音声を聴く</button>
            <button class="btn btn-secondary" onclick="next()">次へ →</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" id="random-btn" onclick="toggleRandom()">🔀 ランダム: OFF</button>
            <button class="btn btn-secondary" onclick="switchMode()">🔄 モード切替</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-amber" onclick="startAutoPlay()">▶ 自動再生</button>
        </div>
    </div>

    <div id="auto-controls" style="display:none;">
        <div class="btn-row">
            <button class="btn btn-red" onclick="stopAutoPlay()">⏹ 自動再生を停止</button>
        </div>
    </div>

</div>
<script>
const phrases = [

    // ─── 🔢 Math / 算数の基本 ───────────────────────────

// ─── ユーティリティ ──────────────────────────────────────
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// iPad / iOS 対策：英語音声を明示指定
let _enVoice = null;
function getEnglishVoice() {
    if (_enVoice) return _enVoice;
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return null;
    for (const lang of ['en-US','en-GB','en-AU','en-SG']) {
        const v = voices.find(v => v.lang === lang);
        if (v) { _enVoice = v; return v; }
    }
    const fb = voices.find(v => v.lang.startsWith('en'));
    if (fb) { _enVoice = fb; return fb; }
    return null;
}
window.speechSynthesis.onvoiceschanged = () => { _enVoice = null; };

// ─── 状態変数 ─────────────────────────────────────────────
let currentIndex   = 0;
let isEnToJp       = true;
let currentSpeed   = 0.9;
let isRandom       = false;
let isAutoPlaying  = false;
let autoStopped    = false;
let masterSet      = new Set(JSON.parse(localStorage.getItem('g1_inter_master') || '[]'));
let activeCategory = 'すべて';
let autoTimeout    = null;
let filterOpen     = false;

const allCategories = [...new Set(phrases.map(p => p.cat))];

// ─── カテゴリUI ───────────────────────────────────────────
function getCatCount(cat)       { return phrases.filter(p => p.cat===cat).length; }
function getCatMasterCount(cat) { return phrases.map((p,i)=>({...p,idx:i})).filter(p => p.cat===cat && masterSet.has(p.idx)).length; }

function buildCatRows() {
    const wrap = document.getElementById('cat-rows');
    wrap.innerHTML = '';
    allCategories.forEach(cat => {
        const total    = getCatCount(cat);
        const mastered = getCatMasterCount(cat);
        const isDone   = total > 0 && mastered === total;
        const row = document.createElement('div');
        row.className = 'cat-row' + (cat===activeCategory ? ' active' : '');
        row.innerHTML = `<div class="cat-master-dot ${isDone?'done':''}"></div>`
            + `<div class="cat-row-name">${escHtml(cat)}</div>`
            + `<div class="cat-row-count">${mastered===0 ? total : `${total-mastered}残/${total}`}</div>`;
        row.onclick = () => selectCategory(cat);
        wrap.appendChild(row);
    });
    document.getElementById('chip-all').className = 'chip-all' + (activeCategory==='すべて' ? ' active' : '');
}

function toggleFilterPanel() {
    filterOpen = !filterOpen;
    document.getElementById('filter-chips-wrap').className = 'filter-chips-wrap' + (filterOpen ? ' open' : '');
    document.getElementById('filter-toggle-icon').className = 'filter-toggle-icon' + (filterOpen ? ' open' : '');
}

function updateFilterLabel() {
    const active = getActivePhrases();
    const label  = activeCategory==='すべて' ? `すべて（${active.length}）` : `${activeCategory}（${active.length}）`;
    document.getElementById('filter-current-label').textContent = label;
}

function selectCategory(cat) {
    if (isAutoPlaying) return;
    activeCategory = cat; currentIndex = 0;
    buildCatRows(); updateFilterLabel();
    filterOpen = false;
    document.getElementById('filter-chips-wrap').className = 'filter-chips-wrap';
    document.getElementById('filter-toggle-icon').className = 'filter-toggle-icon';
    update();
}

// ─── データ操作 ───────────────────────────────────────────
function saveMaster() { localStorage.setItem('g1_inter_master', JSON.stringify([...masterSet])); }

function getActivePhrases() {
    return phrases.map((p,i) => ({...p, idx:i}))
        .filter(p => !masterSet.has(p.idx) && (activeCategory==='すべて' || p.cat===activeCategory));
}

// ─── 画面更新 ─────────────────────────────────────────────
function update() {
    const active   = getActivePhrases();
    const noActiveEl = document.getElementById('no-active-msg');
    if (active.length === 0) {
        noActiveEl.classList.add('show');
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('tap-hint').style.display  = 'none';
        updateMasterUI(); updateFilterLabel(); buildCatRows(); return;
    }
    noActiveEl.classList.remove('show');
    document.getElementById('main-card').style.display = '';
    document.getElementById('tap-hint').style.display  = '';
    if (currentIndex >= active.length) currentIndex = 0;
    const item = active[currentIndex];
    document.getElementById('current-num').textContent   = currentIndex + 1;
    document.getElementById('total-num').textContent     = active.length;
    document.getElementById('progress-bar').style.width  = ((currentIndex+1)/active.length*100)+'%';
    document.getElementById('cat').textContent           = item.cat;
    document.getElementById('card-num').textContent      = '#'+(item.idx+1);
    document.getElementById('answer-text').classList.remove('show');
    document.getElementById('mode-label').textContent    = isEnToJp ? '英 → 日' : '日 → 英';
    document.getElementById('display-text').textContent  = isEnToJp ? item.en : item.jp;
    document.getElementById('answer-text').textContent   = isEnToJp ? item.jp : item.en;
    document.getElementById('master-checkbox').checked   = masterSet.has(item.idx);
    document.getElementById('master-badge').classList.toggle('show', masterSet.has(item.idx));
    updateMasterUI(); updateFilterLabel(); buildCatRows();
}

function updateMasterUI() {
    const count   = masterSet.size;
    document.getElementById('master-count-badge').textContent = `マスター: ${count} / ${phrases.length}`;
    const summary = document.getElementById('master-summary');
    const listWrap = document.getElementById('master-list-wrap');
    if (count > 0) {
        summary.classList.add('show');
        summary.textContent = `✅ ${count}フレーズをマスター済 — タップして一覧を表示 / 解除`;
        const listEl = document.getElementById('master-list');
        listEl.innerHTML = '';
        [...masterSet].sort((a,b)=>a-b).forEach(idx => {
            const p   = phrases[idx];
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:12px;';
            row.innerHTML = `<span style="flex:1;line-height:1.4;"><span style="color:var(--primary);font-weight:700;">#${idx+1} ${escHtml(p.cat)}</span><br>${escHtml(p.en)}</span>`
                + `<button onclick="removeMaster(${idx})" style="border:none;background:#e11d48;color:#fff;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">解除</button>`;
            listEl.appendChild(row);
        });
    } else {
        summary.classList.remove('show');
        listWrap.style.display = 'none';
    }
}

// ─── UIイベント ───────────────────────────────────────────
function toggleMasterList() {
    if (masterSet.size===0) return;
    const wrap = document.getElementById('master-list-wrap');
    wrap.style.display = wrap.style.display==='none' ? '' : 'none';
}
function removeMaster(idx)  { masterSet.delete(idx); saveMaster(); update(); }
function clearAllMaster() {
    if (!confirm(`マスター済み${masterSet.size}フレーズを全て解除しますか？`)) return;
    masterSet.clear(); saveMaster();
    document.getElementById('master-list-wrap').style.display = 'none';
    update();
}
function handleCardTap() {
    if (isAutoPlaying) return;
    document.getElementById('answer-text').classList.add('show');
}
function toggleMaster(e) {
    if (isAutoPlaying) return;
    const active = getActivePhrases();
    if (active.length===0) return;
    const item = active[currentIndex];
    if (e.target.checked) { masterSet.add(item.idx); } else { masterSet.delete(item.idx); }
    saveMaster(); update();
}
function next() {
    if (isAutoPlaying) return;
    const active = getActivePhrases();
    if (active.length===0) return;
    currentIndex = isRandom ? Math.floor(Math.random()*active.length) : (currentIndex+1)%active.length;
    update();
}
function speak() {
    window.speechSynthesis.cancel();
    const active = getActivePhrases();
    if (active.length===0) return;
    const uttr = new SpeechSynthesisUtterance(active[currentIndex].en);
    uttr.lang = 'en-US'; uttr.rate = parseFloat(currentSpeed);
    const v = getEnglishVoice(); if (v) uttr.voice = v;
    window.speechSynthesis.speak(uttr);
}
function toggleRandom() {
    isRandom = !isRandom;
    const btn = document.getElementById('random-btn');
    btn.textContent = isRandom ? '🔀 ランダム: ON' : '🔀 ランダム: OFF';
    btn.className   = isRandom ? 'btn btn-toggle-on' : 'btn btn-secondary';
    document.getElementById('order-label').textContent = isRandom ? 'ランダム表示中' : '順番通り';
}
function switchMode() { if (isAutoPlaying) return; isEnToJp = !isEnToJp; update(); }
function updateSpeed() {
    currentSpeed = document.getElementById('speed-range').value;
    document.getElementById('speed-val').textContent = parseFloat(currentSpeed).toFixed(1);
}

// ─── AUTO-PLAY ────────────────────────────────────────────
function setAutoPanel(t, ins, c) {
    document.getElementById('auto-step-title').textContent  = t;
    document.getElementById('auto-instruction').textContent = ins;
    document.getElementById('auto-count').textContent       = c;
}
function delayP(ms) {
    return new Promise(r => { if (autoStopped){r();return;} autoTimeout=setTimeout(r,ms); });
}
function speakP() {
    return new Promise(resolve => {
        if (autoStopped) { resolve(); return; }
        window.speechSynthesis.cancel();
        const active = getActivePhrases();
        if (active.length===0) { resolve(); return; }
        const uttr = new SpeechSynthesisUtterance(active[currentIndex].en);
        uttr.lang = 'en-US'; uttr.rate = parseFloat(currentSpeed);
        const v = getEnglishVoice(); if (v) uttr.voice = v;
        uttr.onend = resolve; uttr.onerror = resolve;
        window.speechSynthesis.speak(uttr);
    });
}
function showCardState(showAnswer, hideAll) {
    const display = document.getElementById('display-text');
    const answer  = document.getElementById('answer-text');
    const active  = getActivePhrases();
    if (active.length===0) return;
    const item = active[currentIndex];
    if (hideAll) {
        display.textContent = '？？？';
        document.getElementById('cat').textContent = '？';
        answer.classList.remove('show');
    } else {
        display.textContent = item.en;
        document.getElementById('cat').textContent = item.cat;
        if (showAnswer) { answer.textContent = item.jp; answer.classList.add('show'); }
        else { answer.classList.remove('show'); }
    }
}
async function runAutoPlay() {
    const active = getActivePhrases();
    if (active.length===0) { stopAutoPlay(); return; }
    const startIdx = currentIndex;
    for (let i=0; i<active.length; i++) {
        if (autoStopped) break;
        currentIndex = (startIdx+i) % active.length;
        update();
        const n=i+1, tot=active.length;

        showCardState(false,true);
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 1`,'👂 発話せずに2回お聞き下さい。','再生 1/2回目…');
        await speakP(); if(autoStopped)break; await delayP(700); if(autoStopped)break;
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 1`,'👂 発話せずに2回お聞き下さい。','再生 2/2回目…');
        await speakP(); if(autoStopped)break; await delayP(900);

        if(autoStopped)break;
        showCardState(false,true);
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 2`,'🗣️ 音声に合わせて2回シャドウイングしてください。','再生 1/2回目…');
        await speakP(); if(autoStopped)break; await delayP(700);
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 2`,'🗣️ 音声に合わせて2回シャドウイングしてください。','再生 2/2回目…');
        await speakP(); if(autoStopped)break; await delayP(900);

        if(autoStopped)break;
        showCardState(true,false);
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 3`,'📖 英文と訳文を見ながら2回シャドウイングしてください。','再生 1/2回目…');
        await speakP(); if(autoStopped)break; await delayP(700);
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 3`,'📖 英文と訳文を見ながら2回シャドウイングしてください。','再生 2/2回目…');
        await speakP(); if(autoStopped)break; await delayP(900);

        if(autoStopped)break;
        showCardState(false,true);
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 4`,'🙈 英文を見ずに2回シャドウイングしてください。','再生 1/2回目…');
        await speakP(); if(autoStopped)break; await delayP(700);
        setAutoPanel(`フレーズ ${n}/${tot} — STEP 4`,'🙈 英文を見ずに2回シャドウイングしてください。','再生 2/2回目…');
        await speakP(); if(autoStopped)break; await delayP(1400);
    }
    if (!autoStopped) {
        setAutoPanel('完了！', `🎉 ${getActivePhrases().length}フレーズ完了しました！`, '');
        showCardState(false,false);
        await delayP(2000);
        stopAutoPlay();
    }
}
function startAutoPlay() {
    if (getActivePhrases().length===0) { alert('出題できるフレーズがありません。'); return; }
    isAutoPlaying=true; autoStopped=false;
    document.getElementById('normal-controls').style.display = 'none';
    document.getElementById('auto-controls').style.display   = '';
    document.getElementById('auto-panel').classList.add('show');
    document.getElementById('tap-hint').style.display        = 'none';
    document.getElementById('master-wrap').classList.add('disabled');
    const card = document.getElementById('main-card');
    card.classList.remove('tappable'); card.classList.add('no-tap');
    runAutoPlay();
}
function stopAutoPlay() {
    autoStopped=true; isAutoPlaying=false;
    window.speechSynthesis.cancel();
    if (autoTimeout) { clearTimeout(autoTimeout); autoTimeout=null; }
    document.getElementById('normal-controls').style.display = '';
    document.getElementById('auto-controls').style.display   = 'none';
    document.getElementById('auto-panel').classList.remove('show');
    document.getElementById('tap-hint').style.display        = '';
    document.getElementById('master-wrap').classList.remove('disabled');
    const card = document.getElementById('main-card');
    card.classList.add('tappable'); card.classList.remove('no-tap');
    update();
}

// ─── 初期化 ───────────────────────────────────────────────
buildCatRows();
updateFilterLabel();
update();
</script>
