<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUO 3.0 — No. 241〜303</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#fdf2f8;--surface:#ffffff;--primary:#be185d;--primary-light:#fce7f3;
--accent:#c026d3;--green:#16a34a;--green-light:#dcfce7;--amber:#d97706;--amber-light:#fef3c7;
--red:#e11d48;--text:#1e293b;--muted:#64748b;--border:#f9a8d4;
--shadow:0 4px 24px rgba(190,24,93,0.10);--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;padding:2px 12px 48px;color:var(--text);}
.container{max-width:560px;margin:auto;}
.header{text-align:center;margin-bottom:4px;}
.header h2{font-size:18px;font-weight:900;color:var(--primary);}
.header p{font-size:12px;color:var(--muted);margin-top:2px;}
.badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;background:var(--primary-light);color:var(--primary);border:1px solid var(--border);}
.badge.green{background:var(--green-light);color:var(--green);border-color:#86efac;}
.progress-wrap{background:#fbcfe8;border-radius:99px;height:6px;margin-bottom:4px;overflow:hidden;}
.progress-bar{height:100%;background:var(--primary);border-radius:99px;transition:width 0.4s ease;}
.progress-label{text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px;}
.tap-hint{font-size:11px;color:var(--muted);margin-bottom:6px;text-align:center;}
.card{background:var(--surface);border-radius:var(--radius);padding:28px 20px 20px;box-shadow:var(--shadow);margin-bottom:12px;position:relative;border:2px solid var(--border);min-height:160px;cursor:pointer;user-select:none;transition:transform .1s,border-color .2s;}
.card.tappable:active{transform:scale(0.985);}
.card.revealed{border-color:var(--primary);}
.card.no-tap{cursor:default;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.cat-label{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--primary);text-align:center;flex:1;}
.master-wrap{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.master-wrap input[type=checkbox]{width:17px;height:17px;accent-color:var(--green);cursor:pointer;}
.master-wrap.disabled{opacity:.3;pointer-events:none;}
.main-text{font-size:clamp(14px,3.8vw,18px);font-weight:700;line-height:1.65;text-align:center;margin-bottom:14px;}
.answer-wrap{opacity:0;transform:translateY(5px);transition:opacity .25s,transform .25s;pointer-events:none;}
.answer-wrap.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.answer-ja{font-size:clamp(13px,3.5vw,15px);font-weight:700;color:var(--accent);text-align:center;line-height:1.6;background:#fdf4ff;border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.answer-tip{font-size:12px;font-weight:600;color:var(--green);text-align:left;padding:0 4px;line-height:1.6;}
.answer-tip::before{content:'💡 ';}
.master-badge{display:none;text-align:center;margin-top:8px;background:var(--green-light);color:var(--green);padding:2px 10px;border-radius:99px;font-size:10px;font-weight:700;}
.master-badge.show{display:block;}
.no-active{background:var(--amber-light);border-radius:12px;padding:16px;text-align:center;font-size:14px;color:var(--amber);font-weight:700;display:none;margin-bottom:12px;}
.no-active.show{display:block;}
.auto-panel{background:var(--surface);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:12px;display:none;border-left:4px solid var(--primary);}
.auto-panel.show{display:block;}
.auto-step-title{font-size:12px;font-weight:900;color:var(--primary);margin-bottom:4px;}
.auto-instruction{font-size:14px;font-weight:700;color:var(--text);line-height:1.5;}
.auto-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-top:4px;}
.filter-panel{background:var(--surface);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px;}
.filter-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.filter-header-left{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.filter-current{font-size:12px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:3px 10px;border-radius:99px;border:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.filter-toggle-icon{font-size:12px;color:var(--muted);transition:transform .2s;margin-left:6px;}
.filter-toggle-icon.open{transform:rotate(180deg);}
.filter-chips-wrap{display:none;margin-top:10px;}
.filter-chips-wrap.open{display:block;}
.chip-all{display:block;width:100%;padding:8px 14px;margin-bottom:8px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--muted);text-align:left;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.chip-all.active{background:var(--primary-light);color:var(--primary);border-color:var(--primary);}
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;border:2px solid transparent;background:#fff;margin-bottom:5px;transition:all .15s;user-select:none;}
.cat-row.active{background:var(--primary-light);border-color:var(--primary);}
.cat-row-name{flex:1;font-size:13px;font-weight:700;color:var(--text);}
.cat-row.active .cat-row-name{color:var(--primary);}
.cat-row-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:99px;font-weight:600;}
.cat-row.active .cat-row-count{background:#fff;color:var(--primary);}
.cat-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;flex-shrink:0;}
.cat-dot.done{background:var(--green);}
.panel{background:var(--surface);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px;}
.panel-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.panel-row+.panel-row{margin-top:8px;}
.panel label{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;}
.panel select{flex:1;font-size:12px;border:1px solid var(--border);border-radius:8px;padding:4px 8px;background:#fff;color:var(--text);font-family:'Noto Sans JP',sans-serif;}
.panel input[type=range]{flex:1;min-width:80px;accent-color:var(--primary);}
.speed-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--primary);min-width:32px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.btn{border:none;border-radius:99px;padding:10px 18px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:5px;}
.btn:active{transform:scale(0.94);opacity:.85;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-secondary{background:#e2e8f0;color:var(--text);}
.btn-red{background:var(--red);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-blue{background:#2563eb;color:#fff;}
.btn-on{background:var(--green);color:#fff;}
.master-summary{background:var(--green-light);border-radius:12px;padding:10px 14px;font-size:12px;color:var(--green);font-weight:700;text-align:center;margin-bottom:10px;display:none;cursor:pointer;user-select:none;}
.master-summary.show{display:block;}
.help-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.top-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
.audio-mini-label{font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px;font-weight:700;}
.audio-track-row{display:flex;align-items:center;justify-content:center;gap:11px;margin:0 0 16px;flex-wrap:wrap;}
.audio-track-btn{border:1px solid #99f6e4;border-radius:99px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;background:#f0fdfa;color:#0891b2;font-family:'DM Mono',monospace;}
.audio-track-btn.playing{background:#0891b2;color:#fff;border-color:#0891b2;}
.audio-loop-all-btn{border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;background:#e2e8f0;color:var(--text);}
.audio-loop-all-btn.on{background:var(--green);color:#fff;border-color:var(--green);}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h2>🌸 DUO 3.0 — No. 241〜303</h2>
</div>

<div class="top-row">
<button class="help-btn" onclick="alert('👆カードタップで答え表示\n🔊音声再生（ネイティブ音声。ファイルがない場合のみ合成音声）\n🗣️シャドウイング4ステップ\n▶連続再生\n🔄英⇄日モード切替\nマスターチェックで次へ')">❓ 使い方</button>
<div class="badge green" id="master-badge-top">マスター: 0 / 63</div>
</div>

<div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:2%"></div></div>
<div class="progress-label">カード <span id="cur-num">1</span> / <span id="tot-num">63</span></div>
<div class="no-active" id="no-active">✅ このカテゴリをすべてマスターしました！</div>
<div class="auto-panel" id="auto-panel">
<div class="auto-step-title" id="auto-step-title">STEP 1</div>
<div class="auto-instruction" id="auto-instruction">音声を聴いてください。</div>
<div class="auto-count" id="auto-count"></div>
</div>
<div class="tap-hint" id="tap-hint">👆 カードをタップして日本語訳・解説を表示</div>
<div class="card tappable" id="main-card" onclick="handleTap()">
<div class="card-top">
<div class="card-num" id="card-num">241</div>
<div class="cat-label" id="card-cat"></div>
<div class="master-wrap" id="master-wrap">
<span>マスター</span>
<input type="checkbox" id="master-cb" onchange="toggleMaster(event)" onclick="event.stopPropagation()">
</div>
</div>
<div class="main-text" id="main-text">Loading...</div>
<div class="answer-wrap" id="answer-wrap">
<div class="answer-ja" id="answer-ja"></div>
<div class="answer-tip" id="answer-tip" style="display:none"></div>
</div>
<div class="master-badge" id="mastered-badge">✔ マスター済</div>
</div>
<div class="master-summary" id="master-summary" onclick="toggleMasterList()"></div>
<div id="master-list-wrap" style="display:none;margin-bottom:12px;">
<div style="background:#fff;border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
<span style="font-size:13px;font-weight:900;color:var(--green);">✅ マスター済みリスト</span>
<button class="btn btn-secondary" style="padding:4px 12px;font-size:11px;" onclick="clearAllMaster()">全解除</button>
</div>
<div id="master-list"></div>
</div>
</div>
<div class="filter-panel">
<div class="filter-header" onclick="toggleFilterPanel()">
<div class="filter-header-left">📂 カテゴリを選ぶ</div>
<div style="display:flex;align-items:center;gap:4px;">
<div class="filter-current" id="filter-current-label">すべて</div>
<span class="filter-toggle-icon" id="filter-toggle-icon">▼</span>
</div>
</div>
<div class="filter-chips-wrap" id="filter-chips-wrap">
<button class="chip-all active" id="chip-all" onclick="selectCategory('all')">🎯 すべて表示</button>
<div id="cat-rows"></div>
</div>
</div>
<div class="panel">
<div class="panel-row">
<label>速度</label>
<input type="range" id="rate-slider" min="0.5" max="3.0" step="0.1" value="1.0" oninput="updateRate()">
<span class="speed-val" id="rate-val">1.0×</span>
</div>
</div>
<div id="normal-controls">
<div class="btn-row">
<button class="btn btn-secondary" onclick="prev()">← 戻る</button>
<button class="btn btn-primary" onclick="speakCurrent()">🔊 音声</button>
<button class="btn btn-secondary" onclick="next()">次へ →</button>
<button class="btn btn-secondary" style="font-size:11px;padding:8px 6px;" onclick="switchMode()">🔄 英⇄日</button>
</div>
<div class="btn-row" style="gap:4px;">
<button class="btn btn-secondary" style="font-size:11px;padding:7px 5px;" id="random-btn" onclick="toggleRandom()">🔀 ランダム</button>
<button class="btn btn-secondary" style="font-size:11px;padding:7px 5px;" id="repeat-btn" onclick="toggleRepeat()">🔁 繰り返し</button>
<button class="btn btn-blue" style="font-size:11px;padding:7px 5px;" onclick="startContinuous()">▶ 連続再生</button>
<button class="btn btn-amber" style="font-size:11px;padding:7px 5px;" onclick="startShadowing()">🗣️ シャドウ</button>
</div>
</div>
<div id="auto-controls" style="display:none;">
<div class="btn-row"><button class="btn btn-red" onclick="stopAutoPlay()">⏹ 停止</button></div>
</div>
</div>
<script>
const OFFSET=241;
const CATS={'🌿 環境・自然':'#be185d','🌏 地理・気象':'#2563eb','🌍 自然・災害':'#16a34a','🏙️ 現代社会・技術':'#7c3aed','💼 ビジネス・経済':'#d97706','✏️ 構文・慣用表現A':'#0891b2','🏠 旅行・日常生活':'#dc2626'};
const phrases=[
{cat:'🌿 環境・自然', en:'The ecologist has warned us time and again that petroleum is not only a blessing but also a curse.', ja:'生態学者は我々に繰り返し警告してきた。石油は天の恵みであると同時に災いのもとでもあると。', tip:'ecologist＝生態学者。time and again＝繰り返し何度も。petroleum＝石油。not only A but also B＝AだけでなくBも。blessing＝恵み・祝福。curse＝呪い・災い。',audio:'card_audio/card_241.mp3'},
{cat:'🌏 地理・気象', en:'The continent is abundant in fossil fuels.', ja:'その大陸は化石燃料が豊富だ。', tip:'continent＝大陸。be abundant in＝〜が豊富だ（= be rich in）。fossil＝化石。fossil fuels＝化石燃料（石油・石炭・天然ガスなど）。',audio:'card_audio/card_242.mp3'},
{cat:'🌏 地理・気象', en:'The region is relatively rich in mineral resources.', ja:'その地域は鉱物資源が比較的豊かだ。', tip:'region＝地域・地方。relatively＝比較的・相対的に。rich in＝〜が豊富な。mineral resources＝鉱物資源。',audio:'card_audio/card_243.mp3'},
{cat:'🌏 地理・気象', en:'Wheat accounts for approximately two-thirds of agricultural production in the area.', ja:'小麦はこの地域の農業生産高のおよそ3分の2を占めている。', tip:'account for＝〜を占める・〜の原因となる。approximately＝おおよそ（= about より格式的）。two-thirds＝3分の2。agricultural＝農業の。',audio:'card_audio/card_244.mp3'},
{cat:'🌏 地理・気象', en:'Fertile soil is indispensable for a good harvest.', ja:'良い収穫を得るためには、肥沃な土壌が不可欠だ。', tip:'fertile＝肥沃な・豊かな（infertile は不毛な）。soil＝土壌。indispensable＝不可欠な（= essential）。harvest＝収穫・収穫物。',audio:'card_audio/card_245.mp3'},
{cat:'🌏 地理・気象', en:'A humid climate is characteristic of the peninsula.', ja:'湿気の多い気候はその半島の特色です。', tip:'humid＝湿気の多い（humidity＝湿度）。climate＝気候（weather は今の天気）。characteristic of＝〜の特色・特徴である。peninsula＝半島（pene-＝ほとんど＋insula＝島）。',audio:'card_audio/card_246.mp3'},
{cat:'🌏 地理・気象', en:'The active volcano erupts at regular intervals.', ja:'その活火山は周期的に噴火する。', tip:'active volcano＝活火山（extinct volcano は死火山）。erupt＝噴火する（eruption＝噴火）。at regular intervals＝一定の間隔で・周期的に。',audio:'card_audio/card_247.mp3'},
{cat:'🌏 地理・気象', en:'The Panama Canal connects the Atlantic with the Pacific.', ja:'パナマ運河は大西洋と太平洋をつないでいる。', tip:'canal＝運河。connect A with B＝AとBをつなぐ。the Atlantic＝大西洋（Atlantic Ocean）。the Pacific＝太平洋（Pacific Ocean）。',audio:'card_audio/card_248.mp3'},
{cat:'🌏 地理・気象', en:'The geographical features here are similar to those of our prefecture.', ja:'ここ（当地）の地理的特徴は、私たちの県のそれと似ている。', tip:'geographical＝地理的な（geography＝地理学）。feature＝特徴・特色。similar to＝〜と似ている。those＝前に出た名詞の代用（= the features）。prefecture＝県・都道府県。',audio:'card_audio/card_249.mp3'},
{cat:'🌏 地理・気象', en:'More often than not, famine is accompanied by plague.', ja:'たいてい、飢饉になると疫病も発生する。', tip:'more often than not＝たいていの場合・過半数の場合（慣用句）。famine＝飢饉・飢え。be accompanied by＝〜を伴う・〜が一緒に起こる。plague＝疫病・ペスト。',audio:'card_audio/card_250.mp3'},
{cat:'🌍 自然・災害', en:'A devastating earthquake hit the state capital, leaving tens of thousands of residents homeless.', ja:'壊滅的な規模の地震が州都を襲い、数万人の住民が家を失った。', tip:'devastating＝壊滅的な・破壊的な。state capital＝州都。leave A B＝AをBの状態にする（付帯状況）。tens of thousands of＝数万の。homeless＝家を失った。',audio:'card_audio/card_251.mp3'},
{cat:'🌍 自然・災害', en:'"Watch out! The ceiling is giving way!"', ja:'「気をつけろ！天井が崩れかけてるぞ！」', tip:'watch out!＝気をつけろ！（= look out!）。ceiling＝天井（floor は床）。give way＝崩れる・陥没する・屈服する（慣用句）。',audio:'card_audio/card_252.mp3'},
{cat:'🌍 自然・災害', en:'The weather forecast says the typhoon is likely to accelerate and approach the coast.', ja:'台風は速度を上げて沿岸に接近しそうだと天気予報では言っている。', tip:'weather forecast＝天気予報。be likely to＝〜しそうだ（= probably will）。accelerate＝加速する。approach＝〜に近づく。coast＝海岸・沿岸。',audio:'card_audio/card_253.mp3'},
{cat:'🌍 自然・災害', en:'"It\'s still up in the air whether the game will be called off or not." "So what? It makes no difference to me."', ja:'「試合が中止になるかどうか、まだ決まらないんだ。」「それがどうしたの？私にとっては、どうでもいいことだわ。」', tip:'up in the air＝未決定の・宙ぶらりんの（慣用句）。call off＝〜を中止する（= cancel）。make no difference＝関係ない・どうでもよい。',audio:'card_audio/card_254.mp3'},
{cat:'🌍 自然・災害', en:'"It\'s foggy, isn\'t it?" "It sure is. But chances are it\'ll clear up later on."', ja:'「霧が濃いわね。」「本当ね。でも、たぶんこのあとは晴れるわ。」', tip:'foggy＝霧が濃い（fog＝霧）。chances are (that)＝おそらく〜だろう（慣用句）。clear up＝（天気が）晴れる・（問題が）解決する。later on＝この後・後ほど。',audio:'card_audio/card_255.mp3'},
{cat:'🏙️ 現代社会・技術', en:'For the most part, modernization is identified with westernization.', ja:'ほとんどの場合、近代化は西欧化と同一のものと見なされる。', tip:'for the most part＝ほとんどの場合・大部分は。modernization＝近代化。be identified with＝〜と同一視される・同じものとみなされる。westernization＝西欧化。',audio:'card_audio/card_256.mp3'},
{cat:'🏙️ 現代社会・技術', en:'Urban culture appears to be attractive to many people, in particular, to younger people.', ja:'都会の文化は多くの人々の目には魅力的に映る。とりわけ、若者にとっては。', tip:'urban＝都市の（rural は農村の）。appear to be＝〜のように見える。attractive＝魅力的な。in particular＝とりわけ・特に（= especially）。',audio:'card_audio/card_257.mp3'},
{cat:'🏙️ 現代社会・技術', en:'"AI" stands for "artificial intelligence."', ja:'AIは人工知能の略です。', tip:'stand for＝〜の略である・〜を表す（= represent）。artificial＝人工の・人為的な（natural の反対）。intelligence＝知能・情報（インテリジェンス）。',audio:'card_audio/card_258.mp3'},
{cat:'🏙️ 現代社会・技術', en:'Household appliances are becoming more convenient day by day.', ja:'家庭用の電化製品は日に日に便利になっている。', tip:'household＝家庭の・世帯の。appliance＝（家庭用）電化製品。day by day＝日に日に・日々（= gradually）。convenient＝便利な。',audio:'card_audio/card_259.mp3'},

// カードごとのネイティブ音声再生
let nativeAudioEl=new Audio();
nativeAudioEl.preload='none';
nativeAudioEl.preservesPitch=true;
nativeAudioEl.mozPreservesPitch=true;
nativeAudioEl.webkitPreservesPitch=true;
function playNativeAudio(audioFile,onEnd,onError){
  nativeAudioEl.pause();
  nativeAudioEl.onended=null;
  nativeAudioEl.onerror=null;
  if(!audioFile){ if(onError)onError(); return; }
  nativeAudioEl.src=audioFile;
  nativeAudioEl.currentTime=0;
  nativeAudioEl.playbackRate=speechRate;
  nativeAudioEl.onended=()=>{ if(onEnd)onEnd(); };
  const p=nativeAudioEl.play();
  if(p&&p.catch){ p.catch(()=>{ if(onError)onError(); }); }
}
function stopNativeAudio(){ nativeAudioEl.pause(); nativeAudioEl.onended=null; }
let currentIndex=0,isEnToJa=true,isRandom=false,isRepeating=false;
let mastered=new Set(),activeCategory='all';
let isAutoPlaying=false,autoStopped=false,autoTimeout=null;
let isSpeaking=false,keepAliveTimer=null,speechRate=1.0,voices=[];
function getActive(){return phrases.filter((p,i)=>{if(activeCategory!=='all'&&p.cat!==activeCategory)return false;if(mastered.has(i))return false;return true;});}
function buildCatRows(){const wrap=document.getElementById('cat-rows');wrap.innerHTML='';Object.keys(CATS).forEach(cat=>{const total=phrases.filter(p=>p.cat===cat).length;const mc=phrases.filter((p,i)=>p.cat===cat&&mastered.has(i)).length;const row=document.createElement('div');row.className='cat-row'+(activeCategory===cat?' active':'');row.innerHTML=`<div class="cat-dot${mc===total?' done':''}"></div><div class="cat-row-name">${cat}</div><div class="cat-row-count">${mc}/${total}</div>`;row.onclick=()=>selectCategory(cat);wrap.appendChild(row);});}
function selectCategory(cat){activeCategory=cat;currentIndex=0;document.getElementById('chip-all').className='chip-all'+(cat==='all'?' active':'');buildCatRows();updateFilterLabel();update();document.getElementById('filter-chips-wrap').classList.remove('open');document.getElementById('filter-toggle-icon').classList.remove('open');}
function updateFilterLabel(){document.getElementById('filter-current-label').textContent=activeCategory==='all'?'すべて':activeCategory;}
function toggleFilterPanel(){document.getElementById('filter-chips-wrap').classList.toggle('open');document.getElementById('filter-toggle-icon').classList.toggle('open');}
function loadVoices(){const all=window.speechSynthesis.getVoices();const okNames=new Set(['Microsoft Ava Online (Natural) - English (United States)','Microsoft Andrew Online (Natural) - English (United States)','Microsoft Emma Online (Natural) - English (United States)','Microsoft Brian Online (Natural) - English (United States)','Microsoft Jenny Online (Natural) - English (United States)','Microsoft Guy Online (Natural) - English (United States)','Microsoft Aria Online (Natural) - English (United States)','Microsoft Ana Online (Natural) - English (United States)','Microsoft Christopher Online (Natural) - English (United States)','Microsoft Eric Online (Natural) - English (United States)','Microsoft Michelle Online (Natural) - English (United States)','Microsoft Steffan Online (Natural) - English (United States)','Microsoft Ava Multilingual Online (Natural) - English (United States)','Microsoft Andrew Multilingual Online (Natural) - English (United States)','Microsoft Emma Multilingual Online (Natural) - English (United States)','Microsoft Brian Multilingual Online (Natural) - English (United States)','Microsoft Hazel - English (United Kingdom)','Microsoft Susan - English (United Kingdom)','Microsoft George - English (United Kingdom)','Microsoft Libby Online (Natural) - English (United Kingdom)','Microsoft Maisie Online (Natural) - English (United Kingdom)','Microsoft Thomas Online (Natural) - English (United Kingdom)','Microsoft Sonia Online (Natural) - English (United Kingdom)','Microsoft Ryan Online (Natural) - English (United Kingdom)','Microsoft William Online (Natural) - English (Australia)','Microsoft Natasha Online (Natural) - English (Australia)','Microsoft Clara Online (Natural) - English (Canada)','Microsoft Liam Online (Natural) - English (Canada)','Microsoft Leah Online (Natural) - English (South Africa)','Microsoft Luke Online (Natural) - English (South Africa)','Microsoft Emily Online (Natural) - English (Ireland)','Microsoft Connor Online (Natural) - English (Ireland)','Microsoft Yan Online (Natural) - English (Hong Kong SAR)','Microsoft Sam Online (Natural) - English (Hong Kong SAR)','Microsoft Asilia Online (Natural) - English (Kenya)','Microsoft Chilemba Online (Natural) - English (Kenya)','Microsoft Ezinne Online (Natural) - English (Nigeria)','Microsoft Abeo Online (Natural) - English (Nigeria)','Microsoft Molly Online (Natural) - English (New Zealand)','Microsoft Luna Online (Natural) - English (Singapore)','Microsoft Imani Online (Natural) - English (Tanzania)','Microsoft Elimu Online (Natural) - English (Tanzania)','Microsoft James Online (Natural) - English (Philippines)','Microsoft Neerja Online (Natural) - English (India)','Microsoft Prabhat Online (Natural) - English (India)']);const wl=all.filter(v=>okNames.has(v.name));voices=wl.length?wl:all.filter(v=>v.lang.startsWith('en'));if(!voices.length)voices=all;voices=[...voices].sort((a,b)=>{const pref=['en-US','en-GB','en-AU','en-SG'];const ai=pref.findIndex(p=>a.lang.startsWith(p));const bi=pref.findIndex(p=>b.lang.startsWith(p));return(ai<0?99:ai)-(bi<0?99:bi);});}
loadVoices();
window.speechSynthesis.onvoiceschanged=loadVoices;
function getVoice(){return voices[0]||null;}
function updateRate(){speechRate=parseFloat(document.getElementById('rate-slider').value);document.getElementById('rate-val').textContent=speechRate.toFixed(1)+'×';if(!nativeAudioEl.paused){nativeAudioEl.playbackRate=speechRate;}}
function startKeepAlive(){stopKeepAlive();keepAliveTimer=setInterval(()=>{if(window.speechSynthesis.speaking)window.speechSynthesis.pause(),window.speechSynthesis.resume();},10000);}
function stopKeepAlive(){if(keepAliveTimer){clearInterval(keepAliveTimer);keepAliveTimer=null;}}
function speakTTS(text,onEnd){window.speechSynthesis.cancel();isSpeaking=false;clearTimeout(speakOne._t);speakOne._t=setTimeout(()=>{const utt=new SpeechSynthesisUtterance(text);const v=getVoice();if(v){utt.voice=v;utt.lang=v.lang;}else{utt.lang='en-US';}utt.rate=speechRate;utt.onend=()=>{isSpeaking=false;stopKeepAlive();if(onEnd)onEnd();};utt.onerror=()=>{isSpeaking=false;stopKeepAlive();if(onEnd)onEnd();};isSpeaking=true;startKeepAlive();window.speechSynthesis.speak(utt);},80);}
speakOne._t=null;
function speakOne(card,onEnd){
  window.speechSynthesis.cancel();
  stopNativeAudio();
  if(card&&card.audio){
    playNativeAudio(card.audio,onEnd,()=>{ speakTTS(card.en,onEnd); });
  } else {
    speakTTS(card.en,onEnd);
  }
}
function speakP(){return new Promise(r=>{const a=getActive();if(!a.length){r();return;}speakOne(a[currentIndex],r);});}
function speakCurrent(){const a=getActive();if(!a.length)return;speakOne(a[currentIndex]);}
function speakRepeat(){if(!isRepeating||isAutoPlaying)return;const a=getActive();if(!a.length)return;speakOne(a[currentIndex],()=>{if(isRepeating&&!isAutoPlaying){clearTimeout(speakRepeat._t);speakRepeat._t=setTimeout(()=>speakRepeat(),300);}}); }
speakRepeat._t=null;
function toggleRepeat(){isRepeating=!isRepeating;const btn=document.getElementById('repeat-btn');btn.textContent=isRepeating?'🔁 繰り返し: ON':'🔁 繰り返し';btn.className=isRepeating?'btn btn-on':'btn btn-secondary';if(isRepeating){const a=getActive();if(a.length)speakRepeat();}else{window.speechSynthesis.cancel();stopNativeAudio();isSpeaking=false;stopKeepAlive();clearTimeout(speakRepeat._t);}}
function update(){const active=getActive();const noEl=document.getElementById('no-active');if(!active.length){noEl.classList.add('show');document.getElementById('main-card').style.display='none';document.getElementById('tap-hint').style.display='none';updateMasterBadge();buildCatRows();return;}noEl.classList.remove('show');document.getElementById('main-card').style.display='';document.getElementById('tap-hint').style.display='';if(currentIndex>=active.length)currentIndex=0;const item=active[currentIndex];const realIdx=phrases.indexOf(item);document.getElementById('card-num').textContent=String(realIdx+OFFSET).padStart(3,'0');document.getElementById('card-cat').textContent=item.cat;document.getElementById('cur-num').textContent=currentIndex+1;document.getElementById('tot-num').textContent=active.length;const pct=active.length>1?((currentIndex/(active.length-1))*100).toFixed(0):100;document.getElementById('progress-bar').style.width=pct+'%';if(isEnToJa){document.getElementById('main-text').innerHTML=item.en;document.getElementById('answer-ja').textContent=item.ja;}else{document.getElementById('main-text').innerHTML=item.ja;document.getElementById('answer-ja').textContent=item.en;}const tipEl=document.getElementById('answer-tip');if(item.tip){tipEl.textContent=item.tip;tipEl.style.display='';}else{tipEl.style.display='none';}document.getElementById('answer-wrap').classList.remove('show');document.getElementById('main-card').classList.remove('revealed');const cb=document.getElementById('master-cb');cb.checked=mastered.has(realIdx);if(mastered.has(realIdx))document.getElementById('mastered-badge').classList.add('show');else document.getElementById('mastered-badge').classList.remove('show');updateMasterBadge();buildCatRows();}
function updateMasterBadge(){const cnt=mastered.size;document.getElementById('master-badge-top').textContent=`マスター: ${cnt} / ${phrases.length}`;const sumEl=document.getElementById('master-summary');if(cnt>0){sumEl.classList.add('show');sumEl.textContent=`✅ マスター済み: ${cnt}件 — タップしてリスト表示`;renderMasterList();}else sumEl.classList.remove('show');}
function renderMasterList(){const listEl=document.getElementById('master-list');listEl.innerHTML='';[...mastered].sort((a,b)=>a-b).forEach(idx=>{const item=phrases[idx];const d=document.createElement('div');d.style.cssText='padding:8px 0;border-bottom:1px solid #f8fafc;font-size:12px;';d.innerHTML=`<span style="font-family:monospace;font-size:10px;color:#64748b;">${String(idx+OFFSET).padStart(3,'0')}</span> ${item.en.substring(0,55)}...`;listEl.appendChild(d);});}
function toggleMasterList(){const w=document.getElementById('master-list-wrap');w.style.display=w.style.display==='none'?'':'none';}
function clearAllMaster(){if(!confirm('マスター済みをすべて解除しますか？'))return;mastered.clear();currentIndex=0;update();document.getElementById('master-list-wrap').style.display='none';}
function handleTap(){if(isAutoPlaying)return;const wrap=document.getElementById('answer-wrap');if(!wrap.classList.contains('show')){wrap.classList.add('show');document.getElementById('main-card').classList.add('revealed');}}
function toggleMaster(e){const active=getActive();if(!active.length)return;const item=active[currentIndex];const realIdx=phrases.indexOf(item);if(e.target.checked){mastered.add(realIdx);document.getElementById('mastered-badge').classList.add('show');setTimeout(()=>{if(currentIndex>=getActive().length)currentIndex=0;update();},400);}else{mastered.delete(realIdx);document.getElementById('mastered-badge').classList.remove('show');}updateMasterBadge();buildCatRows();}
function next(){const a=getActive();if(!a.length)return;if(isRandom)currentIndex=Math.floor(Math.random()*a.length);else currentIndex=(currentIndex+1)%a.length;update();if(isRepeating){clearTimeout(speakRepeat._t);speakRepeat();}}
function prev(){const a=getActive();if(!a.length)return;currentIndex=(currentIndex-1+a.length)%a.length;update();if(isRepeating){clearTimeout(speakRepeat._t);speakRepeat();}}
function toggleRandom(){isRandom=!isRandom;const btn=document.getElementById('random-btn');btn.textContent=isRandom?'🔀 ランダム: ON':'🔀 ランダム: OFF';btn.className=isRandom?'btn btn-on':'btn btn-secondary';}
function switchMode(){if(isAutoPlaying)return;isEnToJa=!isEnToJa;update();}
function delayP(ms){return new Promise(r=>{if(autoStopped){r();return;}autoTimeout=setTimeout(r,ms);});}
function setAutoPanel(s,i,c){document.getElementById('auto-step-title').textContent=s;document.getElementById('auto-instruction').textContent=i;document.getElementById('auto-count').textContent=c;}
function enterAutoUI(){isAutoPlaying=true;autoStopped=false;document.getElementById('normal-controls').style.display='none';document.getElementById('auto-controls').style.display='';document.getElementById('auto-panel').classList.add('show');document.getElementById('tap-hint').style.display='none';document.getElementById('master-wrap').classList.add('disabled');document.getElementById('main-card').classList.remove('tappable');document.getElementById('main-card').classList.add('no-tap');}
function exitAutoUI(){autoStopped=true;isAutoPlaying=false;window.speechSynthesis.cancel();stopNativeAudio();isSpeaking=false;stopKeepAlive();clearTimeout(speakOne._t);if(autoTimeout){clearTimeout(autoTimeout);autoTimeout=null;}document.getElementById('normal-controls').style.display='';document.getElementById('auto-controls').style.display='none';document.getElementById('auto-panel').classList.remove('show');document.getElementById('tap-hint').style.display='';document.getElementById('master-wrap').classList.remove('disabled');document.getElementById('main-card').classList.add('tappable');document.getElementById('main-card').classList.remove('no-tap');}
function stopAutoPlay(){exitAutoUI();update();}
function showHidden(){document.getElementById('main-text').textContent='？？？';document.getElementById('answer-wrap').classList.remove('show');document.getElementById('main-card').classList.remove('revealed');}
function showAll(){const a=getActive();if(!a.length)return;document.getElementById('main-text').innerHTML=a[currentIndex].en;document.getElementById('answer-wrap').classList.add('show');document.getElementById('main-card').classList.add('revealed');}
async function runShadowing(){const active=getActive();if(!active.length){stopAutoPlay();return;}const si=currentIndex;for(let i=0;i<active.length;i++){if(autoStopped)break;currentIndex=(si+i)%active.length;update();const n=i+1,tot=active.length;showHidden();setAutoPanel(`カード ${n}/${tot} — STEP 1`,'👂 発話せずに2回聴いてください。','1/2回目…');await speakP();if(autoStopped)break;await delayP(350);if(autoStopped)break;setAutoPanel(`カード ${n}/${tot} — STEP 1`,'👂 発話せずに2回聴いてください。','2/2回目…');await speakP();if(autoStopped)break;await delayP(450);if(autoStopped)break;showHidden();setAutoPanel(`カード ${n}/${tot} — STEP 2`,'🗣️ 音声に合わせてシャドウイングしてください。','1/2回目…');await speakP();if(autoStopped)break;await delayP(350);if(autoStopped)break;setAutoPanel(`カード ${n}/${tot} — STEP 2`,'🗣️ 音声に合わせてシャドウイングしてください。','2/2回目…');await speakP();if(autoStopped)break;await delayP(450);if(autoStopped)break;showAll();setAutoPanel(`カード ${n}/${tot} — STEP 3`,'📖 英文・日本語訳を見ながら2回シャドウイング。','1/2回目…');await speakP();if(autoStopped)break;await delayP(350);if(autoStopped)break;setAutoPanel(`カード ${n}/${tot} — STEP 3`,'📖 英文・日本語訳を見ながら2回シャドウイング。','2/2回目…');await speakP();if(autoStopped)break;await delayP(450);if(autoStopped)break;showHidden();setAutoPanel(`カード ${n}/${tot} — STEP 4`,'🙈 何も見ずに2回シャドウイングしてください。','1/2回目…');await speakP();if(autoStopped)break;await delayP(350);if(autoStopped)break;setAutoPanel(`カード ${n}/${tot} — STEP 4`,'🙈 何も見ずに2回シャドウイングしてください。','2/2回目…');await speakP();if(autoStopped)break;await delayP(700);}if(!autoStopped){setAutoPanel('完了！','🎉 シャドウイング完了しました！','');await delayP(2000);stopAutoPlay();}}
function startShadowing(){if(!getActive().length){alert('出題できるカードがありません。');return;}enterAutoUI();runShadowing();}
async function runContinuous(){let lc=0;while(!autoStopped){const active=getActive();if(!active.length){stopAutoPlay();return;}lc++;const si=currentIndex;for(let i=0;i<active.length;i++){if(autoStopped)break;currentIndex=(si+i)%active.length;update();document.getElementById('answer-wrap').classList.add('show');document.getElementById('main-card').classList.add('revealed');setAutoPanel(`連続再生 ${i+1}/${active.length}（${lc}周目）`,'▶ 英語音声を再生中 — ⏹ 停止ボタンで終了','');await speakP();if(autoStopped)break;await delayP(500);}if(!autoStopped)currentIndex=0;}}
function startContinuous(){if(!getActive().length){alert('出題できるカードがありません。');return;}enterAutoUI();runContinuous();}
buildCatRows();updateFilterLabel();update();
</script>
<script>
(function() {
var startX = 0, startY = 0;
document.addEventListener('touchstart', function(e) {
startX = e.touches[0].clientX;
startY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', function(e) {
var dx = e.changedTouches[0].clientX - startX;
var dy = e.changedTouches[0].clientY - startY;
if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
if (dx < 0) next();
else prev();
}
}, { passive: true });
})();
</script>
