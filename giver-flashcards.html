に使う。"}, {"word": "hesitant", "hint": "ためらいがちな", "general": "何かをするのに、迷いや不安を持っている性質", "example": "His hesitant voice betrayed his uncertainty.", "example_ja": "彼のためらいがちな声は、その不安を物語っていた。", "note": "a hesitant voice/step のように使う。"}, {"word": "recede", "hint": "後退する、遠ざかる", "general": "徐々に離れていく、または弱くなっていくこと", "example": "The sound of footsteps receded down the corridor.", "example_ja": "足音は、廊下の向こうへと遠ざかっていった。", "note": "recede into the distance のように使う。"}, {"word": "clammy", "hint": "冷たく湿った", "general": "汗などで、不快に湿っている様子", "example": "His palms felt clammy as he waited for his name to be called.", "example_ja": "自分の名前が呼ばれるのを待つ間、彼の手のひらは冷たく湿っていた。", "note": "clammy hands/skin のように使う。"}, {"word": "queasy", "hint": "吐き気を感じる、むかつく", "general": "不快感や緊張で、胃が悪くなる感覚", "example": "He felt a queasy unease he could not quite explain.", "example_ja": "彼は、はっきりと説明できない、むかつくような不安を感じた。", "note": "feel queasy のように使う。"}, {"word": "unease", "hint": "不安、落ち着かない気持ち", "general": "はっきりしない、漠然とした心配の感情", "example": "A growing sense of unease followed him through the corridors.", "example_ja": "募る不安の感覚が、廊下を歩く彼についてきた。", "note": "a sense of unease のように使う。"}, {"word": "crisp", "hint": "きびきびした、ぱりっとした", "general": "はっきりとして、きれいに整っている様子", "example": "His instructions were crisp and left no room for argument.", "example_ja": "彼の指示はきびきびとしていて、議論の余地を残さなかった。", "note": "a crisp voice/morning のように使う。"}, {"word": "opaque", "hint": "不透明な、わかりにくい", "general": "光を通さない、または理解しにくい性質", "example": "His expression remained opaque, giving nothing away.", "example_ja": "彼の表情はわかりにくいままで、何も読み取らせなかった。", "note": "an opaque expression/surface のように使う。"}, {"word": "steady", "hint": "安定した、揺るがない", "general": "変化や乱れがなく、安定している様子", "example": "His voice remained steady, even as the room grew tense.", "example_ja": "部屋の緊張が高まる中でも、彼の声は安定していた。", "note": "a steady voice/hand のように使う。"}, {"word": "falter", "hint": "よろめく、ためらう", "general": "自信や安定を失い、不確かになること", "example": "Her voice faltered for just a moment before she continued.", "example_ja": "彼女の声は、続ける前にほんの一瞬よろめいた。", "note": "falter in/over ~ のように使う。"}, {"word": "whispered", "hint": "ささやいた", "general": "小さく、息のような声で話した", "example": "\"Don't move,\" he whispered.", "example_ja": "「動くな」と彼はささやいた。", "note": "whisper(ささやく)の過去形。"}, {"word": "glance", "hint": "ちらりと見る", "general": "短く、すばやく見ること", "example": "He glanced at the clock and frowned.", "example_ja": "彼は時計をちらりと見て、顔をしかめた。", "note": "glance at ~ のように使う。"}, {"word": "stoop", "hint": "前かがみになる、屈む", "general": "体を低くするために、上半身を前に曲げること", "example": "He had to stoop to pass through the low doorway.", "example_ja": "彼は、その低い戸口を通るために前かがみにならなければならなかった。", "note": "stoop to do something のように使う。"}, {"word": "rustle", "hint": "かすかな音、ざわめき", "general": "葉や紙などが触れ合って出る、軽くこすれるような音", "example": "A faint rustle of paper came from behind the curtain.", "example_ja": "カーテンの後ろから、紙のかすかなざわめきが聞こえた。", "note": "a rustle of leaves/paper のように使う。"}, {"word": "stillness", "hint": "静止、静けさ", "general": "動きや音がない状態", "example": "A strange stillness had settled over the entire community.", "example_ja": "奇妙な静けさが、その共同体全体に広がっていた。", "note": "a stillness settled over ~ のように使う。"}, {"word": "frantic", "hint": "取り乱した、必死の", "general": "恐怖や緊急性のために、混乱して急いでいる様子", "example": "His frantic search for the answer turned up nothing.", "example_ja": "答えを見つけようとする彼の必死の探求は、何も見つけられなかった。", "note": "a frantic search/effort のように使う。"}, {"word": "yield", "hint": "屈する、譲る", "general": "抵抗をやめて、要求や圧力に応じること", "example": "After a long pause, he finally yielded to the request.", "example_ja": "長い沈黙の後、彼はついにその要求に応じた。", "note": "yield to ~ のように使う。"}, {"word": "persistent", "hint": "持続する、根気強い", "general": "長く続く、または容易にあきらめない性質", "example": "A persistent ache remained behind his eyes for the rest of the day.", "example_ja": "その日の残り、彼の目の裏には持続的な痛みが残っていた。", "note": "a persistent ache/feeling のように使う。"}, {"word": "daze", "hint": "ぼうっとした状態", "general": "驚きや疲労で、はっきり考えられない状態", "example": "He walked home in a daze, hardly aware of his surroundings.", "example_ja": "彼はぼうっとした状態で家まで歩き、周囲のことをほとんど意識していなかった。" , "example": "He flushed slightly when his mistake was pointed out.", "example_ja": "自分の間違いを指摘されると、彼は少し赤面した。", "note": "flush with embarrassment のように使う。"}, {"word": "resolute", "hint": "決然とした、固い意志の", "general": "決意が固く、揺るがない性質", "example": "Despite everything, his expression remained resolute.", "example_ja": "すべてにもかかわらず、彼の表情は決然としていた。", "note": "a resolute expression/decision のように使う。"}, {"word": "waver", "hint": "揺らぐ、ためらう", "general": "確信や決意が、不安定になること", "example": "For a moment his resolve seemed to waver.", "example_ja": "一瞬、彼の決意は揺らいだように見えた。", "note": "waver between ~ のように使う。"}, {"word": "endless", "hint": "終わりのない、果てしない", "general": "終わりが見えないほど長く続く性質", "example": "The hallway seemed endless, stretching on into darkness.", "example_ja": "その廊下は果てしなく続き、闇の中へ伸びていくように見えた。", "note": "an endless hallway/wait のように使う。"}, {"word": "chilled", "hint": "冷えた、ぞっとした", "general": "寒さで冷えている、または恐怖でぞっとしている状態", "example": "He felt chilled, though the room was not cold.", "example_ja": "その部屋は寒くなかったが、彼はぞっとするような寒気を感じた。", "note": "feel chilled のように使う。"}, {"word": "gasp", "hint": "息をのむ、はっと息をする", "general": "驚きや痛みで、急に短く息を吸うこと", "example": "He gasped when he saw what was waiting for him.", "example_ja": "彼は、自分を待っているものを見て息をのんだ。", "note": "gasp at/with ~ のように使う。"}, {"word": "sigh", "hint": "ため息", "general": "安堵や疲労、悲しみを表すための、長い呼吸", "example": "He let out a long sigh and sat down.", "example_ja": "彼は長いため息をつき、座った。", "note": "let out a sigh のように使う。"}, {"word": "echo", "hint": "反響、こだま", "general": "音が壁などに反射して、繰り返し聞こえること", "example": "His footsteps echoed down the empty corridor.", "example_ja": "彼の足音は、空っぽの廊下に響いた。", "note": "echo down/through ~ のように使う。"}, {"word": "mumble", "hint": "もぐもぐ言う、不明瞭に話す", "general": "はっきりと発音せず、低くこもった声で話すこと", "example": "He mumbled an apology and looked away.", "example_ja": "彼はもぐもぐと謝罪の言葉を言い、目をそらした。", "note": "mumble an apology/reply のように使う。"}, {"word": "distant", "hint": "遠い、よそよそしい", "general": "物理的に離れている、または感情的に親しみがない様子", "example": "His voice sounded oddly distant, as if his mind were elsewhere.", "example_ja": "彼の声は奇妙に遠く聞こえ、まるで心が別の場所にあるかのようだった。", "note": "a distant voice/look のように使う。"}, {"word": "surge", "hint": "高まり、こみ上げ", "general": "急に、強く現れる感情や動き", "example": "A surge of relief washed over him.", "example_ja": "安堵のこみ上げが、彼を包んだ。", "note": "a surge of emotion のように使う。"}, {"word": "subside", "hint": "静まる、収まる", "general": "強さや激しさが、徐々に弱まっていくこと", "example": "The noise from the street gradually subsided.", "example_ja": "通りからの騒音は、徐々に静まっていった。", "note": "subside graduallyのように使う。"}, {"word": "coax", "hint": "なだめる、説得して~させる", "general": "優しく、ゆっくりと説得して何かをさせること", "example": "It took a while to coax the truth out of him.", "example_ja": "彼から真実を聞き出すのには、時間がかかった。", "note": "coax someone into/out of ~ のように使う。"}, {"word": "brood", "hint": "考え込む、思い悩む", "general": "心配なことについて、長く沈んだ気持ちで考えること", "example": "He sat alone, brooding over what had been said.", "example_ja": "彼は一人で座り、言われたことについて思い悩んでいた。", "note": "brood over/about ~ のように使う。"}, {"word": "wrest", "hint": "奪い取る、もぎ取る", "general": "力を込めて、無理に何かを取り去ること", "example": "He wrested the object from her grip.", "example_ja": "彼は、彼女の手からその物をもぎ取った。", "note": "wrest something from ~ のように使う、やや硬い語。"}, {"word": "skulk", "hint": "こそこそ動く、隠れて待つ", "general": "見つからないように、隠れたり、ひそかに動いたりすること", "example": "Someone seemed to be skulking near the entrance.", "example_ja": "誰かが、入り口の近くでこそこそしているようだった。", "note": "skulk near/around ~ のように使う。"}, {"word": "blanch", "hint": "青ざめる、血の気が引く", "general": "恐怖や衝撃で、顔が白くなること", "example": "He blanched at the sight before him.", "example_ja": "彼は、目の前の光景に青ざめた。", "note": "blanch at ~ のように使う。"}];
const STORAGE_KEY = 'giver-flashcards-mastered-v1';
const LANG_KEY = 'giver-flashcards-lang-v1';

let mastered = new Set();
try{
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  mastered = new Set(saved);
}catch(e){ mastered = new Set(); }

let lang = 'ja'; // 'ja' or 'en'
try{
  const savedLang = localStorage.getItem(LANG_KEY);
  if(savedLang === 'en' || savedLang === 'ja') lang = savedLang;
}catch(e){ lang = 'ja'; }

let deck = [];          // active (unmastered) cards, in working order
let originalOrder = []; // initial order of active cards (for restart)
let shownHistory = [];  // words shown in live order (for browsing back)
let browseIndex = null; // null = live; else index into shownHistory
let flipped = false;
let panelOpen = false;
let loopingWord = null;
let loopingSelector = null;

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(mastered)));
  }catch(e){}
}

function saveLang(){
  try{
    localStorage.setItem(LANG_KEY, lang);
  }catch(e){}
}

function buildDeck(){
  deck = WORDS.filter(w => !mastered.has(w.word));
  originalOrder = deck.slice();
  shownHistory = [];
  browseIndex = null;
}

function getCurrentWord(){
  if(browseIndex !== null){
    return WORDS.find(w => w.word === shownHistory[browseIndex]);
  }
  return deck[0];
}

function speakOnce(word, onEnd){
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.onend = onEnd;
  utter.onerror = onEnd;
  window.speechSynthesis.speak(utter);
}

function startLoop(text, selector){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  loopingWord = text;
  loopingSelector = selector;
  const el = document.querySelector(selector);
  if(el) el.classList.add('looping');

  const playNext = () => {
    if(loopingWord !== text) return;
    speakOnce(text, () => {
      if(loopingWord !== text) return;
      setTimeout(() => {
        if(loopingWord === text) playNext();
      }, 250);
    });
  };
  playNext();
}

function stopLoop(){
  loopingWord = null;
  window.speechSynthesis.cancel();
  if(loopingSelector){
    const el = document.querySelector(loopingSelector);
    if(el) el.classList.remove('looping');
  }
  loopingSelector = null;
}

function updateProgress(){
  const total = WORDS.length;
  const done = mastered.size;
  document.getElementById('progressLabel').textContent = `${done} / ${total} 習得`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;

  const posLabel = document.getElementById('posLabel');
  if(posLabel){
    if(browseIndex !== null){
      const histLabel = lang === 'ja' ? '履歴' : 'History';
      posLabel.textContent = `${histLabel} ${browseIndex + 1} / ${shownHistory.length}`;
    } else if(deck.length > 0 && originalOrder.length > 0){
      const idx = originalOrder.findIndex(w => w.word === deck[0].word);
      const displayIdx = idx >= 0 ? idx + 1 : '?';
      posLabel.textContent = `${displayIdx} / ${originalOrder.length}`;
    } else {
      posLabel.textContent = '';
    }
  }

  renderMasteredList();
}

function speakerIcon(){
  return `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
}

function frontHTML(current){
  const tapHint = lang === 'ja' ? '単語をタップ / クリック' : 'Tap or click the word';
  const eyebrow = lang === 'ja' ? 'タップして意味を見る' : 'Tap to see the meaning';
  return `
    <div class="eyebrow">${eyebrow}</div>
    <div class="word-row">
      <div class="word">${current.word}</div>
      <button class="speak-btn" id="speakBtn" title="発音を聞く">${speakerIcon()}</button>
    </div>
    <div class="tap-hint">${tapHint}</div>
  `;
}

function backHTML(current){
  const generalBlock = current.general ? `
      <div class="general-block">
        <div class="general-label">${lang === 'ja' ? '本来の意味' : 'Definition'}</div>
        <div class="general-text">${current.general}</div>
      </div>` : '';

  const noteBlock = current.note ? `
      <div class="note-block">
        <div class="note-label">${lang === 'ja' ? 'ヒント' : 'Note'}</div>
        <div class="note-text">${current.note}</div>
      </div>` : '';

  const exampleJaBlock = lang === 'ja' ? `<div class="example-ja-text">${current.example_ja}</div>` : '';

  const backTapHint = lang === 'ja' ? 'タップで単語に戻る' : 'Tap to go back';
  const exampleHint = lang === 'ja' ? '(タップで読み上げ)' : '(Tap to listen)';

  return `
    <div class="back-scroll">
      <div class="hint-block">
        <div class="hint-label">${lang === 'ja' ? '意味のヒント' : 'Hint'}</div>
        <div class="hint-text">${current.hint}</div>
        ${generalBlock}
        <div class="example-label">Example <span class="example-hint">${exampleHint}</span></div>
        <div class="example-text clickable" id="exampleText">${current.example}</div>
        ${exampleJaBlock}
        ${noteBlock}
      </div>
      <div class="back-tap-hint tap-hint">${backTapHint}</div>
    </div>
  `;
}

function attachExampleHandler(current){
  const exampleEl = document.getElementById('exampleText');
  if(exampleEl){
    exampleEl.addEventListener('click', (e) => {
      e.stopPropagation();
      if(loopingWord === current.example && loopingSelector === '#exampleText'){
        stopLoop();
      } else {
        startLoop(current.example, '#exampleText');
      }
    });
  }
}

function attachSpeakHandler(current){
  const speakBtn = document.getElementById('speakBtn');
  if(speakBtn){
    speakBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(loopingWord === current.word && loopingSelector === '.speak-btn'){
        stopLoop();
      } else {
        startLoop(current.word, '.speak-btn');
      }
    });
  }
}

function render(){
  stopLoop();
  const stage = document.getElementById('stage');
  const controls = document.getElementById('controls');

  if(deck.length === 0 && browseIndex === null){
    const doneTitle = lang === 'ja' ? 'よくできました' : 'All done!';
    const doneMsg = lang === 'ja'
      ? 'すべての単語が習得済みになりました。<br>「習得済み一覧」から単語を復活させるか、「すべてリセット」を押すと、もう一度練習できます。'
      : 'All words are marked as mastered.<br>Restore words from the mastered list, or reset everything to practice again.';
    stage.innerHTML = `
      <div class="empty-state">
        <div class="word">${doneTitle}</div>
        <p>${doneMsg}</p>
      </div>
    `;
    if(shownHistory.length > 0){
      controls.style.display = 'flex';
      document.getElementById('skipBtn').style.display = 'none';
      document.getElementById('masterBtn').style.display = 'none';
    } else {
      controls.style.display = 'none';
    }
    updateProgress();
    return;
  }

  controls.style.display = 'flex';
  document.getElementById('skipBtn').style.display = 'flex';
  document.getElementById('masterBtn').style.display = 'flex';
  flipped = false;

  let current, next;
  if(browseIndex !== null){
    current = WORDS.find(w => w.word === shownHistory[browseIndex]);
    next = null;
  } else {
    current = deck[0];
    next = deck[1];
  }

  stage.innerHTML = `
    ${next ? `<div class="card behind"></div>` : ''}
    <div class="card front" id="currentCard">
      ${frontHTML(current)}
    </div>
  `;

  document.getElementById('currentCard').addEventListener('click', (e) => {
    if(e.target.closest('.speak-btn')) return;
    if(e.target.closest('#exampleText')) return;
    flipCard();
  });

  attachSpeakHandler(current);

  const masterBtn = document.getElementById('masterBtn');
  if(masterBtn){
    masterBtn.textContent = lang === 'ja' ? '習得済み ✓' : 'Mastered ✓';
    masterBtn.classList.remove('is-mastered');
  }

  const prevBtn = document.getElementById('prevBtn');
  const skipBtn = document.getElementById('skipBtn');
  const restartBtn = document.getElementById('restartBtn');

  if(browseIndex !== null){
    if(prevBtn) prevBtn.disabled = (browseIndex === 0);
    if(skipBtn) skipBtn.textContent = lang === 'ja' ? '進む →' : 'Forward →';
    if(skipBtn) skipBtn.disabled = false;
    if(masterBtn) masterBtn.disabled = true;
  } else {
    if(prevBtn) prevBtn.disabled = (shownHistory.length === 0);
    if(skipBtn) skipBtn.textContent = lang === 'ja' ? '次へ →' : 'Next →';
    if(skipBtn) skipBtn.disabled = (deck.length === 0);
    if(masterBtn) masterBtn.disabled = (deck.length === 0);
  }
  if(restartBtn) restartBtn.disabled = originalOrder.length === 0;

  updateProgress();
}

function flipCard(){
  if(flipped) {
    showFront();
    return;
  }
  stopLoop();
  const card = document.getElementById('currentCard');
  const current = getCurrentWord();
  flipped = true;

  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.add('flipped-card');
    card.innerHTML = backHTML(current);
    attachExampleHandler(current);
    card.classList.remove('flipping');
  }, 220);
}

function showFront(){
  stopLoop();
  const card = document.getElementById('currentCard');
  const current = getCurrentWord();
  flipped = false;
  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.remove('flipped-card');
    card.innerHTML = frontHTML(current);
    attachSpeakHandler(current);
    card.classList.remove('flipping');
  }, 220);
}

function nextCard(){
  const card = document.getElementById('currentCard');
  if(!card){ return; }

  if(browseIndex !== null){
    // browsing history: step forward, or return to live
    card.classList.add('exit-left');
    setTimeout(() => {
      if(browseIndex < shownHistory.length - 1){
        browseIndex++;
      } else {
        browseIndex = null;
      }
      render();
    }, 260);
    return;
  }

  if(deck.length === 0) return;
  const current = deck[0];

  shownHistory.push(current.word);
  if(shownHistory.length > 200) shownHistory.shift();

  card.classList.add('exit-left');
  setTimeout(() => {
    // move current word to the end of the deck (not mastered yet)
    deck.push(deck.shift());
    render();
  }, 260);
}

function prevCard(){
  if(browseIndex !== null){
    if(browseIndex > 0) browseIndex--;
    render();
    return;
  }
  if(shownHistory.length === 0) return;
  browseIndex = shownHistory.length - 1;
  render();
}

function restartDeck(){
  const remainingWords = new Set(deck.map(w => w.word));
  deck = originalOrder.filter(w => remainingWords.has(w.word));
  shownHistory = [];
  browseIndex = null;
  render();
}

function toggleMastered(){
  if(browseIndex !== null || deck.length === 0) return;
  const card = document.getElementById('currentCard');
  const current = deck[0];

  shownHistory.push(current.word);
  if(shownHistory.length > 200) shownHistory.shift();

  mastered.add(current.word);
  saveProgress();

  if(card){
    card.classList.add('exit-left');
    setTimeout(() => {
      deck.shift();
      render();
    }, 260);
  } else {
    deck.shift();
    render();
  }
}

function renderMasteredList(){
  const list = document.getElementById('masteredList');
  const masteredWords = WORDS.filter(w => mastered.has(w.word));

  if(masteredWords.length === 0){
    const emptyMsg = lang === 'ja' ? '習得済みの単語はまだありません。' : 'No mastered words yet.';
    list.innerHTML = `<li class="mastered-empty" style="background:none;">${emptyMsg}</li>`;
    return;
  }

  const restoreLabel = lang === 'ja' ? '解除' : 'Undo';

  list.innerHTML = masteredWords.map(w => `
    <li>
      <span class="m-word">${w.word}</span>
      <button class="restore-btn" data-word="${w.word}">${restoreLabel}</button>
    </li>
  `).join('');

  list.querySelectorAll('.restore-btn').forEach(btn => {
    btn.addEventListener('click', () => restoreWord(btn.dataset.word));
  });
}

function restoreWord(word){
  mastered.delete(word);
  saveProgress();
  const w = WORDS.find(item => item.word === word);
  if(w && !deck.some(d => d.word === word)){
    deck.push(w);
  }
  if(w && !originalOrder.some(d => d.word === word)){
    originalOrder.push(w);
  }
  render();
}

function updateStaticLabels(){
  const title = document.getElementById('appTitle');
  if(title){
    title.innerHTML = lang === 'ja'
      ? 'The Giver <span class="accent">語彙カード</span>'
      : 'The Giver <span class="accent">Vocabulary Cards</span>';
  }

  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) resetBtn.textContent = lang === 'ja' ? 'すべてリセット' : 'Reset all';

  const toggleBtn = document.getElementById('masteredToggleBtn');
  if(toggleBtn){
    const label = lang === 'ja' ? '習得済み一覧' : 'Mastered list';
    toggleBtn.textContent = panelOpen ? `${label} ▴` : `${label} ▾`;
  }

  const panelHeading = document.getElementById('masteredHeading');
  if(panelHeading) panelHeading.textContent = lang === 'ja' ? '習得済みの単語' : 'Mastered words';

  const prevBtn = document.getElementById('prevBtn');
  if(prevBtn) prevBtn.textContent = lang === 'ja' ? '← 前へ' : '← Prev';

  const nextBtn = document.getElementById('skipBtn');
  if(nextBtn) nextBtn.textContent = lang === 'ja' ? '次へ →' : 'Next →';

  const restartBtn = document.getElementById('restartBtn');
  if(restartBtn) restartBtn.textContent = lang === 'ja' ? '⟲ 最初' : '⟲ Start';

  const langBtn = document.getElementById('langToggleBtn');
  if(langBtn) langBtn.textContent = lang === 'ja' ? 'EN' : '日本語';
}

document.getElementById('skipBtn').addEventListener('click', () => nextCard());
document.getElementById('prevBtn').addEventListener('click', () => prevCard());
document.getElementById('masterBtn').addEventListener('click', () => toggleMastered());
document.getElementById('restartBtn').addEventListener('click', () => restartDeck());

document.getElementById('resetBtn').addEventListener('click', () => {
  const msg = lang === 'ja' ? '習得済みの記録をすべてリセットしますか？' : 'Reset all mastered-word progress?';
  if(confirm(msg)){
    mastered = new Set();
    saveProgress();
    buildDeck();
    render();
  }
});

document.getElementById('masteredToggleBtn').addEventListener('click', () => {
  panelOpen = !panelOpen;
  const panel = document.getElementById('masteredPanel');
  panel.classList.toggle('open', panelOpen);
  updateStaticLabels();
  if(panelOpen) renderMasteredList();
});

document.getElementById('langToggleBtn').addEventListener('click', () => {
  lang = (lang === 'ja') ? 'en' : 'ja';
  saveLang();
  updateStaticLabels();
  render();
});

document.addEventListener('keydown', (e) => {
  if(e.code === 'Space'){
    e.preventDefault();
    flipCard();
  } else if(e.code === 'ArrowRight'){
    nextCard();
  } else if(e.code === 'ArrowLeft'){
    prevCard();
  } else if(e.code === 'Enter'){
    toggleMastered();
  }
});

buildDeck();
updateStaticLabels();
render();
</script></body></html>
