<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 Singapore Survival 50</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4ff;
            --surface: #ffffff;
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --accent: #e11d48;
            --green: #16a34a;
            --green-light: #dcfce7;
            --amber: #d97706;
            --amber-light: #fef3c7;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(37,99,235,0.08);
            --radius: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 16px 12px 40px;
            color: var(--text);
        }

        .container { max-width: 560px; margin: auto; }

        /* ─── Header ─── */
        .header {
            text-align: center;
            margin-bottom: 14px;
        }
        .header h2 {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.02em;
            color: var(--primary);
        }
        .header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

        /* ─── Badges row ─── */
        .badges {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            background: var(--primary-light);
            color: var(--primary);
        }
        .badge.green { background: var(--green-light); color: var(--green); }
        .badge.amber { background: var(--amber-light); color: var(--amber); }

        /* ─── Progress bar ─── */
        .progress-wrap {
            background: var(--border);
            border-radius: 99px;
            height: 6px;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 99px;
            transition: width 0.4s ease;
        }
        .progress-label {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        /* ─── Main card ─── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px 22px 22px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            position: relative;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        .card.tappable:active { transform: scale(0.985); border-color: var(--primary); }
        .card.no-tap { cursor: default; }

        .cat-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .main-text {
            font-size: clamp(18px, 4.5vw, 22px);
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 14px;
        }
        .answer-text {
            font-size: clamp(15px, 4vw, 18px);
            font-weight: 700;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .answer-text.show { opacity: 1; }

        /* master checkbox inside card */
        .master-wrap {
            position: absolute;
            top: 12px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--muted);
        }
        .master-wrap input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: var(--green);
            cursor: pointer;
        }
        .master-wrap.disabled { opacity: 0.3; pointer-events: none; }
        .master-badge {
            background: var(--green-light);
            color: var(--green);
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            display: none;
        }
        .master-badge.show { display: inline-block; }

        /* tap hint */
        .tap-hint {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
            text-align: center;
        }

        /* ─── Auto-play instruction panel ─── */
        .auto-panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            display: none;
            border-left: 4px solid var(--primary);
        }
        .auto-panel.show { display: block; }
        .auto-step-title {
            font-size: 13px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .auto-instruction {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.5;
        }
        .auto-count {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ─── Control panels ─── */
        .panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }
        .panel-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .panel label { font-size: 12px; color: var(--muted); }
        input[type="range"] { flex: 1; min-width: 100px; accent-color: var(--primary); }
        .speed-val {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            min-width: 32px;
        }

        /* ─── Buttons ─── */
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
        }
        .btn {
            border: none;
            border-radius: 99px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn:active { transform: scale(0.95); opacity: 0.85; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-green { background: var(--green); color: #fff; }
        .btn-red { background: var(--accent); color: #fff; }
        .btn-amber { background: var(--amber); color: #fff; }
        .btn-toggle-on { background: var(--green); color: #fff; }

        /* ─── Master list summary ─── */
        .master-summary {
            background: var(--green-light);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--green);
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            display: none;
            cursor: pointer;
            user-select: none;
        }
        .master-summary.show { display: block; }

        /* ─── No active phrases warning ─── */
        .no-active {
            background: var(--amber-light);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: var(--amber);
            font-weight: 700;
            display: none;
        }
        .no-active.show { display: block; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h2>🇸🇬 Singapore Prep: Essential 50</h2>
        <p>Grade 9 School Survival Phrases</p>
    </div>

    <div class="badges">
        <div class="badge" id="mode-label">英 → 日</div>
        <div class="badge" id="order-label">順番通り</div>
        <div class="badge green" id="master-count-badge">マスター: 0 / 50</div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:2%"></div>
    </div>
    <div class="progress-label">フレーズ: <span id="current-num">1</span> / <span id="total-num">50</span></div>

    <div class="no-active" id="no-active-msg">
        ✅ すべてのフレーズをマスターしました！<br>
        <span style="font-weight:400;font-size:12px;margin-top:4px;display:block;">チェックを外してリセットしてください。</span>
    </div>

    <!-- Auto-play instruction panel -->
    <div class="auto-panel" id="auto-panel">
        <div class="auto-step-title" id="auto-step-title">STEP 1</div>
        <div class="auto-instruction" id="auto-instruction">音声を2回聴いてください。発話はしません。</div>
        <div class="auto-count" id="auto-count"></div>
    </div>

    <div class="tap-hint" id="tap-hint">👆 カードをタップして答えを表示</div>

    <div class="card tappable" id="main-card" onclick="handleCardTap()">
        <div class="master-wrap" id="master-wrap">
            <span>マスター</span>
            <input type="checkbox" id="master-checkbox" onchange="toggleMaster(event)" onclick="event.stopPropagation()">
        </div>
        <div class="cat-label" id="cat">Category</div>
        <div class="main-text" id="display-text">Loading...</div>
        <div class="answer-text" id="answer-text">Answer</div>
        <div class="master-badge" id="master-badge">✔ マスター済</div>
    </div>

    <div class="master-summary" id="master-summary" onclick="toggleMasterList()"></div>

    <!-- マスター済み一覧 -->
    <div id="master-list-wrap" style="display:none; margin-bottom:12px;">
        <div style="background:#fff; border-radius:16px; padding:14px 16px; box-shadow:var(--shadow);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-size:13px; font-weight:900; color:var(--green);">✅ マスター済みリスト</span>
                <button class="btn btn-secondary" style="padding:4px 12px; font-size:11px;" onclick="clearAllMaster()">全解除</button>
            </div>
            <div id="master-list"></div>
        </div>
    </div>

    <!-- Speed control -->
    <div class="panel">
        <div class="panel-row">
            <label>🔊 再生速度</label>
            <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeed()">
            <span class="speed-val"><span id="speed-val">1.0</span>x</span>
        </div>
    </div>

    <!-- Normal mode controls -->
    <div id="normal-controls">
        <div class="btn-row">
            <button class="btn btn-primary" onclick="speak()">🔊 音声を聴く</button>
            <button class="btn btn-secondary" onclick="next()">次へ →</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" id="random-btn" onclick="toggleRandom()">🔀 ランダム: OFF</button>
            <button class="btn btn-secondary" onclick="switchMode()">🔄 モード切替</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-amber" onclick="startAutoPlay()">▶ 自動再生</button>
        </div>
    </div>

    <!-- Auto-play controls (hidden by default) -->
    <div id="auto-controls" style="display:none;">
        <div class="btn-row">
            <button class="btn btn-red" onclick="stopAutoPlay()">⏹ 自動再生を停止</button>
        </div>
    </div>

</div>

<script>
const phrases = [
    {cat:"Classroom", en:"Could you say that again, please?", jp:"もう一度言ってください。"},
    {cat:"Classroom", en:"What does this word mean?", jp:"この単語はどういう意味ですか？"},
    {cat:"Classroom", en:"How do you spell that?", jp:"スペルはどう書きますか？"},
    {cat:"Classroom", en:"I'm sorry, I didn't catch that.", jp:"すみません、聞き取れませんでした。"},
    {cat:"Classroom", en:"Which page are we on?", jp:"いま何ページですか？"},
    {cat:"Classroom", en:"Could you write it on the board?", jp:"それを黒板に書いてもらえますか？"},
    {cat:"Classroom", en:"What should I do next?", jp:"次に何をすればいいですか？"},
    {cat:"Classroom", en:"Is this part of the homework?", jp:"これは宿題の一部ですか？"},
    {cat:"Classroom", en:"When is the deadline for this?", jp:"これの締め切りはいつですか？"},
    {cat:"Classroom", en:"Can I use my laptop for this?", jp:"これにノートパソコンを使ってもいいですか？"},
    {cat:"Classroom", en:"I need a little more time, please.", jp:"もう少し時間をください。"},
    {cat:"Classroom", en:"Could you explain that one more time?", jp:"もう一度説明していただけますか？"},
    {cat:"Classroom", en:"I'm not sure what to do.", jp:"何をすればいいのか分かりません。"},
    {cat:"Classroom", en:"I've finished my task. What's next?", jp:"終わりました。次は何ですか？"},
    {cat:"Friends", en:"I'm from Japan. Nice to meet you!", jp:"日本から来ました。よろしく！"},
    {cat:"Friends", en:"What's your name again? Sorry.", jp:"名前をもう一度聞いてもいい？ごめんね。"},
    {cat:"Friends", en:"Do you have Instagram?", jp:"インスタやってる？"},
    {cat:"Friends", en:"Can I join you guys?", jp:"（グループに）混ざってもいい？"},
    {cat:"Friends", en:"What are you doing after school?", jp:"放課後、何するの？"},
    {cat:"Friends", en:"Which CCA are you in?", jp:"部活(CCA)は何に入ってるの？"},
    {cat:"Friends", en:"Do you want to grab lunch together?", jp:"一緒にランチ食べない？"},
    {cat:"Friends", en:"That's cool!", jp:"それいいね！"},
    {cat:"Friends", en:"Wait, I'm coming with you.", jp:"待って、僕も行くよ。"},
    {cat:"Friends", en:"Can you help me with this?", jp:"これ手伝ってくれる？"},
    {cat:"Friends", en:"What's the Wi-Fi password?", jp:"Wi-Fiのパスワードは何？"},
    {cat:"Tech", en:"Where can I charge my laptop?", jp:"どこで充電できますか？"},
    {cat:"Tech", en:"My internet is not working.", jp:"ネットが繋がりません。"},
    {cat:"Tech", en:"How do I submit this file?", jp:"どうやってこのファイルを提出しますか？"},
    {cat:"Tech", en:"Can you share the link with me?", jp:"リンクを共有してくれますか？"},
    {cat:"Tech", en:"I can't log in to my account.", jp:"アカウントにログインできません。"},
    {cat:"Permission", en:"May I go to the bathroom?", jp:"トイレに行ってもいいですか？"},
    {cat:"Permission", en:"Can I go to the locker?", jp:"ロッカーに行ってもいいですか？"},
    {cat:"Permission", en:"I'm not feeling well. Can I go to the clinic?", jp:"気分が悪いです。保健室へ行っていいですか？"},
    {cat:"Permission", en:"Can I borrow your eraser?", jp:"消しゴムを借りてもいい？"},
    {cat:"Response", en:"I'm not sure, but let me try.", jp:"自信はないですが、やってみます。"},
    {cat:"Response", en:"I think so, too.", jp:"僕もそう思う。"},
    {cat:"Response", en:"I have a different opinion.", jp:"違う意見があります。"},
    {cat:"Response", en:"Could you speak a bit slower?", jp:"もう少しゆっくり話してくれますか？"},
    {cat:"Response", en:"Sorry, I'm late.", jp:"遅れてすみません。"},
    {cat:"Response", en:"Wait a second, please.", jp:"ちょっと待ってください。"},
    {cat:"School Life", en:"Where is the cafeteria?", jp:"食堂はどこですか？"},
    {cat:"School Life", en:"What time does the next class start?", jp:"次の授業は何時に始まりますか？"},
    {cat:"School Life", en:"Is this seat taken?", jp:"この席は空いていますか？"},
    {cat:"School Life", en:"I forgot my textbook.", jp:"教科書を忘れました。"},
    {cat:"School Life", en:"Which house are you in?", jp:"どのハウス（寮/チーム）なの？"},
    {cat:"School Life", en:"Do we have a test today?", jp:"今日、テストある？"},
    {cat:"School Life", en:"See you tomorrow!", jp:"また明日ね！"},
    {cat:"School Life", en:"Have a good weekend!", jp:"良い週末を！"},
    {cat:"School Life", en:"I'll try my best.", jp:"精一杯頑張ります。"},
    {cat:"School Life", en:"Thanks for your help.", jp:"助けてくれてありがとう。"}
];

// ── State ──
let currentIndex = 0;
let isEnToJp = true;
let currentSpeed = 1.0;
let isRandom = false;
let isAutoPlaying = false;
let autoStopped = false;
let masterSet = new Set(JSON.parse(localStorage.getItem('sg50_master') || '[]'));

// auto-play scheduler
let autoTimeout = null;

// ── Helpers ──
function saveMaster() {
    localStorage.setItem('sg50_master', JSON.stringify([...masterSet]));
}

function getActivePhrases() {
    return phrases.map((p,i)=>({...p, idx:i})).filter(p => !masterSet.has(p.idx));
}

function update() {
    const active = getActivePhrases();
    const noActiveEl = document.getElementById('no-active-msg');

    if (active.length === 0) {
        noActiveEl.classList.add('show');
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('tap-hint').style.display = 'none';
        updateMasterUI();
        return;
    }
    noActiveEl.classList.remove('show');
    document.getElementById('main-card').style.display = '';
    document.getElementById('tap-hint').style.display = '';

    // clamp currentIndex to active list
    if (currentIndex >= active.length) currentIndex = 0;

    const item = active[currentIndex];
    const globalIdx = item.idx;

    document.getElementById('current-num').textContent = currentIndex + 1;
    document.getElementById('total-num').textContent = active.length;
    document.getElementById('progress-bar').style.width = ((currentIndex + 1) / active.length * 100) + '%';
    document.getElementById('cat').textContent = item.cat;

    document.getElementById('answer-text').classList.remove('show');

    const modeLabel = document.getElementById('mode-label');
    if (isEnToJp) {
        modeLabel.textContent = '英 → 日';
        document.getElementById('display-text').textContent = item.en;
        document.getElementById('answer-text').textContent = item.jp;
    } else {
        modeLabel.textContent = '日 → 英';
        document.getElementById('display-text').textContent = item.jp;
        document.getElementById('answer-text').textContent = item.en;
    }

    // master checkbox
    const cb = document.getElementById('master-checkbox');
    cb.checked = masterSet.has(globalIdx);
    const badge = document.getElementById('master-badge');
    badge.classList.toggle('show', masterSet.has(globalIdx));

    updateMasterUI();
}

function updateMasterUI() {
    const count = masterSet.size;
    document.getElementById('master-count-badge').textContent = `マスター: ${count} / ${phrases.length}`;
    const summary = document.getElementById('master-summary');
    const listWrap = document.getElementById('master-list-wrap');
    if (count > 0) {
        summary.classList.add('show');
        summary.textContent = `✅ ${count}フレーズをマスター済 — タップして一覧を表示 / 解除`;
        // rebuild list
        const listEl = document.getElementById('master-list');
        listEl.innerHTML = '';
        [...masterSet].sort((a,b)=>a-b).forEach(idx => {
            const p = phrases[idx];
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;';
            row.innerHTML = `
                <span style="flex:1;line-height:1.4;"><span style="color:var(--primary);font-weight:700;">${p.cat}</span><br>${p.en}</span>
                <button onclick="removeMaster(${idx})" style="border:none;background:var(--accent);color:#fff;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">解除</button>
            `;
            listEl.appendChild(row);
        });
    } else {
        summary.classList.remove('show');
        listWrap.style.display = 'none';
    }
}

function toggleMasterList() {
    if (masterSet.size === 0) return;
    const wrap = document.getElementById('master-list-wrap');
    wrap.style.display = wrap.style.display === 'none' ? '' : 'none';
}

function removeMaster(idx) {
    masterSet.delete(idx);
    saveMaster();
    if (masterSet.size === 0) {
        document.getElementById('master-list-wrap').style.display = 'none';
    }
    update();
}

function clearAllMaster() {
    if (!confirm(`マスター済み${masterSet.size}フレーズを全て解除しますか？`)) return;
    masterSet.clear();
    saveMaster();
    document.getElementById('master-list-wrap').style.display = 'none';
    update();
}

function handleCardTap() {
    if (isAutoPlaying) return;
    document.getElementById('answer-text').classList.add('show');
}

function toggleMaster(e) {
    if (isAutoPlaying) return;
    const active = getActivePhrases();
    if (active.length === 0) return;
    const item = active[currentIndex];
    if (e.target.checked) {
        masterSet.add(item.idx);
    } else {
        masterSet.delete(item.idx);
    }
    saveMaster();
    // stay on same position (will clamp)
    update();
}

function next() {
    if (isAutoPlaying) return;
    const active = getActivePhrases();
    if (active.length === 0) return;
    if (isRandom) {
        currentIndex = Math.floor(Math.random() * active.length);
    } else {
        currentIndex = (currentIndex + 1) % active.length;
    }
    update();
}

function speak(onEnd) {
    window.speechSynthesis.cancel();
    const active = getActivePhrases();
    if (active.length === 0) { if (onEnd) onEnd(); return; }
    const item = active[currentIndex];
    const uttr = new SpeechSynthesisUtterance(item.en);
    uttr.lang = 'en-US';
    uttr.rate = parseFloat(currentSpeed);
    if (onEnd) uttr.onend = onEnd;
    window.speechSynthesis.speak(uttr);
}

function toggleRandom() {
    isRandom = !isRandom;
    const btn = document.getElementById('random-btn');
    btn.textContent = isRandom ? '🔀 ランダム: ON' : '🔀 ランダム: OFF';
    btn.className = isRandom ? 'btn btn-toggle-on' : 'btn btn-secondary';
    document.getElementById('order-label').textContent = isRandom ? 'ランダム表示中' : '順番通り';
}

function switchMode() {
    if (isAutoPlaying) return;
    isEnToJp = !isEnToJp;
    update();
}

function updateSpeed() {
    currentSpeed = document.getElementById('speed-range').value;
    document.getElementById('speed-val').textContent = parseFloat(currentSpeed).toFixed(1);
}

// ─────────────────────────────────────────────
//  AUTO-PLAY ENGINE
// ─────────────────────────────────────────────
/*
  Per phrase, 4 steps:
  Step 1: 「発話せずに2回お聞き下さい」 → play audio ×2 (英文のみ表示、答え非表示)
  Step 2: 「音声に合わせて2回シャドウイングしてください」 → play audio ×2
  Step 3: 「英文と訳文を見ながら2回シャドウイングしてください」 → show both, play ×2
  Step 4: 「英文を見ずに2回シャドウイングしてください」 → hide both, play ×2
  Then advance to next phrase.
*/

function setAutoPanel(stepTitle, instruction, countText) {
    document.getElementById('auto-step-title').textContent = stepTitle;
    document.getElementById('auto-instruction').textContent = instruction;
    document.getElementById('auto-count').textContent = countText;
}

function delayP(ms) {
    return new Promise(resolve => {
        if (autoStopped) { resolve(); return; }
        autoTimeout = setTimeout(resolve, ms);
    });
}

function speakP() {
    return new Promise(resolve => {
        if (autoStopped) { resolve(); return; }
        window.speechSynthesis.cancel();
        const active = getActivePhrases();
        if (active.length === 0) { resolve(); return; }
        const item = active[currentIndex];
        const uttr = new SpeechSynthesisUtterance(item.en);
        uttr.lang = 'en-US';
        uttr.rate = parseFloat(currentSpeed);
        uttr.onend = resolve;
        uttr.onerror = resolve;
        window.speechSynthesis.speak(uttr);
    });
}

function showCardState(showAnswer, hideAll) {
    const display = document.getElementById('display-text');
    const answer = document.getElementById('answer-text');
    const active = getActivePhrases();
    if (active.length === 0) return;
    const item = active[currentIndex];

    if (hideAll) {
        display.textContent = '？？？';
        document.getElementById('cat').textContent = '？';
        answer.classList.remove('show');
    } else {
        // always show English in auto-play
        display.textContent = item.en;
        document.getElementById('cat').textContent = item.cat;
        if (showAnswer) {
            answer.textContent = item.jp;
            answer.classList.add('show');
        } else {
            answer.classList.remove('show');
        }
    }
}

async function runAutoPlay() {
    const active = getActivePhrases();
    if (active.length === 0) { stopAutoPlay(); return; }

    // Go through all active phrases in order from currentIndex
    let startIdx = currentIndex;

    for (let i = 0; i < active.length; i++) {
        if (autoStopped) break;

        currentIndex = (startIdx + i) % active.length;
        update();

        const phraseNum = i + 1;
        const totalPhrases = active.length;

        // ── STEP 1: Listen ×2, no speaking ──
        showCardState(false, true); // 英文・訳文ともに隠す
        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 1`,
            '👂 発話せずに2回お聞き下さい。',
            '再生 1/2回目…'
        );
        await speakP();
        if (autoStopped) break;

        await delayP(600);
        if (autoStopped) break;

        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 1`,
            '👂 発話せずに2回お聞き下さい。',
            '再生 2/2回目…'
        );
        await speakP();
        if (autoStopped) break;
        await delayP(800);

        // ── STEP 2: Shadow ×2 (英文・訳文ともに隠す) ──
        if (autoStopped) break;
        showCardState(false, true);
        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 2`,
            '🗣️ 音声に合わせて2回シャドウイングしてください。',
            '再生 1/2回目…'
        );
        await speakP();
        if (autoStopped) break;
        await delayP(600);

        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 2`,
            '🗣️ 音声に合わせて2回シャドウイングしてください。',
            '再生 2/2回目…'
        );
        await speakP();
        if (autoStopped) break;
        await delayP(800);

        // ── STEP 3: Shadow ×2 with English + Japanese ──
        if (autoStopped) break;
        showCardState(true, false);
        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 3`,
            '📖 英文と訳文を見ながら2回シャドウイングしてください。',
            '再生 1/2回目…'
        );
        await speakP();
        if (autoStopped) break;
        await delayP(600);

        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 3`,
            '📖 英文と訳文を見ながら2回シャドウイングしてください。',
            '再生 2/2回目…'
        );
        await speakP();
        if (autoStopped) break;
        await delayP(800);

        // ── STEP 4: Shadow ×2 without looking ──
        if (autoStopped) break;
        showCardState(false, true); // hide everything
        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 4`,
            '🙈 英文を見ずに2回シャドウイングしてください。',
            '再生 1/2回目…'
        );
        await speakP();
        if (autoStopped) break;
        await delayP(600);

        setAutoPanel(
            `フレーズ ${phraseNum} / ${totalPhrases} — STEP 4`,
            '🙈 英文を見ずに2回シャドウイングしてください。',
            '再生 2/2回目…'
        );
        await speakP();
        if (autoStopped) break;
        await delayP(1200); // longer gap between phrases
    }

    if (!autoStopped) {
        // Finished all phrases
        setAutoPanel('完了！', `🎉 すべての${active.length}フレーズが完了しました！`, '');
        showCardState(false, false);
        await delayP(2000);
        stopAutoPlay();
    }
}

function startAutoPlay() {
    const active = getActivePhrases();
    if (active.length === 0) {
        alert('出題できるフレーズがありません。マスターのチェックを外してください。');
        return;
    }

    isAutoPlaying = true;
    autoStopped = false;

    // UI switches
    document.getElementById('normal-controls').style.display = 'none';
    document.getElementById('auto-controls').style.display = '';
    document.getElementById('auto-panel').classList.add('show');
    document.getElementById('tap-hint').style.display = 'none';

    // disable master checkbox
    document.getElementById('master-wrap').classList.add('disabled');

    // card: remove tap style
    const card = document.getElementById('main-card');
    card.classList.remove('tappable');
    card.classList.add('no-tap');

    runAutoPlay();
}

function stopAutoPlay() {
    autoStopped = true;
    isAutoPlaying = false;
    window.speechSynthesis.cancel();
    if (autoTimeout) { clearTimeout(autoTimeout); autoTimeout = null; }

    // UI switches
    document.getElementById('normal-controls').style.display = '';
    document.getElementById('auto-controls').style.display = 'none';
    document.getElementById('auto-panel').classList.remove('show');
    document.getElementById('tap-hint').style.display = '';

    document.getElementById('master-wrap').classList.remove('disabled');

    const card = document.getElementById('main-card');
    card.classList.add('tappable');
    card.classList.remove('no-tap');

    update();
}

// ── Init ──
update();
</script>
