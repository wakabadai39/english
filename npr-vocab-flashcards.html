<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPR英語学習 単語帳（復習管理つき）</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root{
    --bg: #e9e9e6;
    --bg-deep: #dcdcd8;
    --ink: #2b2b2b;
    --ink-soft: #6b6b68;
    --line: #c7c7c2;
    --card: #f4f3ef;
    --accent: #b3422e;
    --accent-soft: #d98f7e;
    --done: #7c8a6e;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(0,0,0,0.02) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(0,0,0,0.02) 0%, transparent 40%);
    color: var(--ink);
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 16px 60px;
  }

  .topbar{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 6px;
  }

  .title{
    font-family:'Spectral', serif;
    font-weight:600;
    font-size: 1.5rem;
    letter-spacing: 0.01em;
  }
  .title .accent{ color: var(--accent); font-style: italic; }

  .progress-label{
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    text-align:right;
  }

  .progress-track{
    width:100%;
    max-width:480px;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    margin: 10px 0 28px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .stage{
    width:100%;
    max-width:480px;
    position:relative;
    height: 340px;
    perspective: 1200px;
  }

  .card{
    position:absolute;
    inset:0;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 28px -16px rgba(0,0,0,0.18);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding: 28px 26px;
    cursor:pointer;
    transition: transform 0.45s cubic-bezier(.22,.61,.36,1), opacity 0.3s ease, box-shadow 0.3s;
    backface-visibility:hidden;
    user-select:none;
  }

  .card.behind{
    transform: scale(0.96) translateY(10px);
    box-shadow: none;
    z-index: 0;
    opacity: 0.6;
  }

  .card.front{ z-index: 1; }

  .card.flipping{
    transform: rotateY(90deg) scale(0.96);
    opacity: 0;
  }

  .card.exit-left{
    transform: translateX(-130%) rotate(-8deg);
    opacity: 0;
  }

  .eyebrow{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }

  .word{
    font-family:'Spectral', serif;
    font-weight: 600;
    font-size: 2.4rem;
    line-height: 1.15;
    margin: 0 0 18px;
    word-break: break-word;
  }

  .speak-btn{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
    flex-shrink:0;
  }
  .speak-btn:hover{ border-color: var(--accent-soft); }
  .speak-btn:active{ transform: scale(0.92); }
  .speak-btn svg{ width:20px; height:20px; fill: var(--accent); }
  .speak-btn.speaking svg{ animation: pulse 0.6s ease infinite alternate; }
  .speak-btn.looping{ background: var(--accent); border-color: var(--accent); }
  .speak-btn.looping svg{ fill: #fff; animation: pulse 0.6s ease infinite alternate; }
  @keyframes pulse{ from{ opacity:1; } to{ opacity:0.45; } }

  .word-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .tap-hint{
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 16px;
  }

  .hint-block{
    width:100%;
  }
  .hint-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .hint-text{
    font-size: 1.15rem;
    font-weight: 500;
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .example-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .example-text{
    font-family:'Spectral', serif;
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--ink);
  }

  .controls{
    width:100%;
    max-width:480px;
    display:flex;
    gap: 12px;
    margin-top: 26px;
  }

  .btn{
    flex:1;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 14px 16px;
    border-radius: 10px;
    cursor:pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
  }
  .btn:active{ transform: scale(0.98); }
  .btn.skip:hover{ border-color: var(--ink-soft); }

  .btn.master{
    background: var(--done);
    color: #fff;
    border-color: var(--done);
  }
  .btn.master:hover{ background: #6c7a5e; }

  .controls-secondary{
    width:100%;
    max-width:480px;
    display:flex;
    gap: 12px;
    margin-top: 10px;
  }
  .btn-small{
    flex:1;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-soft);
    font-family:'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 9px 12px;
    border-radius: 8px;
    cursor:pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 6px;
  }
  .btn-small:active{ transform: scale(0.98); }
  .btn-small:hover{ border-color: var(--accent-soft); color: var(--accent); }
  .btn-small:disabled{
    opacity: 0.4;
    cursor: default;
  }
  .btn-small:disabled:hover{ border-color: var(--line); color: var(--ink-soft); }

  .position-label{
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    text-align:center;
    margin-top: 12px;
  }

  .empty-state{
    width:100%;
    max-width:480px;
    height: 340px;
    border-radius:14px;
    border: 1px dashed var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 30px;
    gap: 14px;
  }
  .empty-state .word{ font-size: 1.6rem; }
  .empty-state p{
    color: var(--ink-soft);
    font-size: 0.92rem;
    line-height: 1.7;
    margin:0;
  }

  .footer-row{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 30px;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  .reset-link{
    color: var(--ink-soft);
    text-decoration: underline;
    text-decoration-color: var(--line);
    cursor:pointer;
    background:none;
    border:none;
    font-family:inherit;
    font-size: inherit;
    padding:0;
  }
  .reset-link:hover{ color: var(--accent); }

  .checkmark-flash{
    position:absolute;
    top: 16px;
    right: 16px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--done);
    opacity:0;
    transition: opacity 0.3s;
  }
  .checkmark-flash.show{ opacity:1; }

  @media (max-width: 380px){
    .word{ font-size: 1.9rem; }
    .stage{ height: 320px; }
  }

  .card.flipped-card{
    padding: 24px 24px;
    overflow-y: auto;
    align-items: stretch;
    text-align: left;
  }

  .back-scroll{
    width:100%;
    overflow-y: auto;
    max-height: 100%;
    padding-right: 4px;
  }

  .general-block{
    background: var(--bg-deep);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 16px;
  }
  .general-label{
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .general-text{
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--ink);
  }

  .example-ja-text{
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .note-block{
    margin-top: 18px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .note-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .note-text{
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--ink);
  }

  .back-tap-hint{
    text-align:center;
    margin-top: 18px;
  }

  /* Mastered list panel */
  .panel-toggle{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:flex-end;
    margin-top: 10px;
  }
  .mastered-panel{
    width:100%;
    max-width:480px;
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    padding: 16px;
    display:none;
  }
  .mastered-panel.open{ display:block; }
  .mastered-panel h3{
    font-family:'Spectral', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0 0 12px;
  }
  .mastered-list{
    list-style:none;
    margin:0;
    padding:0;
    max-height: 280px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap: 6px;
  }
  .mastered-list li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg-deep);
    border-radius: 8px;
    font-size: 0.92rem;
  }
  .mastered-list li .m-word{
    font-family:'Spectral', serif;
    font-weight: 500;
  }
  .restore-btn{
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-size: 0.78rem;
    padding: 6px 10px;
    border-radius: 8px;
    cursor:pointer;
    flex-shrink:0;
    white-space: nowrap;
  }
  .restore-btn:hover{ border-color: var(--accent-soft); color: var(--accent); }
  .mastered-empty{
    color: var(--ink-soft);
    font-size: 0.88rem;
    text-align:center;
    padding: 10px 0;
  }

  .stats-row{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    font-size: 0.76rem;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .source-select-row{
    width:100%;
    max-width:480px;
    margin-bottom: 16px;
  }
  #sourceFilter{
    width:100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size: 0.85rem;
  }
  .source-tag{
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: var(--bg-deep);
    padding: 3px 9px;
    border-radius: 10px;
    display:inline-block;
    margin-bottom: 14px;
  }
  .box-badge{
    position:absolute;
    top: 16px;
    left: 16px;
    font-size: 0.68rem;
    color: var(--ink-soft);
    background: var(--bg-deep);
    padding: 3px 8px;
    border-radius: 8px;
  }
  .review-date{
    font-size: 0.72rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">NPR <span class="accent">単語帳</span></div>
  <div class="progress-label" id="progressLabel">0 / 0 習得</div>
</div>

<div class="progress-track">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="stats-row" id="statsRow">
  <span id="dueLabel">本日の復習: 0語</span>
  <span id="totalLabel">全カード: 0語</span>
</div>

<div class="source-select-row">
  <select id="sourceFilter"></select>
</div>

<div class="stage" id="stage"></div>

<div class="controls" id="controls">
  <button class="btn skip" id="skipBtn">次へ (まだ)</button>
  <button class="btn master" id="masterBtn">習得済み ✓</button>
</div>

<div class="controls-secondary" id="controlsSecondary">
  <button class="btn-small" id="prevBtn">← 一つ前に戻る</button>
  <button class="btn-small" id="restartBtn">⟲ 最初に戻る</button>
</div>

<div class="position-label" id="positionLabel"></div>

<div class="footer-row">
  <span id="remainingLabel"></span>
  <button class="reset-link" id="resetBtn">すべてリセット</button>
</div>

<div class="panel-toggle">
  <button class="reset-link" id="masteredToggleBtn">学習記録一覧 ▾</button>
</div>

<div class="mastered-panel" id="masteredPanel">
  <h3>学習記録（復習スケジュール）</h3>
  <ul class="mastered-list" id="masteredList"></ul>
</div>

const STORAGE_KEY = 'npr-vocab-flashcards-progress-v1';

const BOX_INTERVALS_DAYS = [1, 3, 7, 14, 30]; // index 0..4 corresponds to box 1..5
const MAX_BOX = 5;

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, days){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

let progress = {}; // map: word -> box/nextReview state
try{
  progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
}catch(e){ progress = {}; }

let currentSource = 'ALL';
let deck = [];
let originalOrder = [];
let history = [];
let flipped = false;
let panelOpen = false;
let loopingWord = null;

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }catch(e){}
}

function getState(word){
  return progress[word] || { box: 0, nextReview: todayStr() };
}

function sourceFilteredWords(){
  if(currentSource === 'ALL') return WORDS;
  return WORDS.filter(w => w.source === currentSource);
}

function isDue(word){
  const st = getState(word);
  return st.box === 0 || st.nextReview <= todayStr();
}

function buildDeck(){
  const pool = sourceFilteredWords();
  deck = pool.filter(w => isDue(w.word));
  originalOrder = deck.slice();
  history = [];
}

function renderSourceFilter(){
  const sel = document.getElementById('sourceFilter');
  const sources = Array.from(new Set(WORDS.map(w => w.source)));
  sel.innerHTML = '';
  const optAll = document.createElement('option');
  optAll.value = 'ALL';
  optAll.textContent = 'すべての記事（' + WORDS.length + '語）';
  sel.appendChild(optAll);
  sources.forEach(s => {
    const count = WORDS.filter(w => w.source === s).length;
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s + '（' + count + '語）';
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    currentSource = sel.value;
    buildDeck();
    render();
  });
}

function speakOnce(word, onEnd){
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.onend = onEnd;
  utter.onerror = onEnd;
  window.speechSynthesis.speak(utter);
}

function startLoop(word){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  loopingWord = word;
  const btn = document.querySelector('.speak-btn');
  if(btn) btn.classList.add('looping');

  const playNext = () => {
    if(loopingWord !== word) return;
    speakOnce(word, () => {
      if(loopingWord !== word) return;
      setTimeout(() => {
        if(loopingWord === word) playNext();
      }, 500);
    });
  };
  playNext();
}

function stopLoop(){
  loopingWord = null;
  window.speechSynthesis.cancel();
  const btn = document.querySelector('.speak-btn');
  if(btn) btn.classList.remove('looping');
}

function updateProgress(){
  const total = WORDS.length;
  const learnedAtLeastOnce = WORDS.filter(w => getState(w.word).box >= 1).length;
  const masteredCount = WORDS.filter(w => getState(w.word).box >= MAX_BOX).length;
  const pool = sourceFilteredWords();
  const dueCount = pool.filter(w => isDue(w.word)).length;

  document.getElementById('progressLabel').textContent = `${masteredCount} / ${total} 定着`;
  document.getElementById('progressFill').style.width = `${(learnedAtLeastOnce/total)*100}%`;
  document.getElementById('dueLabel').textContent = `本日の復習: ${dueCount}語`;
  document.getElementById('totalLabel').textContent = `全カード: ${total}語`;

  const remaining = deck.length;
  document.getElementById('remainingLabel').textContent = remaining > 0 ? `残り ${remaining} 語` : '';

  const positionLabel = document.getElementById('positionLabel');
  const prevBtn = document.getElementById('prevBtn');
  const restartBtn = document.getElementById('restartBtn');
  if(remaining > 0 && originalOrder.length > 0){
    const idx = originalOrder.findIndex(w => w.word === deck[0].word);
    const displayIdx = idx >= 0 ? idx + 1 : '?';
    positionLabel.textContent = `${displayIdx} / ${originalOrder.length} 枚目`;
  } else {
    positionLabel.textContent = '';
  }
  if(prevBtn) prevBtn.disabled = history.length === 0;
  if(restartBtn) restartBtn.disabled = originalOrder.length === 0;

  renderMasteredList();
}

function speakerIcon(){
  return `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
}

function boxLabel(word){
  const st = getState(word);
  if(st.box >= MAX_BOX) return '定着済み';
  if(st.box === 0) return '新規';
  return `Box ${st.box}`;
}

function frontHTML(current){
  return `
    <span class="source-tag">${current.source}</span>
    <div class="box-badge">${boxLabel(current.word)}</div>
    <div class="eyebrow">タップして意味を見る</div>
    <div class="word-row">
      <div class="word">${current.word}</div>
      <button class="speak-btn" id="speakBtn" title="発音を聞く">${speakerIcon()}</button>
    </div>
    <div class="tap-hint">単語をタップ / クリック</div>
  `;
}

function backHTML(current){
  const generalBlock = current.general ? `
      <div class="general-block">
        <div class="general-label">本来の意味</div>
        <div class="general-text">${current.general}</div>
      </div>` : '';

  const exampleBlock = current.example ? `
        <div class="example-label">Example</div>
        <div class="example-text">${current.example}</div>
        <div class="example-ja-text">${current.example_ja || ''}</div>` : '';

  const noteBlock = current.note ? `
      <div class="note-block">
        <div class="note-label">ヒント</div>
        <div class="note-text">${current.note}</div>
      </div>` : '';

  return `
    <div class="back-scroll">
      <div class="hint-block">
        <span class="source-tag">${current.source}</span>
        <div class="hint-label">意味</div>
        <div class="hint-text">${current.hint}</div>
        ${generalBlock}
        ${exampleBlock}
        ${noteBlock}
      </div>
      <div class="back-tap-hint tap-hint">タップで単語に戻る</div>
    </div>
  `;
}

function attachSpeakHandler(current){
  const speakBtn = document.getElementById('speakBtn');
  if(speakBtn){
    speakBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(loopingWord === current.word){
        stopLoop();
      } else {
        startLoop(current.word);
      }
    });
  }
}

function render(){
  stopLoop();
  const stage = document.getElementById('stage');
  const controls = document.getElementById('controls');

  if(deck.length === 0){
    stage.innerHTML = `
      <div class="empty-state">
        <div class="word">よくできました</div>
        <p>本日復習すべきカードはこれで終わりです。<br>「学習記録一覧」からいつでも前倒しで復習したり、「すべてリセット」で最初からやり直すこともできます。</p>
      </div>
    `;
    controls.style.display = 'none';
    document.getElementById('controlsSecondary').style.display = 'none';
    updateProgress();
    return;
  }

  controls.style.display = 'flex';
  document.getElementById('controlsSecondary').style.display = 'flex';
  flipped = false;

  const current = deck[0];
  const next = deck[1];

  stage.innerHTML = `
    ${next ? `<div class="card behind"></div>` : ''}
    <div class="card front" id="currentCard">
      ${frontHTML(current)}
    </div>
  `;

  document.getElementById('currentCard').addEventListener('click', (e) => {
    if(e.target.closest('.speak-btn')) return;
    flipCard();
  });

  attachSpeakHandler(current);

  updateProgress();
}

function flipCard(){
  if(flipped) {
    showFront();
    return;
  }
  stopLoop();
  const card = document.getElementById('currentCard');
  const current = deck[0];
  flipped = true;

  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.add('flipped-card');
    card.innerHTML = backHTML(current);
    card.classList.remove('flipping');
  }, 220);
}

function showFront(){
  const card = document.getElementById('currentCard');
  const current = deck[0];
  flipped = false;
  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.remove('flipped-card');
    card.innerHTML = frontHTML(current);
    attachSpeakHandler(current);
    card.classList.remove('flipping');
  }, 220);
}

function nextCard(gotIt){
  const card = document.getElementById('currentCard');
  if(!card){ return; }

  const current = deck[0];
  const prevState = Object.assign({}, getState(current.word));

  // save state for undo
  history.push({
    word: current.word,
    gotIt: gotIt,
    prevState: prevState
  });

  const st = getState(current.word);
  if(gotIt){
    st.box = Math.min(MAX_BOX, st.box + 1);
    st.nextReview = addDays(todayStr(), BOX_INTERVALS_DAYS[st.box - 1]);
  } else {
    st.box = 0;
    st.nextReview = todayStr();
  }
  progress[current.word] = st;
  saveProgress();

  card.classList.add('exit-left');

  setTimeout(() => {
    // card leaves today's session regardless of result;
    // it will reappear automatically once its nextReview date arrives
    deck.shift();
    render();
  }, 260);
}

function prevCard(){
  if(history.length === 0) return;
  const last = history.pop();

  progress[last.word] = last.prevState;
  saveProgress();

  const w = WORDS.find(item => item.word === last.word);
  if(w) deck.unshift(w);

  render();
}

function restartDeck(){
  buildDeck();
  render();
}

function renderMasteredList(){
  const list = document.getElementById('masteredList');
  const learnedWords = WORDS.filter(w => getState(w.word).box >= 1);

  if(learnedWords.length === 0){
    list.innerHTML = `<li class="mastered-empty" style="background:none;">まだ学習記録はありません。</li>`;
    return;
  }

  learnedWords.sort((a, b) => getState(a.word).nextReview.localeCompare(getState(b.word).nextReview));

  list.innerHTML = learnedWords.map(w => {
    const st = getState(w.word);
    const label = st.box >= MAX_BOX ? '定着済み' : `Box ${st.box}`;
    return `
    <li>
      <span class="m-word">${w.word} <span class="review-date">(${label} · 次回 ${st.nextReview})</span></span>
      <button class="restore-btn" data-word="${w.word}">今すぐ復習</button>
    </li>
  `;
  }).join('');

  list.querySelectorAll('.restore-btn').forEach(btn => {
    btn.addEventListener('click', () => restoreWord(btn.dataset.word));
  });
}

function restoreWord(word){
  const st = getState(word);
  st.nextReview = todayStr();
  progress[word] = st;
  saveProgress();
  const w = WORDS.find(item => item.word === word);
  if(w && !deck.some(d => d.word === word)){
    deck.unshift(w);
  }
  if(w && !originalOrder.some(d => d.word === word)){
    originalOrder.unshift(w);
  }
  render();
}

document.getElementById('skipBtn').addEventListener('click', () => nextCard(false));
document.getElementById('masterBtn').addEventListener('click', () => nextCard(true));
document.getElementById('prevBtn').addEventListener('click', () => prevCard());
document.getElementById('restartBtn').addEventListener('click', () => restartDeck());

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('学習の記録（復習スケジュール）をすべてリセットしますか？')){
    progress = {};
    saveProgress();
    buildDeck();
    render();
  }
});

document.getElementById('masteredToggleBtn').addEventListener('click', () => {
  panelOpen = !panelOpen;
  const panel = document.getElementById('masteredPanel');
  const btn = document.getElementById('masteredToggleBtn');
  panel.classList.toggle('open', panelOpen);
  btn.textContent = panelOpen ? '学習記録一覧 ▴' : '学習記録一覧 ▾';
  if(panelOpen) renderMasteredList();
});

document.addEventListener('keydown', (e) => {
  if(e.code === 'Space'){
    e.preventDefault();
    flipCard();
  } else if(e.code === 'ArrowRight'){
    nextCard(false);
  } else if(e.code === 'ArrowLeft'){
    prevCard();
  } else if(e.code === 'Enter'){
    nextCard(true);
  }
});

renderSourceFilter();
buildDeck();
render();
</script>

</body>
</html>
