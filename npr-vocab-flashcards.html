<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPR英語学習 単語帳（復習管理つき）</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root{
    --bg: #e9e9e6;
    --bg-deep: #dcdcd8;
    --ink: #2b2b2b;
    --ink-soft: #6b6b68;
    --line: #c7c7c2;
    --card: #f4f3ef;
    --accent: #b3422e;
    --accent-soft: #d98f7e;
    --done: #7c8a6e;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(0,0,0,0.02) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(0,0,0,0.02) 0%, transparent 40%);
    color: var(--ink);
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 16px 60px;
  }

  .topbar{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 6px;
  }

  .title{
    font-family:'Spectral', serif;
    font-weight:600;
    font-size: 1.5rem;
    letter-spacing: 0.01em;
  }
  .title .accent{ color: var(--accent); font-style: italic; }

  .progress-label{
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    text-align:right;
  }

  .progress-track{
    width:100%;
    max-width:480px;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    margin: 10px 0 28px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .stage{
    width:100%;
    max-width:480px;
    position:relative;
    height: 340px;
    perspective: 1200px;
  }

  .card{
    position:absolute;
    inset:0;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 28px -16px rgba(0,0,0,0.18);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding: 28px 26px;
    cursor:pointer;
    transition: transform 0.45s cubic-bezier(.22,.61,.36,1), opacity 0.3s ease, box-shadow 0.3s;
    backface-visibility:hidden;
    user-select:none;
  }

  .card.behind{
    transform: scale(0.96) translateY(10px);
    box-shadow: none;
    z-index: 0;
    opacity: 0.6;
  }

  .card.front{ z-index: 1; }

  .card.flipping{
    transform: rotateY(90deg) scale(0.96);
    opacity: 0;
  }

  .card.exit-left{
    transform: translateX(-130%) rotate(-8deg);
    opacity: 0;
  }

  .eyebrow{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }

  .word{
    font-family:'Spectral', serif;
    font-weight: 600;
    font-size: 1.7rem;
    line-height: 1.15;
    margin: 0 0 18px;
    white-space: nowrap;
    overflow: hidden;
    max-width: 100%;
  }

  .speak-btn{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
    flex-shrink:0;
  }
  .speak-btn:hover{ border-color: var(--accent-soft); }
  .speak-btn:active{ transform: scale(0.92); }
  .speak-btn svg{ width:20px; height:20px; fill: var(--accent); }
  .speak-btn.speaking svg{ animation: pulse 0.6s ease infinite alternate; }
  .speak-btn.looping{ background: var(--accent); border-color: var(--accent); }
  .speak-btn.looping svg{ fill: #fff; animation: pulse 0.6s ease infinite alternate; }
  @keyframes pulse{ from{ opacity:1; } to{ opacity:0.45; } }

  .word-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .tap-hint{
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 16px;
  }

  .hint-block{
    width:100%;
  }
  .hint-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .hint-text{
    font-size: 1.15rem;
    font-weight: 500;
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .example-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .example-text{
    font-family:'Spectral', serif;
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--ink);
  }

  .controls{
    width:100%;
    max-width:480px;
    display:flex;
    gap: 12px;
    margin-top: 26px;
  }

  .btn{
    flex:1;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 14px 16px;
    border-radius: 10px;
    cursor:pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
  }
  .btn:active{ transform: scale(0.98); }
  .btn.skip:hover{ border-color: var(--ink-soft); }

  .btn.master{
    background: var(--done);
    color: #fff;
    border-color: var(--done);
  }
  .btn.master:hover{ background: #6c7a5e; }

  .controls-secondary{
    width:100%;
    max-width:480px;
    display:flex;
    gap: 12px;
    margin-top: 10px;
  }
  .btn-small{
    flex:1;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-soft);
    font-family:'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 9px 12px;
    border-radius: 8px;
    cursor:pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 6px;
  }
  .btn-small:active{ transform: scale(0.98); }
  .btn-small:hover{ border-color: var(--accent-soft); color: var(--accent); }
  .btn-small:disabled{
    opacity: 0.4;
    cursor: default;
  }
  .btn-small:disabled:hover{ border-color: var(--line); color: var(--ink-soft); }

  .position-label{
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    text-align:center;
    margin-top: 12px;
  }

  .empty-state{
    width:100%;
    max-width:480px;
    height: 340px;
    border-radius:14px;
    border: 1px dashed var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 30px;
    gap: 14px;
  }
  .empty-state .word{ font-size: 1.6rem; }
  .empty-state p{
    color: var(--ink-soft);
    font-size: 0.92rem;
    line-height: 1.7;
    margin:0;
  }

  .footer-row{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 30px;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  .reset-link{
    color: var(--ink-soft);
    text-decoration: underline;
    text-decoration-color: var(--line);
    cursor:pointer;
    background:none;
    border:none;
    font-family:inherit;
    font-size: inherit;
    padding:0;
  }
  .reset-link:hover{ color: var(--accent); }

  .checkmark-flash{
    position:absolute;
    top: 16px;
    right: 16px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--done);
    opacity:0;
    transition: opacity 0.3s;
  }
  .checkmark-flash.show{ opacity:1; }

  @media (max-width: 380px){
    .word{ font-size: 1.4rem; }
    .stage{ height: 320px; }
  }

  .card.flipped-card{
    padding: 24px 24px;
    overflow-y: auto;
    align-items: stretch;
    text-align: left;
  }

  .back-scroll{
    width:100%;
    overflow-y: auto;
    max-height: 100%;
    padding-right: 4px;
  }

  .general-block{
    background: var(--bg-deep);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 16px;
  }
  .general-label{
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .general-text{
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--ink);
  }

  .example-ja-text{
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .note-block{
    margin-top: 18px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .note-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .note-text{
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--ink);
  }

  .back-tap-hint{
    text-align:center;
    margin-top: 18px;
  }

  /* Mastered list panel */
  .panel-toggle{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:flex-end;
    margin-top: 10px;
  }
  .mastered-panel{
    width:100%;
    max-width:480px;
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    padding: 16px;
    display:none;
  }
  .mastered-panel.open{ display:block; }
  .mastered-panel h3{
    font-family:'Spectral', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0 0 12px;
  }
  .mastered-list{
    list-style:none;
    margin:0;
    padding:0;
    max-height: 280px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap: 6px;
  }
  .mastered-list li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg-deep);
    border-radius: 8px;
    font-size: 0.92rem;
  }
  .mastered-list li .m-word{
    font-family:'Spectral', serif;
    font-weight: 500;
  }
  .restore-btn{
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-size: 0.78rem;
    padding: 6px 10px;
    border-radius: 8px;
    cursor:pointer;
    flex-shrink:0;
    white-space: nowrap;
  }
  .restore-btn:hover{ border-color: var(--accent-soft); color: var(--accent); }
  .mastered-empty{
    color: var(--ink-soft);
    font-size: 0.88rem;
    text-align:center;
    padding: 10px 0;
  }

  .stats-row{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    font-size: 0.76rem;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .source-select-row{
    width:100%;
    max-width:480px;
    margin-bottom: 16px;
  }
  #sourceFilter{
    width:100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size: 0.85rem;
  }
  .source-tag{
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: var(--bg-deep);
    padding: 3px 9px;
    border-radius: 10px;
    display:inline-block;
    margin-bottom: 14px;
  }
  .box-badge{
    position:absolute;
    top: 16px;
    left: 16px;
    font-size: 0.68rem;
    color: var(--ink-soft);
    background: var(--bg-deep);
    padding: 3px 8px;
    border-radius: 8px;
  }
  .master-checkbox-row{
    position:absolute;
    top: 16px;
    right: 16px;
    display:flex;
    align-items:center;
    gap: 5px;
    font-size: 0.7rem;
    color: var(--ink-soft);
    cursor:pointer;
  }
  .master-checkbox-row input[type=checkbox]{
    width: 16px;
    height: 16px;
    accent-color: var(--done);
    cursor:pointer;
  }
  .review-date{
    font-size: 0.72rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .box-badge{
    position:absolute;
    top: 16px;
    left: 16px;
    font-size: 0.68rem;
    color: var(--ink-soft);
    background: var(--bg-deep);
    padding: 3px 8px;
    border-radius: 8px;
  }
  .review-date{
    font-size: 0.72rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .review-mode-row{
    width:100%;
    max-width:480px;
    display:flex;
    gap: 8px;
    margin-top: 10px;
    align-items:center;
  }
  .review-mode-row #reviewToggleBtn{ flex: 1; }
  .review-mode-row #reviewFilterSelect{
    flex: 1.2;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size: 0.8rem;
  }
  .btn-small.btn-on{
    background: var(--done);
    border-color: var(--done);
    color: #fff;
  }
  .review-banner{
    width:100%;
    max-width:480px;
    text-align:center;
    font-size: 0.78rem;
    color: var(--done);
    background: #eef3ea;
    border-radius: 8px;
    padding: 6px 10px;
    margin-top: 10px;
    display:none;
  }
  .review-banner.show{ display:block; }
  .example-en{ cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">NPR <span class="accent">単語帳</span></div>
  <div class="progress-label" id="progressLabel">0 / 0 習得</div>
</div>

<div class="progress-track">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="stats-row" id="statsRow">
  <span id="dueLabel">本日の新規・復習: 0語</span>
  <span id="totalLabel">全カード: 0語</span>
</div>

<div class="source-select-row">
  <select id="sourceFilter"></select>
</div>

<div class="stage" id="stage"></div>

<div class="controls" id="controls">
  <button class="btn skip" id="skipBtn">次へ (まだ)</button>
  <button class="btn master" id="masterBtn">習得済み ✓</button>
</div>

<div class="controls-secondary" id="controlsSecondary">
  <button class="btn-small" id="prevBtn">← 一つ前に戻る</button>
  <button class="btn-small" id="restartBtn">⟲ 最初に戻る</button>
</div>

<div class="review-mode-row">
  <button class="btn-small" id="reviewToggleBtn">🔁 これまでの単語を復習する</button>
  <select id="reviewFilterSelect">
    <option value="due" selected>本日復習（出題対象のみ）</option>
    <option value="b1">1日サイクル</option>
    <option value="b2">3日サイクル</option>
    <option value="b3">7日サイクル</option>
    <option value="b4">14日サイクル</option>
    <option value="b5">30日サイクル</option>
    <option value="all">すべて</option>
  </select>
</div>

<div class="review-banner" id="reviewBanner">🔁 復習モード中：これまでに「習得済み ✓」にした単語をまとめて出題しています</div>

<div class="position-label" id="positionLabel"></div>

<div class="footer-row">
  <span id="remainingLabel"></span>
  <button class="reset-link" id="resetBtn">すべてリセット</button>
</div>

<script>
const WORDS = [{"word":"limit","general":"制限する、限定する","example":"The doctor told him to limit his salt intake.","example_ja":"医者は彼に塩分摂取を制限するよう伝えた。","source":"Visa (Trump/Universities)"},{"word":"implication","general":"①影響、結果（通例 implications と複数形）②ほのめかし、含み、含意③（犯罪などへの）関与","example":"The decision could have serious implications for small businesses.","example_ja":"その決定は中小企業に深刻な影響を及ぼしかねない。","source":"Visa (Trump/Universities)"},{"word":"correspondent","general":"特派員、通信員","example":"Our correspondent in Tokyo filed the story this morning.","example_ja":"東京の特派員が今朝この記事を送ってきた。","source":"Visa (Trump/Universities)"},{"word":"historically","general":"歴史的に見て、昔から","example":"Historically, the region has relied on farming.","example_ja":"歴史的に見て、この地域は農業に頼ってきた。","source":"Visa (Trump/Universities)"},{"word":"academic","general":"学業の、学問上の","example":"She has a strong academic record.","example_ja":"彼女は優れた学業成績を持っている。","source":"Visa (Trump/Universities)"},{"word":"program","general":"①（教育・活動の）プログラム、課程②（テレビ・ラジオの）番組③計画する（動詞）","example":"He's enrolled in a two-year training program.","example_ja":"彼は2年間の研修プログラムに入っている。","source":"Visa (Trump/Universities)"},{"word":"fixed","general":"固定された、決まった","example":"We pay a fixed amount every month.","example_ja":"私たちは毎月決まった額を支払っている。","source":"Visa (Trump/Universities)"},{"word":"period","general":"①期間、時期②（文の終わりの）ピリオド③生理、月経（口語）","example":"He worked there for a period of five years.","example_ja":"彼は5年間そこで働いた。","source":"Visa (Trump/Universities)"},{"word":"apply for","general":"〜に申し込む、応募する","example":"She applied for a scholarship.","example_ja":"彼女は奨学金に応募した。","source":"Visa (Trump/Universities)"},{"word":"formal","general":"正式な、形式ばった","example":"He sent a formal apology to the company.","example_ja":"彼はその会社に正式な謝罪文を送った。","source":"Visa (Trump/Universities)"},{"word":"extension","general":"延長、拡張","example":"They asked for a one-week extension on the deadline.","example_ja":"彼らは締め切りの1週間の延長を求めた。","source":"Visa (Trump/Universities)"},{"word":"fee","general":"手数料、料金","example":"The application fee is $50.","example_ja":"申請手数料は50ドルだ。","source":"Visa (Trump/Universities)"},{"word":"impact","general":"①（名詞）影響、衝撃②〜に影響を与える（動詞）","example":"The new policy will impact thousands of families.","example_ja":"その新しい政策は何千もの家庭に影響を与えるだろう。","source":"Visa (Trump/Universities)"},{"word":"medical","general":"医学の、医療の","example":"She needs urgent medical attention.","example_ja":"彼女は緊急の医療処置を必要としている。","source":"Visa (Trump/Universities)"},{"word":"PhD","general":"博士号。Doctor of Philosophy（哲学博士）の略で、文系・理系を問わず最高位の学位を指す","example":"He earned his PhD in physics last year.","example_ja":"彼は昨年、物理学の博士号を取得した。","source":"Visa (Trump/Universities)"},{"word":"restriction","general":"制限、規制","example":"There are strict restrictions on fishing in this area.","example_ja":"この地域では漁業に厳しい規制がある。","source":"Visa (Trump/Universities)"},{"word":"major","general":"①専攻科目（名詞）②主要な、重大な（形容詞）③陸軍少佐（名詞、階級）","example":"Her major is computer science.","example_ja":"彼女の専攻はコンピューターサイエンスだ。","source":"Visa (Trump/Universities)"},{"word":"administration","general":"①政権、行政（府）②管理、運営","example":"The current administration has raised taxes twice.","example_ja":"現政権は2度増税した。","source":"Visa (Trump/Universities)"},{"word":"crackdown","general":"厳重な取り締まり","example":"Police launched a crackdown on illegal parking.","example_ja":"警察は違法駐車の取り締まりを開始した。","source":"Visa (Trump/Universities)"},{"word":"immigration","general":"移民、出入国管理","example":"Immigration rules have become stricter in recent years.","example_ja":"近年、移民に関する規則は厳しくなっている。","source":"Visa (Trump/Universities)"},{"word":"tackle","general":"（問題に）取り組む、対処する","example":"The city needs to tackle its traffic problem.","example_ja":"その市は交通問題に取り組む必要がある。","source":"Visa (Trump/Universities)"},{"word":"abuse","general":"①悪用、濫用（名詞）②虐待する、悪用する（動詞）","example":"The report criticized the abuse of public funds.","example_ja":"その報告書は公金の濫用を批判した。","source":"Visa (Trump/Universities)"},{"word":"Department of Homeland Security","general":"アメリカ source":"Smithsonian Museum"},{"word":"mirror","general":"①鏡（名詞）②〜に似ている、反映する（動詞）","example":"His views mirror those of his father.","example_ja":"彼の考えは父親の考えを反映している。","source":"Smithsonian Museum"},{"word":"Domestic Policy Council","general":"（米大統領直属の）国内政策会議","example":"The Domestic Policy Council advises the president on domestic issues.","example_ja":"国内政策会議は国内問題について大統領に助言する。","source":"Smithsonian Museum"},{"word":"underemphasize","general":"軽視する、十分に強調しない","example":"The textbook tends to underemphasize local history.","example_ja":"その教科書は地元の歴史を軽視しがちだ。","source":"Smithsonian Museum"},{"word":"Founding Fathers","general":"アメリカ建国の父たち","example":"The Founding Fathers drafted the Constitution in 1787.","example_ja":"建国の父たちは1787年に憲法を起草した。","source":"Smithsonian Museum"},{"word":"anniversary","general":"記念日、周年","example":"They celebrated their tenth wedding anniversary.","example_ja":"彼らは結婚10周年を祝った。","source":"Smithsonian Museum"},{"word":"hew to","general":"（方針・立場などに）忠実に従う","example":"The new manager hews closely to company policy.","example_ja":"新しいマネージャーは会社の方針に忠実に従っている。","source":"Smithsonian Museum"},{"word":"govern","general":"〜を規律する、統制する、統治する","example":"Strict rules govern how the data can be used.","example_ja":"厳しい規則がそのデータの使用方法を規律している。","source":"Smithsonian Museum"},{"word":"scholarship","general":"①学問、学識②奨学金","example":"He received a scholarship to study abroad.","example_ja":"彼は留学するための奨学金を受けた。","source":"Smithsonian Museum"},{"word":"nonpartisanship","general":"党派に偏らないこと、超党派性","example":"The judge is respected for her nonpartisanship.","example_ja":"その判事は超党派の姿勢で尊敬されている。","source":"Smithsonian Museum"},{"word":"take sides","general":"どちらかの側につく","example":"As a mediator, she refused to take sides.","example_ja":"調停者として、彼女はどちらの側にもつくことを拒んだ。","source":"Smithsonian Museum"},{"word":"breadth","general":"広がり、幅","example":"The exhibit covers the breadth of the artist's career.","example_ja":"その展示はその芸術家のキャリアの幅広さを網羅している。","source":"Smithsonian Museum"},{"word":"rebuttal","general":"反論","example":"The lawyer offered a strong rebuttal to the accusation.","example_ja":"その弁護士はその告発に強く反論した。","source":"Smithsonian Museum"},{"word":"undermine","general":"（信頼などを）損なう、弱める","example":"Constant criticism can undermine a child's confidence.","example_ja":"絶え間ない批判は子供の自信を損ないかねない。","source":"Smithsonian Museum"},{"word":"trustworthiness","general":"信頼性","example":"The witness's trustworthiness was questioned in court.","example_ja":"その証人の信頼性は法廷で疑問視された。","source":"Smithsonian Museum"},{"word":"reshape","general":"作り変える、再構成する","example":"The internet has reshaped how we communicate.","example_ja":"インターネットは私たちのコミュニケーションの仕方を作り変えた。","source":"Smithsonian Museum"},{"word":"narrative","general":"物語、語り口","example":"The film offers a powerful narrative about survival.","example_ja":"その映画は生存についての力強い物語を提供している。","source":"Smithsonian Museum"},{"word":"institution","general":"①施設、機関②制度、慣習","example":"The university is one of the oldest institutions in the country.","example_ja":"その大学は国内で最も古い機関の一つだ。","source":"Smithsonian Museum"},{"word":"allow","general":"許す","example":"The rules don't allow pets in the building.","example_ja":"その規則は建物内でのペットの飼育を許していない。","source":"Smithsonian Museum"},{"word":"Capitol Hill","general":"アメリカ連邦議会議事堂","example":"The senator spent the day on Capitol Hill.","example_ja":"その上院議員は一日を連邦議会議事堂で過ごした。","source":"Smithsonian Museum"},{"word":"adjunct instructor","general":"非常勤講師","example":"She works as an adjunct instructor at two colleges.","example_ja":"彼女は2つの大学で非常勤講師として働いている。","source":"Male Nurses"},{"word":"mock","general":"①模擬の、実物そっくりの（形容詞）②あざける、ばかにする（動詞）","example":"Students took part in a mock interview.","example_ja":"学生たちは模擬面接に参加した。","source":"Male Nurses"},{"word":"scrub","general":"①ごしごし洗う（動詞）②手洗い消毒（名詞）③低木地（名詞）","example":"Surgeons scrub their hands before every operation.","example_ja":"外科医は毎回の手術の前に手を念入りに洗う。","source":"Male Nurses"},{"word":"elective","general":"①選択科目（名詞）②選択の（形容詞）","example":"She's taking an elective in photography this semester.","example_ja":"彼女は今学期、写真の選択科目を取っている。","source":"Male Nurses"},{"word":"specialty","general":"専門分野","example":"Cardiology is his medical specialty.","example_ja":"循環器学は彼の医学の専門分野だ。","source":"Male Nurses"},{"word":"mannequin","general":"マネキン、人体模型","example":"The students practiced CPR on a mannequin.","example_ja":"学生たちはマネキンで心肺蘇生法を練習した。","source":"Male Nurses"},{"word":"feature","general":"①特集、呼び物（名詞）②特徴（名詞）③（人・物を）目玉として取り上げる（動詞）","example":"The magazine ran a feature on local artists.","example_ja":"その雑誌は地元アーティストの特集を組んだ。","source":"Male Nurses"},{"word":"faculty","general":"①教員（全体）②能力、機能","example":"The faculty voted to change the curriculum.","example_ja":"教員たちはカリキュラム変更に投票した。","source":"Male Nurses"},{"word":"calling","general":"天職、使命（神に呼ばれた、というイメージの語）","example":"Teaching is more than a job to her; it's a calling.","example_ja":"教えることは彼女にとって単なる仕事以上のもの、天職なのだ。","source":"Male Nurses"},{"word":"volunteer fireman","general":"ボランティアの消防士","example":"He served as a volunteer fireman for over a decade.","example_ja":"彼は10年以上ボランティアの消防士を務めた。","source":"Male Nurses"},{"word":"quota","general":"割り当て数、定員","example":"The factory has to meet a daily production quota.","example_ja":"その工場は1日あたりの生産割当を満たさなければならない。","source":"Male Nurses"},{"word":"wake-up","general":"目覚めさせるもの、気づきのきっかけ","example":"The accident was a wake-up call for the whole industry.","example_ja":"その事故は業界全体にとって目を覚まさせる出来事だった。","source":"Male Nurses"},{"word":"stereotype","general":"固定観念、ステレオタイプ","example":"The movie challenges common stereotypes about aging.","example_ja":"その映画は老いに関するよくある固定観念に一石を投じている。","source":"Male Nurses"},{"word":"NICU","general":"新生児集中治療室。Neonatal Intensive Care Unitの略","example":"The premature baby spent two weeks in the NICU.","example_ja":"その未熟児は2週間、新生児集中治療室で過ごした。","source":"Male Nurses"},{"word":"get defensive","general":"防御的になる、身構える","example":"He gets defensive whenever someone questions his work.","example_ja":"彼は自分の仕事に疑問を投げかけられると、いつも身構える。","source":"Male Nurses"},{"word":"breastfeeding","general":"母乳育児","example":"Breastfeeding has many benefits for newborns.","example_ja":"母乳育児は新生児にとって多くの利点がある。","source":"Male Nurses"},{"word":"skin-to-skin","general":"肌と肌の触れ合い（カンガルーケア）。赤ちゃんと親が直接肌を触れ合わせるケア方法","example":"Nurses encouraged skin-to-skin contact right after birth.","example_ja":"看護師たちは出産直後の肌と肌の触れ合いを勧めた。","source":"Male Nurses"},{"word":"inclusiveness","general":"包摂性、受け入れる姿勢","example":"The school is known for its inclusiveness toward all students.","example_ja":"その学校はすべての生徒への包摂的な姿勢で知られている。","source":"Male Nurses"},{"word":"outcome","general":"（治療などの）結果、転帰","example":"Early treatment usually leads to a better outcome.","example_ja":"早期の治療は通常、より良い結果につながる。","source":"Male Nurses"},{"word":"clinical rotation","general":"臨床実習","example":"Nursing students complete several clinical rotations before graduating.","example_ja":"看護学生は卒業前にいくつもの臨床実習をこなす。","source":"Male Nurses"},{"word":"relieved","general":"安心した、ほっとした","example":"She felt relieved when the test results came back normal.","example_ja":"検査結果が正常だと分かって彼女はほっとした。","source":"Male Nurses"},{"word":"bedside","general":"病床のそば、ベッドサイド","example":"The doctor spent extra time at the patient's bedside.","example_ja":"医師は患者のベッドサイドで長めに時間を過ごした。","source":"Male Nurses"},{"word":"persist","general":"根強く残る、存続する、しつこく続ける","example":"Old habits often persist even after we try to change them.","example_ja":"古い習慣は変えようとしても根強く残ることが多い。","source":"Male Nurses"},{"word":"be mistaken for","general":"〜と間違えられる","example":"He's often mistaken for his older brother.","example_ja":"彼はよく兄と間違えられる。","source":"Male Nurses"},{"word":"gender neutral","general":"性別による区別のない","example":"The company introduced gender neutral restrooms.","example_ja":"その会社は性別を問わない化粧室を導入した。","source":"Male Nurses"},{"word":"designate","general":"（正式に）指定する、認定する","example":"The area was designated a national park in 1980.","example_ja":"その地域は1980年に国立公園に指定された。","source":"Male Nurses"},{"word":"chant","general":"①掛け声、シュプレヒコール（名詞）②連呼する（動詞）","example":"The crowd began to chant the team's name.","example_ja":"群衆はそのチームの名前を連呼し始めた。","source":"Nolan Wells"},{"word":"somber","general":"厳粛な、陰鬱な","example":"A somber mood filled the room after the announcement.","example_ja":"その発表の後、部屋は陰鬱な雰囲気に包まれた。","source":"Nolan Wells"},{"word":"by all accounts","general":"誰に聞いても、あらゆる話を総合すると","example":"By all accounts, she was a wonderful teacher.","example_ja":"誰に聞いても、彼女は素晴らしい教師だった。","source":"Nolan Wells"},{"word":"officiate","general":"（式などを）執り行う","example":"A local judge officiated at their wedding.","example_ja":"地元の裁判官が彼らの結婚式を執り行った。","source":"Nolan Wells"},{"word":"reward","general":"①報酬、懸賞金（名詞）②報いる（動詞）","example":"Police offered a reward for information about the theft.","example_ja":"警察はその窃盗に関する情報に懸賞金を提示した。","source":"Nolan Wells"},{"word":"backtrack","general":"話を戻す、後戻りする","example":"Let me backtrack a little and explain how it started.","example_ja":"少し話を戻して、それがどう始まったか説明させてください。","source":"Nolan Wells"},{"word":"spark","general":"①火花（名詞）②（議論などを）引き起こす（動詞）","example":"The comment sparked a heated debate online.","example_ja":"そのコメントはネット上で激しい議論を引き起こした。","source":"Nolan Wells"},{"word":"racial element","general":"人種的な要素","example":"Investigators are looking into whether there was a racial element to the attack.","example_ja":"捜査員たちはその襲撃に人種的な要素があったかどうかを調べている。","source":"Nolan Wells"},{"word":"foul play","general":"犯罪行為、不正な行為（スポーツの反則＝foulから転じた表現）","example":"Police found no evidence of foul play in his death.","example_ja":"警察は彼の死に犯罪性の証拠を見つけなかった。","source":"Nolan Wells"},{"word":"speculation","general":"憶測","example":"There has been a lot of speculation about the company's future.","example_ja":"その会社の将来については多くの憶測が飛び交っている。","source":"Nolan Wells"},{"word":"pending","general":"保留中の、係属中の","example":"The case is still pending in court.","example_ja":"その事件はまだ裁判で係属中だ。","source":"Nolan Wells"},{"word":"medical examiner","general":"検視官","example":"The medical examiner determined the cause of death.","example_ja":"検視官が死因を特定した。","source":"Nolan Wells"},{"word":"toxicology report","general":"毒物検査報告書","example":"The toxicology report should be ready next week.","example_ja":"毒物検査報告書は来週には出るはずだ。","source":"Nolan Wells"},{"word":"autopsy","general":"司法解剖、検死解剖","example":"An autopsy revealed the man had a heart condition.","example_ja":"司法解剖の結果、その男性には心臓の疾患があったことが分かった。","source":"Nolan Wells"},{"word":"independent","general":"独立した、第三者による","example":"They hired an independent auditor to check the accounts.","example_ja":"彼らは会計を確認するために独立した監査人を雇った。","source":"Nolan Wells"},{"word":"cellphone","general":"携帯電話","example":"She left her cellphone at home by mistake.","example_ja":"彼女は間違えて携帯電話を家に置いてきた。","source":"Nolan Wells"},{"word":"track back to","general":"〜までたどる","example":"Investigators tracked the call back to a house nearby.","example_ja":"捜査員たちはその電話を近くの家までたどった。","source":"Nolan Wells"},{"word":"digital evidence","general":"デジタル証拠","example":"Digital evidence played a key role in solving the case.","example_ja":"デジタル証拠がその事件解決に重要な役割を果たした。","source":"Nolan Wells"},{"word":"figure out","general":"解明する、理解する","example":"It took hours to figure out what went wrong.","example_ja":"何が悪かったのかを解明するのに何時間もかかった。","source":"Nolan Wells"},{"word":"civil rights attorney","general":"公民権派弁護士","example":"A civil rights attorney is representing the family.","example_ja":"公民権派弁護士がその家族を代理している。","source":"Nolan Wells"},{"word":"draw attention","general":"注目を集める","example":"The unusual case drew attention from across the country.","example_ja":"その異例の事件は全国から注目を集めた。","source":"Nolan Wells"},{"word":"investigation","general":"捜査、調査","example":"The investigation is expected to take several months.","example_ja":"その捜査は数か月かかると見られている。","source":"Nolan Wells"},{"word":"law enforcement","general":"法執行機関、警察","example":"Local law enforcement is working with the FBI.","example_ja":"地元の法執行機関はFBIと連携している。","source":"Nolan Wells"},{"word":"unanswered","general":"未解決の、答えの出ていない","example":"Many questions about the accident remain unanswered.","example_ja":"その事故については多くの疑問が未解決のままだ。","source":"Nolan Wells"},{"word":"be involved in","general":"〜に関与している","example":"Three people were involved in the decision.","example_ja":"3人がその決定に関与していた。","source":"Nolan Wells"},{"word":"delete","general":"削除する","example":"He accidentally deleted an important file.","example_ja":"彼は誤って重要なファイルを削除してしまった。","source":"Nolan Wells"},{"word":"benefit concert","general":"チャリティーコンサート","example":"The band played a benefit concert for flood victims.","example_ja":"そのバンドは洪水の被災者のためのチャリティーコンサートを行った。","source":"Marx Brothers"},{"word":"archivist","general":"アーカイブ専門家","example":"The museum hired an archivist to organize old records.","example_ja":"その博物館は古い記録を整理するためにアーカイブ専門家を雇った。","source":"Marx Brothers"},{"word":"restoration","general":"修復","example":"The painting underwent a two-year restoration.","example_ja":"その絵画は2年間の修復作業を経た。","source":"Marx Brothers"},{"word":"longtime","general":"長年の","example":"He's a longtime fan of the team.","example_ja":"彼はそのチームの長年のファンだ。","source":"Marx Brothers"},{"word":"tape","general":"①テープ、録音テープ（名詞）②テープで留める（動詞）","example":"She still has the old tape of her grandmother's voice.","example_ja":"彼女は今でも祖母の声が入った古いテープを持っている。","source":"Marx Brothers"},{"word":"accidentally","general":"偶然に、誤って","example":"I accidentally deleted the message.","example_ja":"私は誤ってそのメッセージを削除してしまった。","source":"Marx Brothers"},{"word":"extensive","general":"大規模な、広範囲の","example":"The house needs extensive repairs.","example_ja":"その家は大規模な修理が必要だ。","source":"Marx Brothers"},{"word":"instrument","general":"①楽器②道具、手段","example":"She's been playing the piano, her favorite instrument, since age five.","example_ja":"彼女は5歳のときから、お気に入りの楽器であるピアノを弾いている。","source":"Marx Brothers"},{"word":"narrate","general":"ナレーションをする、語る","example":"The documentary is narrated by a famous actor.","example_ja":"そのドキュメンタリーは有名な俳優がナレーションをしている。","source":"Marx Brothers"},{"word":"meadow","general":"草原、牧草地","example":"The children played in a meadow full of wildflowers.","example_ja":"子供たちは野花でいっぱいの草原で遊んだ。","source":"Marx Brothers"},{"word":"escape","general":"①逃げる（動詞）②逃避、脱出（名詞）","example":"The prisoner tried to escape but was caught.","example_ja":"その囚人は逃げようとしたが捕まった。","source":"Marx Brothers"},{"word":"libretto","general":"台本、リブレット（オペラや音楽劇の台本を指すイタリア語由来の語）","example":"He wrote the libretto for a new opera.","example_ja":"彼は新しいオペラの台本を書いた。","source":"Marx Brothers"},{"word":"outspoken","general":"率直にものを言う","example":"She's outspoken about climate change.","example_ja":"彼女は気候変動について率直に発言する。","source":"Marx Brothers"},{"word":"co-write","general":"共作する","example":"The two musicians co-wrote the song together.","example_ja":"その2人のミュージシャンはその曲を共作した。","source":"Marx Brothers"},{"word":"primary","general":"①主要な、第一の（形容詞）②予備選挙（名詞、主にアメリカ）","example":"He's leading in the polls ahead of the primary.","example_ja":"彼は予備選挙を前に世論調査でリードしている。","source":"Marx Brothers"},{"word":"heat up","general":"（状況が）激化する、盛り上がる","example":"The competition really heated up in the final round.","example_ja":"その競争は最終ラウンドで本当に激化した。","source":"Marx Brothers"},{"word":"triumphant","general":"勝利の、意気揚々とした","example":"The team returned home in a triumphant mood.","example_ja":"そのチームは意気揚々とした様子で帰国した。","source":"Marx Brothers"},{"word":"procession","general":"行進","example":"A long procession followed the parade route.","example_ja":"長い行進がパレードのルートに沿って続いた。","source":"Marx Brothers"},{"word":"hunter","general":"狩人","example":"The hunter tracked the deer for hours.","example_ja":"その狩人は何時間もその鹿を追跡した。","source":"Marx Brothers"},{"word":"grateful","general":"感謝している","example":"I'm grateful for everything you've done.","example_ja":"あなたがしてくれたすべてに感謝しています。","source":"Marx Brothers"},{"word":"retire","general":"①引退する②（軍が）撤退する③就寝する（やや古風）","example":"He plans to retire at 65.","example_ja":"彼は65歳で引退する予定だ。","source":"Marx Brothers"},{"word":"lose sight of","general":"〜を見失う","example":"Don't lose sight of your original goal.","example_ja":"本来の目標を見失わないように。","source":"Marx Brothers"},{"word":"restore","general":"①修復する②回復させる、返還する","example":"Workers are restoring the old church.","example_ja":"作業員たちはその古い教会を修復している。","source":"Marx Brothers"},{"word":"benefit","general":"①利益（名詞）②慈善の（形容詞、例：benefit concert）③恩恵を受ける（動詞）","example":"Everyone will benefit from the new policy.","example_ja":"誰もがその新しい政策から恩恵を受けるだろう。","source":"Marx Brothers"},{"word":"whistle","general":"①口笛（名詞）②口笛を吹く（動詞）","example":"He walked down the street, whistling a tune.","example_ja":"彼は口笛で曲を吹きながら通りを歩いた。","source":"Marx Brothers"},{"word":"applause","general":"拍手","example":"The speech was met with loud applause.","example_ja":"そのスピーチは大きな拍手で迎えられた。","source":"Marx Brothers"},{"word":"disclose","general":"公表する、明らかにする","example":"The company refused to disclose its profits.","example_ja":"その会社は利益を公表することを拒んだ。","source":"Ebola Outbreak"},{"word":"grief","general":"悲しみ、悲嘆","example":"It takes time to recover from grief.","example_ja":"悲しみから立ち直るには時間がかかる。","source":"Ebola Outbreak"},{"word":"epidemic","general":"（感染症の）流行","example":"The city declared a flu epidemic last winter.","example_ja":"その市は昨冬、インフルエンザの流行を宣言した。","source":"Ebola Outbreak"},{"word":"outbreak","general":"（病気などの）発生","example":"Health officials are investigating the outbreak.","example_ja":"保健当局はその発生について調査している。","source":"Ebola Outbreak"},{"word":"incident manager","general":"緊急対応責任者","example":"The incident manager coordinated the emergency response.","example_ja":"緊急対応責任者が緊急対応を統括した。","source":"Ebola Outbreak"},{"word":"implement","general":"①実行する、実施する（動詞）②道具（名詞）","example":"The school will implement a new grading system.","example_ja":"その学校は新しい採点システムを実施する予定だ。","source":"Ebola Outbreak"},{"word":"in-depth","general":"徹底的な、詳細な","example":"The magazine ran an in-depth interview with the director.","example_ja":"その雑誌はその監督への詳細なインタビューを掲載した。","source":"Ebola Outbreak"},{"word":"contact","general":"①連絡、接触（名詞）②接触者（感染症の、名詞）③連絡を取る（動詞）","example":"Health workers traced everyone the patient had contact with.","example_ja":"保健員はその患者が接触したすべての人をたどった。" located downstream from the dam.","example_ja":"その工場はそのダムの下流に位置している。","source":"Ebola Outbreak"},{"word":"panic","general":"①パニック、恐慌（名詞）②パニックになる（動詞）","example":"There was widespread panic when the alarm went off.","example_ja":"警報が鳴ったとき、広範囲にパニックが広がった。","source":"Ebola Outbreak"},{"word":"case load","general":"症例数","example":"Doctors are struggling with a heavy case load.","example_ja":"医師たちは多い症例数に苦労している。","source":"Ebola Outbreak"},{"word":"sicken","general":"病気になる、うんざりさせる","example":"Hundreds of workers were sickened by the chemical leak.","example_ja":"何百人もの労働者がその化学物質の漏出で病気になった。","source":"Ebola Outbreak"},{"word":"seek treatment","general":"治療を求める","example":"Many patients don't seek treatment until it's too late.","example_ja":"多くの患者は手遅れになるまで治療を求めない。","source":"Ebola Outbreak"},{"word":"catch up","general":"追いつく","example":"Hospitals are struggling to catch up with demand.","example_ja":"病院は需要に追いつこうと苦労している。","source":"Ebola Outbreak"},{"word":"census","general":"（動植物の）個体数調査、国勢調査","example":"The census showed the town's population had grown.","example_ja":"国勢調査はその町の人口が増えたことを示した。","source":"Catfish Cancer"},{"word":"startle","general":"驚かせる","example":"A loud noise startled the cat.","example_ja":"大きな音がその猫を驚かせた。","source":"Catfish Cancer"},{"word":"blotch","general":"（皮膚などの）斑点、染み","example":"He noticed a red blotch on his arm.","example_ja":"彼は自分の腕に赤い斑点があるのに気づいた。","source":"Catfish Cancer"},{"word":"melanoma","general":"メラノーマ、悪性黒色腫","example":"Doctors recommend checking your skin regularly for signs of melanoma.","example_ja":"医師はメラノーマの兆候がないか定期的に皮膚を確認するよう勧めている。","source":"Catfish Cancer"},{"word":"leech","general":"①（液体などが）染み出す、しみ込む（動詞）②ヒル（名詞、血を吸う生物）③人にたかる人（比喩、名詞）","example":"Chemicals from the factory leeched into the river.","example_ja":"その工場からの化学物質が川に染み出した。","source":"Catfish Cancer"},{"word":"pollutant","general":"汚染物質","example":"Cars release pollutants into the air.","example_ja":"自動車は大気中に汚染物質を排出する。","source":"Catfish Cancer"},{"word":"genome sequence","general":"ゲノム配列","example":"Scientists mapped the genome sequence of the virus.","example_ja":"科学者たちはそのウイルスのゲノム配列を解析した。","source":"Catfish Cancer"},{"word":"erupt","general":"①噴出する②（怒りなどが）爆発する","example":"The volcano could erupt at any time.","example_ja":"その火山はいつでも噴火しうる。","source":"Catfish Cancer"},{"word":"go awry","general":"おかしくなる、うまくいかなくなる","example":"Their plans went awry when it started to rain.","example_ja":"雨が降り始めたとき、彼らの計画はおかしくなった。","source":"Catfish Cancer"},{"word":"host","general":"①主人、ホスト（名詞）②宿主（生物学、名詞）③司会者（名詞）","example":"The mosquito needs a host to survive.","example_ja":"その蚊は生き延びるために宿主を必要とする。","source":"Catfish Cancer"},{"word":"clone","general":"①クローン（名詞）②複製する（動詞）","example":"Scientists successfully cloned the sheep in 1996.","example_ja":"科学者たちは1996年にその羊のクローン作成に成功した。","source":"Catfish Cancer"},{"word":"infectious agent","general":"感染性病原体","example":"The infectious agent spreads through contaminated water.","example_ja":"その感染性病原体は汚染された水を通じて広がる。","source":"Catfish Cancer"},{"word":"aquatic environment","general":"水中環境","example":"Pollution has damaged the local aquatic environment.","example_ja":"汚染がその地域の水中環境に損害を与えた。","source":"Catfish Cancer"},{"word":"transmissible","general":"感染性の、伝染しうる","example":"The disease is highly transmissible between animals.","example_ja":"その病気は動物間で非常に感染しやすい。","source":"Catfish Cancer"},{"word":"mollusk","general":"軟体動物","example":"Clams and oysters are types of mollusks.","example_ja":"ハマグリやカキは軟体動物の一種だ。","source":"Catfish Cancer"},{"word":"aggregate","general":"①集まる（動詞）②合計の（形容詞）③集合体（名詞）","example":"Fish often aggregate near warm water outlets.","example_ja":"魚はしばしば温水の排出口の近くに集まる。","source":"Catfish Cancer"},{"word":"spine","general":"①背骨②とげ③（本の）背表紙","example":"A porcupine's spines protect it from predators.","example_ja":"ヤマアラシのとげは捕食者から身を守る。","source":"Catfish Cancer"},{"word":"avenue","general":"①大通り②（比喩的に）道、手段、経路","example":"The team explored every avenue to solve the problem.","example_ja":"そのチームはその問題を解決するためにあらゆる手段を探った iniseries","general":"ミニシリーズ","example":"The book was turned into a four-part miniseries.","example_ja":"その本は4部構成のミニシリーズになった。","source":"The Odyssey"},{"word":"keep someone engaged","general":"（人の）興味を引きつけ続ける","example":"Good teachers know how to keep students engaged.","example_ja":"優れた教師は生徒の興味を引きつけ続ける方法を知っている。","source":"The Odyssey"},{"word":"dated","general":"時代遅れの、古臭い","example":"The special effects in that film look pretty dated now.","example_ja":"その映画の特殊効果は今見るとかなり古臭く見える。","source":"The Odyssey"},{"word":"gratitude","general":"感謝","example":"She expressed her gratitude to everyone who helped.","example_ja":"彼女は助けてくれたすべての人に感謝の意を表した。","source":"The Odyssey"},{"word":"on behalf of","general":"〜を代表して","example":"He accepted the award on behalf of the whole team.","example_ja":"彼はチーム全体を代表してその賞を受け取った。","source":"The Odyssey"},{"word":"mortal","general":"①人間、死すべき存在（名詞）②死すべき運命の、致命的な（形容詞）","example":"In the myth, a god falls in love with a mortal.","example_ja":"その神話では、神が人間に恋をする。","source":"The Odyssey"},{"word":"hospitality","general":"もてなし、歓待","example":"We were treated with great hospitality during our visit.","example_ja":"私たちは訪問中、大変な歓待を受けた。","source":"The Odyssey"},{"word":"equal","general":"①対等な者（名詞）②等しい（形容詞）③匹敵する（動詞）","example":"The law treats every citizen as an equal.","example_ja":"その法律はすべての市民を対等な者として扱う。","source":"The Odyssey"},{"word":"in awe","general":"畏敬の念を抱いて、圧倒されて","example":"The tourists stood in awe of the ancient temple.","example_ja":"観光客たちはその古代の神殿に圧倒されて立ち尽くした。","source":"The Odyssey"},{"word":"cheesy","general":"安っぽい、ベタな（チーズのように『くさい』演出、という俗語表現）","example":"The dialogue in that old movie is a bit cheesy.","example_ja":"その古い映画のセリフは少し安っぽい。","source":"The Odyssey"},{"word":"toolbox","general":"道具箱","example":"Every teacher needs a good toolbox of strategies.","example_ja":"どの教師も戦略の充実した道具箱が必要だ。","source":"The Odyssey"},{"word":"multilingual learner","general":"複数言語を学ぶ生徒","example":"The class includes several multilingual learners.","example_ja":"そのクラスに ja":"そのインタビューは次の日曜日に放送される。","source":"My Unsung Hero"},{"word":"reach out to","general":"〜に連絡を取る","example":"She decided to reach out to an old friend.","example_ja":"彼女は昔の友人に連絡を取ることにした。","source":"My Unsung Hero"},{"word":"voice memo","general":"ボイスメモ","example":"He recorded a voice memo to remember the idea.","example_ja":"彼はそのアイデアを覚えておくためにボイスメモを録音した。","source":"My Unsung Hero"},{"word":"podcast","general":"ポッドキャスト","example":"I listen to a history podcast on my commute.","example_ja":"私は通勤中に歴史のポッドキャストを聞いている。","source":"My Unsung Hero"},{"word":"big whoop","general":"たいしたことじゃない（皮肉っぽく軽く言う口語表現）","example":"So I made a mistake, big whoop.","example_ja":"まあ、私はミスをしたけど、それがどうしたって感じ。","source":"My Unsung Hero"},{"word":"get up there","general":"（人前に）立つ、登壇する","example":"I was too nervous to get up there and speak.","example_ja":"私は緊張しすぎて人前に立って話すことができなかった。","source":"My Unsung Hero"},{"word":"one-on-one","general":"一対一で","example":"The teacher offered one-on-one help after class.","example_ja":"その教師は放課後に一対一の手助けを提供した。","source":"My Unsung Hero"},{"word":"lasting","general":"長く続く、永続的な","example":"The trip left a lasting memory.","example_ja":"その旅行は長く残る思い出になった。","source":"My Unsung Hero"},{"word":"make a point to do","general":"（意識して）必ず〜するようにする","example":"I make a point to call my parents every Sunday.","example_ja":"私は毎週日曜日、必ず両親に電話するようにしている。","source":"Idioms & Set Phrases"},{"word":"open up to","general":"〜に心を開く","example":"It took a while for her to open up to her new coworkers.","example_ja":"彼女が新しい同僚に心を開くまでには時間がかかった。","source":"Idioms & Set Phrases"},{"word":"find oneself doing","general":"気づけば〜している","example":"He found himself agreeing with her, even though he'd planned to argue.","example_ja":"反論するつもりだったのに、彼は気づけば彼女に同意していた。","source":"Idioms & Set Phrases"},{"word":"have got to","general":"〜しなければならない（口語）。got to と短縮して発音されることも多い","example":"We've got to leave now or we'll miss the train.","example_ja":"今すぐ出発しなければ、電車に乗り遅れてしまう。","source":"Idioms & Set Phrases"},{"word":"if you will","general":"いわば、言うなれば（相手に『こう言ってもよければ』と断る丁寧な言い回しから）","example":"It's a kind of modern fairy tale, if you will.","example_ja":"それは、いわば現代のおとぎ話のようなものだ。","source":"Idioms & Set Phrases"},{"word":"sort of","general":"なんというか、ある意味（断定を避けてぼかす口語表現）","example":"I sort of understand what you mean.","example_ja":"あなたの言いたいこと、なんとなく分かります。","source":"Idioms & Set Phrases"},{"word":"have a moment","general":"（一時的に）注目を集める、話題になる","example":"That song is really having a moment right now.","example_ja":"あの曲は今まさに話題になっている。","source":"Idioms & Set Phrases"},{"word":"on record","general":"記録が残っている中で、史上","example":"This was the hottest summer on record.","example_ja":"これは記録に残る中で最も暑い夏だった。","source":"Idioms & Set Phrases"},{"word":"that's not the case","general":"そうではない、実情はそれとは違う","example":"People assume the job is easy, but that's not the case.","example_ja":"その仕事は簡単だと人は思うが、実際はそうではない。","source":"Idioms & Set Phrases"},{"word":"a life of its own","general":"それ自体の生命・独立した存在。もともとの持ち主の意図を離れて『独り歩きする』様子を表す","example":"The rumor took on a life of its own online.","example_ja":"そのうわさはネット上で独り歩きし始めた。","source":"Idioms & Set Phrases"},{"word":"what S calls X","general":"Sがいわゆる X と呼ぶもの（S・Xは文法上の主語・目的語を表す記号）","example":"She practices what psychologists call active listening.","example_ja":"彼女は心理学者がいわゆる『傾聴』と呼ぶものを実践している。","source":"Idioms & Set Phrases"},{"word":"there is no way","general":"〜するなんてあり得ない。後ろにthat節が続くこともある（強い否定を表す口語表現）","example":"There is no way I'm eating that.","example_ja":"それを食べるなんて絶対にあり得ない。","source":"Idioms & Set Phrases"}];
const STORAGE_KEY = 'npr-vocab-flashcards-progress-v4';
WORDS.forEach((w, i) => { w.idx = i; });

const BOX_INTERVALS_DAYS = [1, 3, 7, 14, 30];
const MAX_BOX = 5;

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, days){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

let progress = {};
try{
  progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
}catch(e){ progress = {}; }

let currentSource = 'ALL';
let reviewMode = false;
let reviewFilter = 'due';
let reviewIndex = 0;
let reviewConfirmed = new Set();
let deck = [];
let originalOrder = [];
let history = [];
let flipped = false;
let loopingWord = null;

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }catch(e){}
}

function getState(idx){
  return progress[idx] || { box: 0, nextReview: todayStr() };
}

function sourceFilteredWords(){
  if(currentSource === 'ALL') return WORDS;
  return WORDS.filter(w => w.source === currentSource);
}

function isDue(idx){
  const st = getState(idx);
  return st.box === 0 || st.nextReview <= todayStr();
}

// Review mode: loads ALL matching learned words into the deck at once
// (like DUO 3.0), so they can be swiped through with 次へ／習得済み ✓
// just like normal study — no need to click each word individually.
// reviewFilter 'due' = only words whose scheduled date has arrived.
// reviewFilter 'all' = every word ever marked 習得済み, regardless of date
// (use this to review everything you just learned today in one session).
function buildDeck(){
  const pool = sourceFilteredWords();
  if(reviewMode){
    const learned = pool.filter(w => getState(w.idx).box >= 1);
    let filtered;
    if(reviewFilter === 'all'){
      filtered = learned;
    } else if(reviewFilter === 'due'){
      filtered = learned.filter(w => isDue(w.idx));
    } else {
      const wantBox = parseInt(reviewFilter.slice(1), 10);
      filtered = learned.filter(w => getState(w.idx).box === wantBox);
    }
    filtered.sort((a, b) => getState(a.idx).nextReview.localeCompare(getState(b.idx).nextReview));
    deck = filtered;
  } else {
    deck = pool.filter(w => isDue(w.idx));
  }
  originalOrder = deck.slice();
  history = [];
}

function renderSourceFilter(){
  const sel = document.getElementById('sourceFilter');
  const sources = Array.from(new Set(WORDS.map(w => w.source)));
  sel.innerHTML = '';
  const optAll = document.createElement('option');
  optAll.value = 'ALL';
  optAll.textContent = 'すべての記事（' + WORDS.length + '語）';
  sel.appendChild(optAll);
  sources.forEach(s => {
    const count = WORDS.filter(w => w.source === s).length;
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s + '（' + count + '語）';
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    currentSource = sel.value;
    buildDeck();
    render();
  });
}

function speakOnce(word, onEnd){
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.onend = onEnd;
  utter.onerror = onEnd;
  window.speechSynthesis.speak(utter);
}

function startLoop(word){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  loopingWord = word;
  const btn = document.querySelector('.speak-btn');
  if(btn) btn.classList.add('looping');

  const playNext = () => {
    if(loopingWord !== word) return;
    speakOnce(word, () => {
      if(loopingWord !== word) return;
      setTimeout(() => {
        if(loopingWord === word) playNext();
      }, 500);
    });
  };
  playNext();
}

function stopLoop(){
  loopingWord = null;
  window.speechSynthesis.cancel();
  const btn = document.querySelector('.speak-btn');
  if(btn) btn.classList.remove('looping');
}

function updateProgress(){
  const total = WORDS.length;
  const learnedAtLeastOnce = WORDS.filter(w => getState(w.idx).box >= 1).length;
  const masteredCount = WORDS.filter(w => getState(w.idx).box >= MAX_BOX).length;
  const pool = sourceFilteredWords();
  const dueCount = pool.filter(w => isDue(w.idx)).length;

  document.getElementById('progressLabel').textContent = `${masteredCount} / ${total} 定着`;
  document.getElementById('progressFill').style.width = `${(learnedAtLeastOnce/total)*100}%`;
  document.getElementById('dueLabel').textContent = reviewMode
    ? `復習対象: ${deck.length}語`
    : `本日の新規・復習: ${dueCount}語`;
  document.getElementById('totalLabel').textContent = `全カード: ${total}語`;

  const remaining = deck.length;
  document.getElementById('remainingLabel').textContent = remaining > 0 ? `残り ${remaining} 語` : '';

  const positionLabel = document.getElementById('positionLabel');
  const prevBtn = document.getElementById('prevBtn');
  const restartBtn = document.getElementById('restartBtn');
  const curForLabel = reviewMode ? deck[reviewIndex] : deck[0];
  if(remaining > 0 && originalOrder.length > 0 && curForLabel){
    const posIdx = originalOrder.findIndex(w => w.idx === curForLabel.idx);
    const displayIdx = posIdx >= 0 ? posIdx + 1 : '?';
    positionLabel.textContent = `${displayIdx} / ${originalOrder.length} 枚目`;
  } else {
    positionLabel.textContent = '';
  }
  if(prevBtn) prevBtn.disabled = history.length === 0;
  if(restartBtn) restartBtn.disabled = originalOrder.length === 0;
}

function speakerIcon(){
  return `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
}

function boxLabel(idx){
  const st = getState(idx);
  if(st.box >= MAX_BOX) return '定着済み';
  if(st.box === 0) return '新規';
  return `Box ${st.box}`;
}

// ---- Auto-fit headword to a single line (never wraps mid-word) ----
function fitWordFont(){
  const wordEl = document.querySelector('#currentCard .word');
  const row = document.querySelector('#currentCard .word-row');
  if(!wordEl || !row) return;
  const speakBtn = row.querySelector('.speak-btn');
  const reserve = speakBtn ? speakBtn.offsetWidth + 18 : 0;
  const available = row.clientWidth - reserve - 4;
  let size = 30;
  const minSize = 14;
  wordEl.style.whiteSpace = 'nowrap';
  wordEl.style.display = 'inline-block';
  wordEl.style.fontSize = size + 'px';
  while(wordEl.scrollWidth > available && size > minSize){
    size -= 1;
    wordEl.style.fontSize = size + 'px';
  }
}

function frontHTML(current){
  const st = getState(current.idx);
  const isMastered = st.box >= 1;
  return `
    <span class="source-tag">${current.source}</span>
    <div class="box-badge">${boxLabel(current.idx)}</div>
    ${!reviewMode ? `
    <label class="master-checkbox-row">
      <input type="checkbox" id="masterCb" ${isMastered ? 'checked' : ''}>
      <span>マスター</span>
    </label>` : ''}
    <div class="eyebrow">タップして意味を見る</div>
    <div class="word-row">
      <div class="word">${current.word}</div>
      <button class="speak-btn" id="speakBtn" title="発音を聞く">${speakerIcon()}</button>
    </div>
    <div class="tap-hint">単語をタップ / クリック</div>
  `;
}

function backHTML(current){
  return `
    <div class="back-scroll">
      <div class="hint-block">
        <div class="hint-label">意味</div>
        <div class="hint-text">${current.general}</div>
        <div class="general-block">
          <div class="general-label">EXAMPLE（タップで読み上げ）</div>
          <div class="general-text example-en" id="exampleSentence">${current.example}</div>
          <div class="example-ja-text">${current.example_ja}</div>
        </div>
      </div>
      <div class="back-tap-hint tap-hint">タップで単語に戻る</div>
    </div>
  `;
}

function attachSpeakHandler(current){
  const speakBtn = document.getElementById('speakBtn');
  if(speakBtn){
    speakBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(loopingWord === current.word){
        stopLoop();
      } else {
        startLoop(current.word);
      }
    });
  }
  const exampleEl = document.getElementById('exampleSentence');
  if(exampleEl){
    exampleEl.addEventListener('click', (e) => {
      e.stopPropagation();
      speakOnce(current.example, () => {});
    });
  }
  const masterCb = document.getElementById('masterCb');
  if(masterCb){
    masterCb.addEventListener('click', (e) => e.stopPropagation());
    masterCb.addEventListener('change', (e) => {
      if(reviewMode) return;
      nextCard(e.target.checked);
    });
  }
}

function currentCard(){
  if(reviewMode){
    if(deck.length === 0) return null;
    if(reviewIndex >= deck.length) reviewIndex = 0;
    return deck[reviewIndex];
  }
  return deck[0] || null;
}

function render(){
  stopLoop();
  const stage = document.getElementById('stage');
  const controls = document.getElementById('controls');
  const skipBtn = document.getElementById('skipBtn');
  const masterBtn = document.getElementById('masterBtn');
  const controlsSecondary = document.getElementById('controlsSecondary');

  // Relabel the two main buttons depending on mode.
  // Review mode = pure browsing (← 前へ / 次へ →) plus a separate,
  // explicit confirm action. Simply moving between cards NEVER changes
  // a word's box or schedule — only pressing 復習完了 does.
  if(reviewMode){
    skipBtn.textContent = '次へ（スキップ）';
    masterBtn.textContent = '✓ 覚えている（復習完了）';
    masterBtn.style.display = '';
    controlsSecondary.style.display = 'none';
  } else {
    skipBtn.textContent = '次へ（まだ）';
    masterBtn.style.display = 'none';
  }

  const current = currentCard();

  if(!current){
    stage.innerHTML = `
      <div class="empty-state">
        <div class="word">${reviewMode ? '復習する単語がありません' : 'よくできました'}</div>
        <p>${reviewMode
          ? (reviewFilter === 'due'
              ? '今日、復習日を迎えている単語は今のところありません。<br>上のプルダウンで「すべて」に切り替えると、日付に関係なくこれまでマスターした単語をまとめて確認できます。'
              : reviewFilter === 'all'
                ? 'まだ一度も「マスター」にチェックを入れた単語がありません。<br>通常モードで単語を学習すると、ここに復習対象として表示されます。'
                : 'このサイクルに該当する単語は今のところありません。')
          : '本日の新規学習・復習はこれで終わりです。<br>「🔁 これまでの単語を復習する」で、今までマスターした単語をまとめて確認できます。'}</p>
      </div>
    `;
    controls.style.display = 'none';
    controlsSecondary.style.display = 'none';
    updateProgress();
    return;
  }

  controls.style.display = 'flex';
  if(!reviewMode) controlsSecondary.style.display = 'flex';
  flipped = false;

  const nextPeek = reviewMode ? null : deck[1];

  stage.innerHTML = `
    ${nextPeek ? `<div class="card behind"></div>` : ''}
    <div class="card front" id="currentCard">
      ${frontHTML(current)}
    </div>
  `;

  document.getElementById('currentCard').addEventListener('click', (e) => {
    if(e.target.closest('.speak-btn')) return;
    flipCard();
  });

  attachSpeakHandler(current);
  requestAnimationFrame(fitWordFont);

  updateProgress();
}

function flipCard(){
  if(flipped) {
    showFront();
    return;
  }
  stopLoop();
  const card = document.getElementById('currentCard');
  const current = currentCard();
  if(!current) return;
  flipped = true;

  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.add('flipped-card');
    card.innerHTML = backHTML(current);
    attachSpeakHandler(current);
    card.classList.remove('flipping');
  }, 220);
}

function showFront(){
  const card = document.getElementById('currentCard');
  const current = currentCard();
  if(!current) return;
  flipped = false;
  card.classList.add('flipping');
  setTimeout(() => {
    card.classList.remove('flipped-card');
    card.innerHTML = frontHTML(current);
    attachSpeakHandler(current);
    requestAnimationFrame(fitWordFont);
    card.classList.remove('flipping');
  }, 220);
}

// ---------- Normal (first-time learning) mode ----------
// Grading here intentionally shrinks the live queue as you go, since the
// point of this mode is to whittle down to only the words you don't know yet.
function nextCard(gotIt){
  const card = document.getElementById('currentCard');
  if(!card){ return; }

  const current = deck[0];
  const prevState = Object.assign({}, getState(current.idx));

  history.push({
    idx: current.idx,
    gotIt: gotIt,
    prevState: prevState
  });

  const st = getState(current.idx);
  if(gotIt){
    st.box = Math.min(MAX_BOX, st.box + 1);
    st.nextReview = addDays(todayStr(), BOX_INTERVALS_DAYS[st.box - 1]);
  } else {
    st.box = 0;
    st.nextReview = todayStr();
  }
  progress[current.idx] = st;
  saveProgress();

  card.classList.add('exit-left');

  setTimeout(() => {
    deck.shift();
    render();
  }, 260);
}

function prevCard(){
  if(history.length === 0) return;
  const last = history.pop();

  progress[last.idx] = last.prevState;
  saveProgress();

  const w = WORDS[last.idx];
  if(w) deck.unshift(w);

  render();
}

// ---------- Review mode ----------
// Browsing (←前へ / 次へ→) NEVER touches box/schedule data — it is pure
// navigation over a fixed list that loops around. Only the explicit
// 復習完了 button advances a word's box, and the word stays in the list
// so you can keep browsing back to it in the same session.
function reviewNext(){
  if(deck.length === 0) return;
  reviewIndex = (reviewIndex + 1) % deck.length;
  render();
}

function reviewPrev(){
  if(deck.length === 0) return;
  reviewIndex = (reviewIndex - 1 + deck.length) % deck.length;
  render();
}

function confirmReview(){
  const current = currentCard();
  if(!current) return;
  if(reviewConfirmed.has(current.idx)) return;
  reviewConfirmed.add(current.idx);
  const st = getState(current.idx);
  st.box = Math.min(MAX_BOX, st.box + 1);
  st.nextReview = addDays(todayStr(), BOX_INTERVALS_DAYS[st.box - 1]);
  progress[current.idx] = st;
  saveProgress();
  const card = document.getElementById('currentCard');
  if(card) card.classList.add('confirmed-flash');
  setTimeout(() => {
    const pos = deck.findIndex(w => w.idx === current.idx);
    if(pos !== -1) deck.splice(pos, 1);
    if(reviewIndex >= deck.length) reviewIndex = 0;
    reviewConfirmed.delete(current.idx);
    render();
  }, 260);
}

function restartDeck(){
  buildDeck();
  render();
}

document.getElementById('skipBtn').addEventListener('click', () => {
  if(reviewMode) reviewNext(); else nextCard(false);
});
document.getElementById('masterBtn').addEventListener('click', () => {
  if(reviewMode) confirmReview(); else nextCard(true);
});
document.getElementById('prevBtn').addEventListener('click', () => prevCard());
document.getElementById('restartBtn').addEventListener('click', () => restartDeck());

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('学習の記録（復習スケジュール）をすべてリセットしますか？')){
    progress = {};
    saveProgress();
    buildDeck();
    render();
  }
});

document.getElementById('reviewToggleBtn').addEventListener('click', () => {
  reviewMode = !reviewMode;
  reviewIndex = 0;
  reviewConfirmed.clear();
  const btn = document.getElementById('reviewToggleBtn');
  const banner = document.getElementById('reviewBanner');
  btn.textContent = reviewMode ? '↩ 学習モードに戻る' : '🔁 これまでの単語を復習する';
  btn.classList.toggle('btn-on', reviewMode);
  banner.classList.toggle('show', reviewMode);
  buildDeck();
  render();
});

document.getElementById('reviewFilterSelect').addEventListener('change', (e) => {
  reviewFilter = e.target.value;
  reviewIndex = 0;
  if(reviewMode){
    buildDeck();
    render();
  }
});

document.addEventListener('keydown', (e) => {
  if(e.code === 'Space'){
    e.preventDefault();
    flipCard();
  } else if(e.code === 'ArrowRight'){
    if(reviewMode) reviewNext(); else nextCard(false);
  } else if(e.code === 'ArrowLeft'){
    if(reviewMode) reviewPrev(); else prevCard();
  } else if(e.code === 'Enter'){
    if(reviewMode) confirmReview(); else nextCard(true);
  }
});

window.addEventListener('resize', () => { if(!flipped) fitWordFont(); });

renderSourceFilter();
buildDeck();
render();
</script>

</body>
</html>
