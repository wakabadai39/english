<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great Gatsby 語彙カード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root{
    --bg: #e9e9e6;
    --bg-deep: #dcdcd8;
    --ink: #2b2b2b;
    --ink-soft: #6b6b68;
    --line: #c7c7c2;
    --card: #f4f3ef;
    --accent: #b3422e;
    --accent-soft: #d98f7e;
    --done: #7c8a6e;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(0,0,0,0.02) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(0,0,0,0.02) 0%, transparent 40%);
    color: var(--ink);
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 16px 60px;
  }

  .topbar{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 6px;
  }

  .title{
    font-family:'Spectral', serif;
    font-weight:600;
    font-size: 1.5rem;
    letter-spacing: 0.01em;
  }
  .title .accent{ color: var(--accent); font-style: italic; }

  .topbar-right{
    display:flex;
    align-items:center;
    gap: 10px;
  }

  .pos-label{
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }

  .lang-toggle{
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    cursor:pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .lang-toggle:hover{ border-color: var(--ink-soft); }

  .progress-label{
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    text-align:right;
  }

  .progress-track{
    width:100%;
    max-width:480px;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    margin: 10px 0 28px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .stage{
    width:100%;
    max-width:480px;
    position:relative;
    height: 340px;
    perspective: 1200px;
  }

  .card{
    position:absolute;
    inset:0;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 28px -16px rgba(0,0,0,0.18);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding: 28px 26px;
    cursor:pointer;
    transition: transform 0.45s cubic-bezier(.22,.61,.36,1), opacity 0.3s ease, box-shadow 0.3s;
    backface-visibility:hidden;
    user-select:none;
  }

  .card.behind{
    transform: scale(0.96) translateY(10px);
    box-shadow: none;
    z-index: 0;
    opacity: 0.6;
  }

  .card.front{ z-index: 1; }

  .card.flipping{
    transform: rotateY(90deg) scale(0.96);
    opacity: 0;
  }

  .card.exit-left{
    transform: translateX(-130%) rotate(-8deg);
    opacity: 0;
  }

  .card.exit-right{
    transform: translateX(130%) rotate(8deg);
    opacity: 0;
  }

  .card.shake{
    animation: shake 0.3s ease;
  }

  @keyframes shake{
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .eyebrow{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }

  .word{
    font-family:'Spectral', serif;
    font-weight: 600;
    font-size: 2.4rem;
    line-height: 1.15;
    margin: 0 0 18px;
    word-break: break-word;
  }

  .speak-btn{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
    flex-shrink:0;
  }
  .speak-btn:hover{ border-color: var(--accent-soft); }
  .speak-btn:active{ transform: scale(0.92); }
  .speak-btn svg{ width:20px; height:20px; fill: var(--accent); }
  .speak-btn.speaking svg{ animation: pulse 0.6s ease infinite alternate; }
  .speak-btn.looping{ background: var(--accent); border-color: var(--accent); }
  .speak-btn.looping svg{ fill: #fff; animation: pulse 0.6s ease infinite alternate; }
  @keyframes pulse{ from{ opacity:1; } to{ opacity:0.45; } }

  .word-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .tap-hint{
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 16px;
  }

  .hint-block{
    width:100%;
  }
  .hint-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .hint-text{
    font-size: 1.15rem;
    font-weight: 500;
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .example-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .example-text{
    font-family:'Spectral', serif;
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--ink);
  }
  .example-text.clickable{
    cursor:pointer;
    border-radius: 6px;
    padding: 4px 6px;
    margin: -4px -6px;
    transition: background 0.2s, color 0.2s;
  }
  .example-text.clickable:hover{
    background: var(--bg-deep);
  }
  .example-text.clickable.looping{
    background: var(--accent);
    color: #fff;
    animation: pulse 0.6s ease infinite alternate;
  }
  .example-hint{
    text-transform: none;
    letter-spacing: normal;
    font-size: 0.7rem;
    opacity: 0.7;
  }

  .controls{
    width:100%;
    max-width:480px;
    display:flex;
    gap: 8px;
    margin-top: 26px;
  }

  .btn{
    flex:1;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 12px 8px;
    border-radius: 10px;
    cursor:pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:active{ transform: scale(0.98); }
  .btn.skip:hover{ border-color: var(--ink-soft); }

  .btn.nav{
    background: transparent;
    color: var(--ink-soft);
    font-size: 0.8rem;
    flex: 0.8;
  }
  .btn.nav:hover{ border-color: var(--accent-soft); color: var(--accent); }
  .btn.nav:disabled{
    opacity: 0.35;
    cursor: default;
  }
  .btn.nav:disabled:hover{ border-color: var(--line); color: var(--ink-soft); }

  .btn.master.is-mastered{
    background: var(--card);
    color: var(--done);
    border-color: var(--done);
  }
  .btn.master.is-mastered:hover{ background: var(--card); }

  .btn.master{
    background: var(--done);
    color: #fff;
    border-color: var(--done);
  }
  .btn.master:hover{ background: #6c7a5e; }
  .btn.master:disabled,
  .btn.skip:disabled{
    opacity: 0.4;
    cursor: default;
  }
  .btn.master:disabled:hover{ background: var(--done); }
  .btn.skip:disabled:hover{ border-color: var(--line); }

  .empty-state{
    width:100%;
    max-width:480px;
    height: 340px;
    border-radius:14px;
    border: 1px dashed var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 30px;
    gap: 14px;
  }
  .empty-state .word{ font-size: 1.6rem; }
  .empty-state p{
    color: var(--ink-soft);
    font-size: 0.92rem;
    line-height: 1.7;
    margin:0;
  }

  .footer-row{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 30px;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  .reset-link{
    color: var(--ink-soft);
    text-decoration: underline;
    text-decoration-color: var(--line);
    cursor:pointer;
    background:none;
    border:none;
    font-family:inherit;
    font-size: inherit;
    padding:0;
  }
  .reset-link:hover{ color: var(--accent); }

  .checkmark-flash{
    position:absolute;
    top: 16px;
    right: 16px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--done);
    opacity:0;
    transition: opacity 0.3s;
  }
  .checkmark-flash.show{ opacity:1; }

  @media (max-width: 380px){
    .word{ font-size: 1.9rem; }
    .stage{ height: 320px; }
  }

  .card.flipped-card{
    padding: 24px 24px;
    overflow-y: auto;
    align-items: stretch;
    text-align: left;
  }

  .back-scroll{
    width:100%;
    overflow-y: auto;
    max-height: 100%;
    padding-right: 4px;
  }

  .general-block{
    background: var(--bg-deep);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 16px;
  }
  .general-label{
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .general-text{
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--ink);
  }

  .example-ja-text{
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .note-block{
    margin-top: 18px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .note-label{
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .note-text{
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--ink);
  }

  .back-tap-hint{
    text-align:center;
    margin-top: 18px;
  }

  /* Mastered list panel */
  .panel-toggle{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:flex-end;
    margin-top: 10px;
  }
  .mastered-panel{
    width:100%;
    max-width:480px;
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    padding: 16px;
    display:none;
  }
  .mastered-panel.open{ display:block; }
  .mastered-panel h3{
    font-family:'Spectral', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0 0 12px;
  }
  .mastered-list{
    list-style:none;
    margin:0;
    padding:0;
    max-height: 280px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap: 6px;
  }
  .mastered-list li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg-deep);
    border-radius: 8px;
    font-size: 0.92rem;
  }
  .mastered-list li .m-word{
    font-family:'Spectral', serif;
    font-weight: 500;
  }
  .restore-btn{
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-size: 0.78rem;
    padding: 6px 10px;
    border-radius: 8px;
    cursor:pointer;
    flex-shrink:0;
    white-space: nowrap;
  }
  .restore-btn:hover{ border-color: var(--accent-soft); color: var(--accent); }
  .mastered-empty{
    color: var(--ink-soft);
    font-size: 0.88rem;
    text-align:center;
    padding: 10px 0;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="title" id="appTitle">Gatsby <span class="accent">語彙カード</span></div>
  <div class="topbar-right">
    <span class="pos-label" id="posLabel">1 / 300</span>
    <button class="lang-toggle" id="langToggleBtn">EN</button>
  </div>
</div>

<div class="progress-track">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>
<div class="progress-label" id="progressLabel" style="text-align:center;margin:4px 0 8px;">0 / 300 習得</div>

<div class="stage" id="stage"></div>

<div class="controls" id="controls">
  <button class="btn nav" id="prevBtn">← 前へ</button>
  <button class="btn skip" id="skipBtn">次へ →</button>
  <button class="btn master" id="masterBtn">習得済み ✓</button>
  <button class="btn nav" id="restartBtn">⟲ 最初</button>
</div>

<div class="footer-row">
  <span id="remainingLabel"></span>
  <button class="reset-link" id="resetBtn">すべてリセット</button>
</div>

<div class="panel-toggle">
  <button class="reset-link" id="masteredToggleBtn">習得済み一覧 ▾</button>
</div>

<div class="mastered-panel" id="masteredPanel">
  <h3 id="masteredHeading">習得済みの単語</h3>
  <ul class="mastered-list" id="masteredList"></ul>
</div>

<script>
const WORDS = [{"word": "mansion", "hint": "大邸宅(ギャツビーの豪邸を指す)", "general": "非常に大きく豪華な家", "example": "Gatsby's mansion was lit up every weekend for his extravagant parties.", "example_ja": "ギャツビーの大邸宅は、週末になるたびに彼の豪華なパーティーのために明かりが灯された。", "note": "a luxurious mansion のように使う。本書では富の象徴として繰り返し登場する。"}, {"word": "extravagant", "hint": "贅沢な、度を超えた", "general": "必要以上にお金や手間をかけている、派手な", "example": "His extravagant parties were the talk of the entire town.", "example_ja": "彼の贅沢なパーティーは、町中の話題になった。", "note": "extravagant lifestyle/party のように使う。"}, {"word": "lavish", "hint": "豪華な、惜しみない", "general": "惜しみなく豪華に、過剰に与える様子の", "example": "The lavish decorations seemed designed to impress everyone who arrived.", "example_ja": "その豪華な装飾は、訪れる者全員に感銘を与えるよう作られているようだった。", "note": "lavish on someone(惜しみなく与える)のように動詞でも使う。"}, {"word": "wealth", "hint": "富、財産", "general": "大量のお金や資産", "example": "His wealth seemed to have no limit, though no one knew where it came from.", "example_ja": "彼の富には限りがないように見えたが、それがどこから来たのか誰も知らなかった。", "note": "形容詞wealthy。great wealth のように使う。"}, {"word": "fortune", "hint": "財産、富", "general": "非常に大きな金額のお金", "example": "He had made a fortune in just a few years, somehow.", "example_ja": "彼はどうにかして、わずか数年で財産を築いていた。", "note": "make a fortune / a small fortune のように使う。"}, {"word": "luxurious", "hint": "豪華な、贅沢な", "general": "非常に高価で快適な性質の", "example": "Every room in the house felt impossibly luxurious.", "example_ja": "その家のどの部屋も、信じられないほど豪華に感じられた。", "note": "a luxurious car/hotel のように使う。"}, {"word": "elegant", "hint": "上品な、優雅な", "general": "美しく、洗練された様子の", "example": "The women at the party wore elegant dresses that shimmered under the lights.", "example_ja": "パーティーの女性たちは、明かりの下できらめく上品なドレスを身につけていた。", "note": "an elegant gown / elegant manners のように使う。"}, {"word": "glamorous", "hint": "魅惑的な、華やかな", "general": "魅力的で刺激的、贅沢な印象を与える性質の", "example": "Everything about Gatsby's world seemed glamorous from the outside.", "example_ja": "ギャツビーの世界は、外から見ると何もかもが華やかに見えた。", "note": "a glamorous lifestyle のように使う。名詞glamour。"}, {"word": "sophisticated", "hint": "洗練された、世慣れた", "general": "経験豊富で、上品で複雑な趣味を持つ", "example": "He tried to sound sophisticated, but his words felt rehearsed.", "example_ja": "彼は洗練されているように聞こえようとしたが、その言葉は練習されたもののように感じられた。", "note": "a sophisticated person/taste のように使う。"}, {"word": "upper class", "hint": "上流階級", "general": "社会的・経済的に最も高い地位にある人々の集団", "example": "He had spent his whole life trying to enter the upper class.", "example_ja": "彼は人生をかけて、上流階級に入ろうとしてきた。", "note": "the upper class / upper-class society のように使う。"}, {"word": "old money", "hint": "古い財産、世襲の富(代々続く家系の財産)", "general": "長い世代にわたって受け継がれてきた富、またそれを持つ人々", "example": "Daisy's family represented old money, while Gatsby's wealth was new and unproven.", "example_ja": "デイジーの家族は世襲の富を象徴していたが、ギャツビーの富は新しく、出自が確かでなかった。", "note": "old money(世襲の富)とnew money(新興の富)の対比は本書の中心的テーマの一つ。"}, {"word": "new money", "hint": "新興の富、成り上がりの財産", "general": "最近になって急に得られた富、またそれを持つ人々(しばしば見下した含みを持つ)", "example": "To people like Tom, Gatsby's new money would never be quite respectable.", "example_ja": "トムのような人々にとって、ギャツビーの新興の富は決して本当の意味で立派なものにはなりえなかった。", "note": "old moneyとの対比で使われる、階級意識を表す重要語句。"}, {"word": "aristocracy", "hint": "貴族階級、上流社会", "general": "高い社会的地位や血統を持つ人々の集団", "example": "They spoke and moved as if born into the aristocracy.", "example_ja": "彼らは、まるで貴族階級に生まれたかのように話し、振る舞った。", "note": "形容詞aristocratic。やや硬い語。"}, {"word": "snob", "hint": "俗物、見下す人", "general": "自分が他人より優れていると思い、それを示す人", "example": "Some of the guests were nothing more than snobs in expensive suits.", "example_ja": "客の中には、高価なスーツを着ただけの俗物にすぎない者たちもいた。", "note": "形容詞snobbish。a snob about ~ のように使う。"}, {"word": "prestige", "hint": "威信、名声", "general": "社会的に高い評価や尊重を受けている状態", "example": "Owning such a house gave him a kind of prestige he had never had before.", "example_ja": "そのような家を所有することは、彼に今までになかった一種の威信を与えた。", "note": "a position of prestige / social prestige のように使う。"}, {"word": "status", "hint": "地位、身分", "general": "社会の中での人の位置づけ", "example": "His social status had changed overnight, but his reputation hadn't caught up.", "example_ja": "彼の社会的地位は一夜にして変わったが、評判はそれに追いついていなかった。", "note": "social status / status symbol のように使う。"}, {"word": "chauffeur", "hint": "運転手(専属の)", "general": "雇われて自動車を運転する人", "example": "A chauffeur waited outside in one of his many cars.", "example_ja": "運転手が、彼の所有する数多くの車のうちの一台で外で待っていた。", "note": "フランス語由来の語。本書では富の象徴として登場する。"}, {"word": "butler", "hint": "執事", "general": "邸宅の使用人を取りまとめる責任者", "example": "The butler announced each guest as they arrived.", "example_ja": "執事は、客が到着するたびにその名を告げた。", "note": "大邸宅における使用人の最上位職を指す。"}, {"word": "servant", "hint": "使用人、召使い", "general": "家庭で雇われ、家事などを行う人", "example": "An army of servants worked through the night to prepare for the party.", "example_ja": "使用人たちの一団が、パーティーの準備のために夜通し働いた。", "note": "household servant のように使う。"}, {"word": "orchestra", "hint": "オーケストラ、楽団", "general": "様々な楽器の演奏者からなる音楽グループ", "example": "A full orchestra played late into the night for the guests.", "example_ja": "客のために、フルオーケストラが夜遅くまで演奏した。", "note": "hire an orchestra のように使う。"}, {"word": "champagne", "hint": "シャンパン", "general": "発泡性の白ワイン、祝祭の象徴", "example": "Glasses of champagne were handed out as soon as guests stepped through the door.", "example_ja": "客がドアをくぐるとすぐに、シャンパングラスが配られた。", "note": "a glass of champagne のように使う。"}, {"word": "cocktail", "hint": "カクテル", "general": "複数のお酒を混ぜて作る飲み物", "example": "Waiters moved through the crowd carrying trays of cocktails.", "example_ja": "ウェイターたちは、カクテルを載せたトレイを持って群衆の中を移動した。", "note": "a cocktail party のように複合語でもよく使われる。"}, {"word": "gossip", "hint": "うわさ、ゴシップ", "general": "他人についての、しばしば真偽不明の話", "example": "Gossip about Gatsby's past spread quickly among the guests.", "example_ja": "ギャツビーの過去についてのうわさは、客たちの間にすぐに広まった。", "note": "spread gossip / gossip about someone のように使う。"}, {"word": "rumor", "hint": "うわさ、噂", "general": "確認されていない情報が広まること", "example": "Rumors about how he made his money were endless.", "example_ja": "彼がどのようにお金を稼いだのかについてのうわさは、絶えなかった。", "note": "a rumor that ~ / sprea ": "speculate about/on ~ の形。名詞speculation。"}, {"word": "impeccable", "hint": "完璧な、欠点のない", "general": "間違いや欠点がまったくない様子の", "example": "His manners were impeccable, almost too perfect to be natural.", "example_ja": "彼の振る舞いは完璧で、自然とは思えないほど見事だった。", "note": "impeccable taste/manners のように使う、やや硬い語。"}, {"word": "polished", "hint": "洗練された、磨かれた", "general": "上品で、欠点なく仕上げられている様子の", "example": "He had a polished way of speaking that made people trust him instantly.", "example_ja": "彼には、人々をすぐに信頼させるような洗練された話し方があった。", "note": "polished manner/performance のように比喩的に使う。"}, {"word": "pretentious", "hint": "見せかけの、もったいぶった", "general": "実際以上に重要や知的に見せようとする様子の", "example": "Some thought his enormous library was pretentious, since the books had never been read.", "example_ja": "その膨大な蔵書は一度も読まれたことがなかったため、もったいぶったものだと考える人もいた。", "note": "pretentious display のように使う。名詞pretense。"}, {"word": "facade", "hint": "(虚飾としての)外見、見せかけ", "general": "建物の正面、または比喩的に「真実を隠す表面的な様子」", "example": "Behind the glittering facade of the parties, his life felt strangely empty.", "example_ja": "パーティーのきらびやかな見せかけの裏で、彼の人生は奇妙なほど空虚に感じられた。", "note": "建築用語(正面)から比喩的意味(虚飾)に広がった語。"}, {"word": "illusion", "hint": "幻想、思い違い", "general": "実際とは異なる、誤った印象や信念", "example": "He had built his entire life around the illusion that the past could be repeated.", "example_ja": "彼は、過去を繰り返せるという幻想を中心に、自分の人生全体を築き上げていた。", "note": "under the illusion that ~ / live in an illusion のように使う。"}, {"word": "yearning", "hint": "あこがれ、強い願望", "general": "何かを切実に望む気持ち", "example": "There was a yearning in his voice that he tried hard to hide.", "example_ja": "彼の声には、彼が必死に隠そうとしているあこがれがあった。", "note": "a yearning for ~ のように使う。動詞yearn。"}, {"word": "longing", "hint": "切望、思いこがれること", "general": "何かや誰かを強く欲する気持ち", "example": "His longing for the past shaped every decision he made.", "example_ja": "過去への切望が、彼が下すすべての決断を形作っていた。", "note": "a longing for ~ / a look of longing のように使う。"}, {"word": "nostalgia", "hint": "郷愁、懐かしさ", "general": "過去の出来事や時代を懐かしく思う気持ち", "example": "A wave of nostalgia hit him as he remembered the way things used to be.", "example_ja": "昔の様子を思い出すと、郷愁の波が彼を襲った。", "note": "a sense of nostalgia / nostalgia for ~ のように使う。"}, {"word": "obsession", "hint": "執着、強迫観念", "general": "何かに対する過度で、抑えられない関心", "example": "His obsession with Daisy had never really faded over the years.", "example_ja": "デイジーへの彼の執着は、長年経っても本当には消えていなかった。", "note": "an obsession with ~ のように使う。動詞obsess。"}, {"word": "devotion", "hint": "献身、深い愛情", "general": "誰かや何かに対する強く揺るがない愛情や忠誠", "example": "His devotion to a single idea had cost him everything else.", "example_ja": "一つの考えへの彼の献身は、他のすべてを彼に犠牲にさせた。", "note": "devotion to ~ のように使う。形容詞devoted。"}, {"word": "idealize", "hint": "理想化する", "general": "実際よりも完璧で素晴らしいものとして思い描くこと", "example": "He had idealized her for so long that the real woman could never live up to it.", "example_ja": "彼は長い間、彼女を理想化していたので、現実の彼女がそれに見合うことは決してなかった。", "note": "idealize someone/something の形。名詞ideal。"}, {"word": "unattainable", "hint": "到達できない、手に入らない", "general": "努力しても手に入れることができない性質の", "example": "What he wanted most had always been unattainable.", "example_ja": "彼が最も欲していたものは、常に手に入らないものだった。", "note": "反対語attainable。an unattainable goal のように使う。"}, {"word": "disillusioned", "hint": "幻滅した", "general": "以前信じていたものが実際には期待通りでないと気づいて失望した状態", "example": "By the end of the summer, he felt completely disillusioned.", "example_ja": "その夏の終わりには、彼は完全に幻滅していた。", "note": "disillusioned with/by ~ の形。名詞disillusionment。"}, {"word": "shallow", "hint": "浅はかな、表面的な", "general": "深さや誠実さに欠ける性質の", "example": "Their conversations often felt shallow, full of empty compliments.", "example_ja": "彼らの会話はしばしば浅はかに感じられ、空虚な褒め言葉に満ちていた。", "note": "a shallow person/conversation のように使う。反対語deep/profound。"}, {"word": "superficial", "hint": "表面的な、浅薄な", "general": "見た目や表面だけで、深さや実質を欠く性質の", "example": "The friendships he made there were mostly superficial.", "example_ja": "そこで彼が作った友情のほとんどは、表面的なものだった。", "note": "shallowとほぼ同義だが、よりやや硬い語。"}, {"word": "hollow", "hint": "虚しい、空っぽの", "general": "内容や実質を欠いてい rust のように使う。名詞betrayal。"}, {"word": "deceive", "hint": "欺く、騙す", "general": "誤った情報を信じさせること", "example": "He had deceived almost everyone about who he really was.", "example_ja": "彼は、自分が本当は何者なのかについて、ほぼ全員を欺いていた。", "note": "deceive someone into ~ing の形。名詞deception。"}, {"word": "hypocrisy", "hint": "偽善", "general": "自分が信じていることと違う行動をすること", "example": "The hypocrisy of their social circle became impossible to ignore.", "example_ja": "彼らの社交界の偽善は、無視することができないものになっていった。", "note": "形容詞hypocritical。a sense of hypocrisy のように使う。"}, {"word": "indifferent", "hint": "無関心な、冷淡な", "general": "関心や興味を示さない性質の", "example": "He acted indifferent, but everyone could tell he cared deeply.", "example_ja": "彼は無関心を装ったが、誰もが彼が深く気にかけていることを見抜いていた。", "note": "indifferent to ~ の形。名詞indifference。"}, {"word": "careless", "hint": "不注意な、無頓着な", "general": "結果を考えずに行動する性質の", "example": "They were careless people, leaving wreckage behind them wherever they went.", "example_ja": "彼らは無頓着な人々で、行く先々に残骸を残していった。", "note": "careless about/with ~ の形。本書のテーマに関わる重要語。"}, {"word": "reckless", "hint": "無謀な、軽率な", "general": "危険を顧みず行動する性質の", "example": "His reckless driving that night would change everything.", "example_ja": "その夜の彼の無謀な運転が、すべてを変えてしまうことになった。", "note": "reckless behavior/driving のように使う。"}, {"word": "composure", "hint": "平静、落ち着き", "general": "動揺せず、落ち着いている状態", "example": "She managed to keep her composure even as the room fell silent.", "example_ja": "部屋が静まり返っても、彼女は平静を保つことができた。", "note": "lose/regain one's composure のように使う。"}, {"word": "restless", "hint": "落ち着かない、じっとしていられない", "general": "不安や満たされない気持ちで、動きたくなっている状態", "example": "He had always been restless, never satisfied with where he was.", "example_ja": "彼はいつも落ち着かず、自分がいる場所に満足したことがなかった。", "note": "feel restless / a restless mind のように使う。"}, {"word": "melancholy", "hint": "憂愁、物悲しさ", "general": "理由のはっきりしない、深い悲しみの感情", "example": "There was a melancholy in his voice whenever he spoke of the past.", "example_ja": "過去について話す時、彼の声にはいつも憂愁があった。", "note": "a sense of melancholy / a melancholy mood のように使う。やや文学的な語。"}, {"word": "wistful", "hint": "物思いにふけるような、切ない", "general": "何かを懐かしんだり、望んだりするような表情や様子の", "example": "She gave a wistful smile and looked away.", "example_ja": "彼女は切なげな笑みを浮かべ、目をそらした。", "note": "a wistful look/smile のように使う。"}, {"word": "anguish", "hint": "苦悩、激しい苦痛", "general": "深い精神的・身体的な苦しみ", "example": "His anguish was clear, even though he said nothing.", "example_ja": "彼が何も言わなくても、その苦悩は明らかだった。", "note": "in anguish / a cry of anguish のように使う。"}, {"word": "despair", "hint": "絶望", "general": "希望を完全に失った状態", "example": "For the first time, he allowed himself a moment of despair.", "example_ja": "初めて、彼は自分自身に絶望の瞬間を許した。", "note": "in despair / sink into despair のように使う。"}, {"word": "bitterness", "hint": "恨み、苦々しさ", "general": "不公平な扱いを受けたことに対する、長く続く怒りや恨みの感情", "example": "There was bitterness in his voice that he couldn't quite hide.", "example_ja": "彼の声には、完全には隠せない苦々しさがあった。", "note": "形容詞bitter。a sense of bitterness のように使う。"}, {"word": "resentment", "hint": "憤り、恨み", "general": "不当に扱われたと感じることによる怒りの感情", "example": "Years of quiet resentment finally came to the surface that night.", "example_ja": "その夜、長年の静かな憤りがついに表面化した。", "note": "resentment toward someone のように使う。動詞resent。"}, {"word": "jealousy", "hint": "嫉妬", "general": "他人の持つものや関係を羨ましく思う気持ち", "example": "Jealousy flickered across his face before he could hide it.", "example_ja": "彼が隠す前に、嫉妬の表情が彼の顔をよぎった。", "note": "a flash of jealousy / out of jealousy のように使う。"}, {"word": "suspicion", "hint": "疑い、疑念", "general": "何かが真実でない、または間違っているという感覚", "example": "A growing suspicion told her that something was wrong.", "example_ja": "募る疑念が、何かがおかしいと彼女に告げていた。", "note": "suspicion that ~ / under suspicion のように使う。"}, {"word": "confront", "hint": "対峙する、直面する", "general": "困難な状況や人に正面から向き合うこと", "example": "He finally decided to confront the man face to face.", "example_ja": "彼はついに、その男と面と向かって対峙することを決めた。", "note": "confront someone about/with ~ の形。"}, {"word": "accusation", "hint": "非難、告発", "general": "誰かが間違ったことをし
